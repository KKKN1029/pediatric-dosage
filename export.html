<meta charset="UTF-8">

<title>小児薬用量 — データエクスポート / Gist 同期</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
<div class="max-w-2xl mx-auto space-y-6">
  <h1 class="text-xl font-bold text-gray-800">データエクスポート / Gist 同期</h1>

  <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-4">
    <h2 class="font-semibold text-gray-700">① GitHub Token を入力</h2>
    <input id="token" type="password" placeholder="ghp_xxxx (gist スコープ必要)"
      class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono">
    <p class="text-xs text-gray-500">
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=pediatric-dosage" target="_blank"
         class="text-blue-600 underline">GitHub で Token 発行</a>（gist スコープにチェック）
    </p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-4">
    <h2 class="font-semibold text-gray-700">② Gist ID（既存があれば自動入力）</h2>
    <input id="gistId" type="text" placeholder="既存の Gist ID または空欄"
      class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono">
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-5 space-y-3">
    <h2 class="font-semibold text-gray-700">③ エクスポート内容</h2>
    <div id="summary" class="text-sm text-gray-600 bg-gray-50 rounded-lg p-3"></div>
  </div>

  <button id="uploadBtn"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl py-3 text-sm transition-colors">
    Gist にアップロードして同期する
  </button>

  <div id="result" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-800"></div>
  <div id="error"  class="hidden bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-800"></div>
</div>

  `<div>疾患数: <strong>${DISEASES.length}</strong> 件</div>`;

// 既存 Gist ID を localStorage から引き継ぐ
const savedGist = localStorage.getItem('master_gist_id') || localStorage.getItem('editor_gist_id') || '';
if (savedGist) document.getElementById('gistId').value = savedGist;
const savedToken = localStorage.getItem('editor_gh_token') || '';
if (savedToken) document.getElementById('token').value = savedToken;

document.getElementById('uploadBtn').addEventListener('click', async () => {
  const token  = document.getElementById('token').value.trim();
  const gistId = document.getElementById('gistId').value.trim();
  const errEl  = document.getElementById('error');
  const resEl  = document.getElementById('result');
  errEl.classList.add('hidden');
  resEl.classList.add('hidden');

  if (!token) { errEl.textContent = 'GitHub Token を入力してください。'; errEl.classList.remove('hidden'); return; }

  const payload = {
    schemaVersion: 1,
    drugCategories: CATEGORIES,
    diseaseCategories: DISEASE_CATEGORIES,
    drugs: DRUGS,
    diseases: DISEASES,
    ivFluidTables: IV_FLUID_TABLES,
  };
  const fileContent = JSON.stringify(payload, null, 2);
  const gistBody = {
    description: '小児薬用量アプリ マスターデータ',
    public: false,
    files: { 'pediatric-dosage-data.json': { content: fileContent } }
  };

  try {
    let url = 'https://api.github.com/gists';
    let method = 'POST';
    if (gistId) { url += '/' + gistId; method = 'PATCH'; }

    const res = await fetch(url, {
      method,
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(gistBody),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
    const data = await res.json();
    const newId = data.id;
    const htmlUrl = data.html_url;

    // アプリ側 localStorage に同期
    localStorage.setItem('master_gist_id', newId);
    localStorage.setItem('editor_gist_id', newId);
    localStorage.setItem('editor_gh_token', token);
    // キャッシュを無効化してアプリに最新Gistを読み込ませる
    localStorage.removeItem('master_gist_cache');
    localStorage.removeItem('master_gist_cache_at');

    resEl.innerHTML = `✅ アップロード完了！（点滴希釈データ ${ivCount} 件含む）<br>
      Gist ID: <code class="font-mono bg-green-100 px-1 rounded">${newId}</code><br>
      <a href="${htmlUrl}" target="_blank" class="underline text-green-700">${htmlUrl}</a><br><br>
      👉 <a href="/" class="underline font-bold text-green-700">アプリ</a> を <strong>Cmd+Shift+R</strong> でリロードしてください`;
    resEl.classList.remove('hidden');
  } catch(e) {
    errEl.textContent = 'エラー: ' + e.message;
    errEl.classList.remove('hidden');
  }
});
