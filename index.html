// ============================================================
// データアクセス (localStorage)
// ============================================================

const LS = {
  get: (k, d='{}') => { try { return JSON.parse(localStorage.getItem(k) || d) } catch { return JSON.parse(d) } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
}

const loadEdits = () => LS.get('drug_edits')
const saveEdit = (id, patch) => { const e = loadEdits(); e[id] = {...(e[id]||{}), ...patch}; LS.set('drug_edits', e) }
const loadCustomDrugs = () => LS.get('custom_drugs', '[]')
const saveCustomDrugs = d => LS.set('custom_drugs', d)
const loadSets = () => LS.get('drug_sets', '[]')
const saveSets = s => LS.set('drug_sets', s)
const loadPendingDrugs = () => LS.get('pending_drugs', '[]')
const savePendingDrugs = d => LS.set('pending_drugs', d)
const loadHiddenDrugs = () => new Set(LS.get('hidden_drugs', '[]'))
const hideDrug = id => { const h = loadHiddenDrugs(); h.add(id); LS.set('hidden_drugs', [...h]) }
const isBuiltinDrug = id => !!DRUGS.find(d => d.id === id)
const loadUserCategories = () => { const s = LS.get('user_categories', 'null'); return s === null ? [...CATEGORIES] : s }
const saveUserCategories = cats => LS.set('user_categories', cats)
const getCategories = () => loadUserCategories()
const loadUserDiseaseCategories = () => { const s = LS.get('user_disease_categories', 'null'); return s === null ? [...DISEASE_CATEGORIES] : s }
const saveUserDiseaseCategories = cats => LS.set('user_disease_categories', cats)
const getDiseaseCategories = () => loadUserDiseaseCategories()

// マスターデータの未確認薬剤管理（pending:true の薬剤をユーザーが確認済みにする）
const loadConfirmedMaster = () => new Set(LS.get('confirmed_master', '[]'))
const confirmMasterDrug = id => { const s = loadConfirmedMaster(); s.add(id); LS.set('confirmed_master', [...s]) }
// マスターデータのうち未確認のもの（confirmed_master に未登録のもの全て）
function getPendingMasterDrugs() {
  const confirmed = loadConfirmedMaster()
  const hidden = loadHiddenDrugs()
  return DRUGS.filter(d => !confirmed.has(d.id) && !hidden.has(d.id))
}
// カスタム＋マスター両方の未確認薬剤を返す
function getAllPendingDrugs() {
  return [...loadPendingDrugs(), ...getPendingMasterDrugs()]
}

function deleteDrug(id) {
  if (isBuiltinDrug(id)) {
    hideDrug(id)
  } else {
    saveCustomDrugs(loadCustomDrugs().filter(d => d.id !== id))
  }
  // お気に入りからも削除
  const f = new Set(state.favorites); f.delete(id)
  LS.set('favorites', [...f])
  setState({screen:'list', favorites:f})
}

function getAllDrugs() {
  const edits = loadEdits()
  const hidden = loadHiddenDrugs()
  const confirmed = loadConfirmedMaster()
  return [
    // confirmed_master に登録済みの薬のみ表示（全薬剤が確認制）
    ...DRUGS.filter(d => !hidden.has(d.id) && confirmed.has(d.id))
             .map(d => edits[d.id] ? {...d,...edits[d.id]} : d),
    ...loadCustomDrugs().filter(d => !hidden.has(d.id)),
  ]
}
function getDrugById(id) { return getAllDrugs().find(d => d.id === id) }
function getDrugsByCategory(cat) { return getAllDrugs().filter(d => d.category === cat) }
function searchDrugsQ(q) {
  const lq = q.toLowerCase()
  return getAllDrugs().filter(d =>
    d.genericName.toLowerCase().includes(lq) ||
    (d.abbreviation||'').toLowerCase().includes(lq) ||
    d.brandNames.some(b => b.toLowerCase().includes(lq))
  )
}

// 疾患データアクセス
// ============================================================

const loadCustomDiseases = () => LS.get('custom_diseases', '[]')
const saveCustomDiseases = d => LS.set('custom_diseases', d)
const loadPendingDiseases = () => LS.get('pending_diseases', '[]')
const savePendingDiseases = d => LS.set('pending_diseases', d)
const loadConfirmedMasterDiseases = () => new Set(LS.get('confirmed_master_diseases', '[]'))
const confirmMasterDisease = id => { const s = loadConfirmedMasterDiseases(); s.add(id); LS.set('confirmed_master_diseases', [...s]) }

function getPendingMasterDiseases() {
  const confirmed = loadConfirmedMasterDiseases()
  return DISEASES.filter(d => !confirmed.has(d.id))
}
function getAllPendingDiseases() {
  return [...loadPendingDiseases(), ...getPendingMasterDiseases()]
}
function getAllDiseases() {
  const confirmed = loadConfirmedMasterDiseases()
  const hidden = new Set(LS.get('hidden_diseases','[]'))
  return [
    ...DISEASES.filter(d => confirmed.has(d.id) && !hidden.has(d.id)),
    ...loadCustomDiseases().filter(d => !hidden.has(d.id)),
  ]
}
function getDiseaseById(id) { return getAllDiseases().find(d => d.id === id) || getAllPendingDiseases().find(d => d.id === id) }
function getDiseasesByCategory(cat) { return getAllDiseases().filter(d => d.category === cat) }
function searchDiseasesQ(q) {
  const lq = q.toLowerCase()
  return getAllDiseases().filter(d =>
    d.name.toLowerCase().includes(lq) ||
    (d.englishName||'').toLowerCase().includes(lq) ||
    (d.abbreviation||'').toLowerCase().includes(lq) ||
    (d.tags||[]).some(t => t.toLowerCase().includes(lq))
  )
}

function round1(n) { return Math.round(n*10)/10 }
function calcDoseResult(dose, weight) {
  if (!weight || weight <= 0) return null
  if (dose.fixedDose) return {text: dose.fixedDose, perDose: null}
  const unit = dose.unit || 'mg'
  let text, min, max
  if (dose.dosePerKg) {
    const t = round1(Math.min(dose.dosePerKg*weight, dose.maxDosePerDay??Infinity))
    text=`${t} ${unit}/日`; min=max=t
  } else if (dose.dosePerKgMin!=null && dose.dosePerKgMax!=null) {
    const lo=round1(Math.min(dose.dosePerKgMin*weight, dose.maxDosePerDay??Infinity))
    const hi=round1(Math.min(dose.dosePerKgMax*weight, dose.maxDosePerDay??Infinity))
    text = lo===hi ? `${lo} ${unit}/日` : `${lo}〜${hi} ${unit}/日`; min=lo; max=hi
  } else return null
  let perDose=null
  const m=dose.frequency?.match(/分(\d+)/)
  if (m) { const n=parseInt(m[1]); perDose=min===max?`1回 ${round1(min/n)} ${unit}`:`1回 ${round1(min/n)}〜${round1(max/n)} ${unit}` }
  return {text, perDose}
}

function calcHolidaySegar(weight) {
  if (!weight || weight <= 0) return null
  const w = parseFloat(weight)
  if (isNaN(w) || w <= 0) return null
  let daily
  if (w <= 10) { daily = w * 100 }
  else if (w <= 20) { daily = 1000 + (w - 10) * 50 }
  else { daily = 1500 + (w - 20) * 20 }
  const hourly = daily / 24
  return {
    daily: Math.round(daily),
    hourly: Math.round(hourly * 10) / 10,
    na: Math.round(daily / 1000 * 30 * 10) / 10,
    k: Math.round(daily / 1000 * 20 * 10) / 10,
  }
}

function calcGIR(glc, rate, weight) {
  const g = parseFloat(glc), r = parseFloat(rate), w = parseFloat(weight)
  if (!g || !r || !w || g<=0 || r<=0 || w<=0) return null
  return Math.round(g * 10 * r / (w * 60) * 100) / 100
}
function calcGIRRate(gir, glc, weight) {
  const t = parseFloat(gir), g = parseFloat(glc), w = parseFloat(weight)
  if (!t || !g || !w || t<=0 || g<=0 || w<=0) return null
  return Math.round(t * w * 60 / (g * 10) * 10) / 10
}

// 薬剤量 (mg), 溶解液量 (mL), γ (μg/kg/min), 体重 (kg) → 注入速度 (mL/hr)
function calcMlhFromGamma(drug, fluid, gamma, weight) {
  const d = parseFloat(drug), f = parseFloat(fluid), g = parseFloat(gamma), w = parseFloat(weight)
  if (!d || !f || !g || !w || d<=0 || f<=0 || g<=0 || w<=0) return null
  return Math.round((g * w * 60 * f) / (d * 1000) * 100) / 100
}
// 薬剤量 (mg), 溶解液量 (mL), 注入速度 (mL/hr), 体重 (kg) → γ (μg/kg/min)
function calcGammaFromMlh(drug, fluid, rate, weight) {
  const d = parseFloat(drug), f = parseFloat(fluid), r = parseFloat(rate), w = parseFloat(weight)
  if (!d || !f || !r || !w || d<=0 || f<=0 || r<=0 || w<=0) return null
  return Math.round((d * r * 1000) / (f * w * 60) * 100) / 100
}

    // mL/hr→γ
    const r = calcGammaFromMlh(state.gammaB_drug, state.gammaB_fluid, state.gammaB_rate, state.gammaB_weight)

    return `${subTabs}${gammaInnerTabs}

      </div>`
  }

  // 製剤一覧
  const tableHtml = IV_FLUID_TABLES.map(section => {
    const rows = section.fluids.map(f => {
      const cv = (v, extra='') => {
        const s = (v === undefined || v === null) ? '-' : String(v)
        const empty = s === '-'
        return `<td class="px-2 py-2 text-xs text-center ${empty?'text-gray-300':'text-gray-800'} ${extra}">${s}</td>`

              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${notesHtml}
      </div>`
  }).join('')

  return `${subTabs}<div class="p-4 space-y-4">${tableHtml}</div>`
}

function buildListBodyHTML(query) {
  const isSearch = query.trim()!==''

  // ── 検索時: 薬剤・疾患を同時表示 ──────────────────────────
  if (isSearch) {
    const drugResults = searchDrugsQ(query)
    const diseaseResults = searchDiseasesQ(query)
    const drugSection = drugResults.length > 0
      ? `<div class="px-4 py-2 text-xs font-semibold text-gray-500 bg-gray-50 border-b border-gray-100 sticky top-0">💊 薬剤 (${drugResults.length}件)</div><ul class="bg-white">${drugResults.map(drugListItem).join('')}</ul>`
      : ''
    const diseaseSection = diseaseResults.length > 0
      ? `<div class="px-4 py-2 text-xs font-semibold text-gray-500 bg-gray-50 border-b border-gray-100 sticky top-0">🏥 疾患 (${diseaseResults.length}件)</div><ul class="bg-white">${diseaseResults.map(diseaseListItem).join('')}</ul>`
      : ''
    const empty = drugResults.length===0 && diseaseResults.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-3xl">🔍</span><span>見つかりません</span></div>` : ''
    return `<main class="flex-1 overflow-y-auto bg-white">${drugSection}${diseaseSection}${empty}</main>`
  }

  // ── 輸液タブ ─────────────────────────────────────────────
  if (state.mainTab === 'ivfluids') {
    return `<main class="flex-1 overflow-y-auto bg-white">${buildIVFluidsHTML()}</main>`
  }
  // ── 疾患タブ ─────────────────────────────────────────────
  if (state.mainTab === 'diseases') {
    const pendingDiseases = getAllPendingDiseases()
    const isPendingDiseaseCat = state.diseaseCat === '__pending_diseases__'
    const userDiseaseCats = getDiseaseCategories()
    const diseaseSidebar = [
      ...userDiseaseCats.map(cat =>
        `<button data-disease-cat="${cat}" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors ${state.diseaseCat===cat?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">${cat}</button>`
      ),
      `<button data-disease-cat="__pending_diseases__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors border-t border-gray-100 ${isPendingDiseaseCat?'border-l-orange-500 bg-orange-50 text-orange-700 font-semibold':'border-l-transparent text-gray-600'}">📝<br>未確認${pendingDiseases.length>0?('<br><b class="text-orange-500">'+pendingDiseases.length+'</b>'):''}
</button>`,
      `<div class="flex justify-center py-1 border-t border-gray-100"><button id="btn-edit-disease-cats" class="text-gray-400 hover:text-blue-500 text-xs px-2 py-0.5 rounded border border-gray-200 bg-white leading-tight" title="カテゴリ編集">✎</button></div>`,
    ].join('')

    let diseaseList, headerTitle, headerColor
    if (isPendingDiseaseCat) {
      diseaseList = pendingDiseases; headerTitle = '未確認の疾患'; headerColor = 'bg-orange-500'
    } else if (state.diseaseCat) {
      diseaseList = getDiseasesByCategory(state.diseaseCat); headerTitle = state.diseaseCat; headerColor = 'bg-blue-600'
    } else {
      diseaseList = getAllDiseases(); headerTitle = '全疾患'; headerColor = 'bg-blue-600'
    }

    const diseaseItems = diseaseList.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-3xl">🏥</span><span>${isPendingDiseaseCat?'未確認の疾患はありません':'疾患がありません'}</span></div>`
      : diseaseList.map(d => diseaseListItem(d, isPendingDiseaseCat)).join('')

    return `
      <aside class="w-20 bg-white border-r border-gray-200 overflow-y-auto shrink-0">${diseaseSidebar}</aside>
      <main class="flex-1 overflow-y-auto bg-white">
        <div class="px-4 py-2 ${headerColor} flex items-center justify-between">
          <h2 class="text-sm font-bold text-white">${headerTitle}</h2>
          ${!isPendingDiseaseCat ? '<button id="btn-add-disease" class="text-xs text-white bg-blue-500 hover:bg-blue-400 px-2 py-1 rounded-lg">＋ 疾患追加</button>' : `<span class="text-xs text-white opacity-80">${pendingDiseases.length}件</span>`}
        </div>
        <ul class="bg-white">${diseaseItems}</ul>
      </main>`
  }

  // ── 薬剤タブ（既存） ──────────────────────────────────────
  const isFav = state.category==='__favorites__'
  const isSets = state.category==='__sets__'
  const isPending = state.category === '__pending__'
  const sets = loadSets()
  const pending = getAllPendingDrugs()
  const pendingCount = pending.length
  const userCats = getCategories()

  const sidebarItems = [
    `<button data-cat="__favorites__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors flex flex-col items-center gap-0.5 ${state.category==='__favorites__'?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">${ICON.star(state.category==='__favorites__')}<span>お気に入り</span></button>`,
    `<button data-cat="__sets__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors ${state.category==='__sets__'?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">📋<br>セット</button>`,
    ...userCats.map(cat => `<button data-cat="${cat}" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors ${state.category===cat?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">${cat}</button>`),
    `<button data-cat="__pending__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors border-t border-gray-100 ${state.category==='__pending__'?'border-l-orange-500 bg-orange-50 text-orange-700 font-semibold':'border-l-transparent text-gray-600'}">📝<br>未確認${pendingCount>0?('<br><b class="text-orange-500">'+pendingCount+'</b>'):''}
</button>`,
    `<div class="flex justify-center py-1 border-t border-gray-100"><button id="btn-edit-cats" class="text-gray-400 hover:text-blue-500 text-xs px-2 py-0.5 rounded border border-gray-200 bg-white leading-tight" title="カテゴリ編集">✎</button></div>`,
  ].join('')

  let mainContent = ''
  if (isSets) {
    const setItems = sets.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-3xl">📋</span><span>セットがありません</span></div>`
      : sets.map(s => {
          const drugNames = s.drugIds.map(id => getDrugById(id)?.abbreviation || getDrugById(id)?.genericName || '?').join(' + ')
          return `<li><button data-set="${s.id}" class="w-full flex items-center px-4 py-3 hover:bg-gray-50 text-left gap-3 border-b border-gray-100">
            <div class="flex-1 min-w-0">
              <div class="font-medium text-gray-900 text-sm">${esc(s.name)}</div>
              <div class="text-xs text-gray-500 truncate">${esc(drugNames)}</div>
            </div>
            <button data-del-set="${s.id}" class="text-gray-300 hover:text-red-400 text-lg px-1">✕</button>
          </button></li>`
        }).join('')
    mainContent = `
      <div class="px-4 py-2 bg-blue-600 flex items-center justify-between">
        <h2 class="text-sm font-bold text-white">セット</h2>
        <button id="btn-create-set" class="text-xs text-white bg-blue-500 hover:bg-blue-400 px-2 py-1 rounded-lg">＋ セット作成</button>
      </div>
      <ul class="bg-white">${setItems}</ul>`
  } else if (isPending) {
    const pendingItems = pending.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-3xl">📝</span><span>未確認の薬剤はありません</span></div>`
      : pending.map(d => `
          <li class="border-b border-gray-100">
            <div class="flex items-start px-4 py-3 gap-3">
              <div class="flex-1 min-w-0">
                <div class="font-medium text-gray-900 text-sm">${esc(d.genericName)}</div>
                <div class="text-xs text-gray-500">${d.abbreviation?d.abbreviation+'　':''}${(d.brandNames||[]).join('・')}</div>
                <div class="text-xs text-orange-600 mt-0.5">カテゴリ: ${esc(d.category)}</div>
              </div>
              <div class="flex flex-col gap-1 shrink-0">
                <button data-confirm-drug="${d.id}" class="text-xs bg-blue-600 text-white px-2 py-1 rounded-lg font-medium">✓ 確認</button>
                <button data-del-pending="${d.id}" class="text-xs bg-red-50 text-red-500 px-2 py-1 rounded-lg">削除</button>
              </div>
            </div>
          </li>`).join('')
    mainContent = `
      <div class="px-4 py-2 bg-orange-500 flex items-center justify-between">
        <h2 class="text-sm font-bold text-white">未確認の薬剤</h2>
        <span class="text-xs text-white opacity-80">${pending.length}件</span>
      </div>
      <ul class="bg-white">${pendingItems}</ul>`
  } else {
    let drugs = isFav ? getAllDrugs().filter(d=>state.favorites.has(d.id)) : getDrugsByCategory(state.category)
    const items = drugs.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-3xl">💊</span><span>薬剤が見つかりません</span></div>`
      : drugs.map(drugListItem).join('')
    mainContent = `
      <div class="px-4 py-2 bg-blue-600 flex items-center justify-between">
        <h2 class="text-sm font-bold text-white">${isFav?'お気に入り':esc(state.category)}</h2>
        <button id="btn-add-drug" class="text-xs text-white bg-blue-500 hover:bg-blue-400 px-2 py-1 rounded-lg">＋ 薬剤追加</button>
      </div>
      <ul class="bg-white">${items}</ul>`
  }

  return `
    <aside class="w-20 bg-white border-r border-gray-200 overflow-y-auto shrink-0">${sidebarItems}</aside>
    <main class="flex-1 overflow-y-auto bg-white">${mainContent}</main>`
}

function attachListBody() {
  app.querySelectorAll('[data-cat]').forEach(b => b.addEventListener('click', () => {
    state.query = ''
    setState({category:b.dataset.cat})
  }))
  app.querySelectorAll('[data-drug]').forEach(b => b.addEventListener('click', () => {
    setState({screen:'detail', drugId:b.dataset.drug, tab:'calc', weight:'', age:'', ageUnit:'years', editMode:false})
  }))
  app.querySelectorAll('[data-set]').forEach(b => b.addEventListener('click', e => {
    if (e.target.closest('[data-del-set]')) return
    setState({screen:'set-detail', setId:b.dataset.set, weight:'', age:'', ageUnit:'years'})
  }))
  app.querySelectorAll('[data-del-set]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation()
    if (!confirm('このセットを削除しますか？')) return
    saveSets(loadSets().filter(s=>s.id!==b.dataset.delSet))
    render()
  }))
  document.getElementById('btn-add-drug')?.addEventListener('click', () => {
    setState({screen:'add-drug', addForm:{genericName:'',abbreviation:'',brandNames:'',category:state.category==='__favorites__'||state.category==='__sets__'||state.category==='__pending__'?getCategories()[0]:state.category,route:'内服',formulations:'',adultDose:'',notes:'',sideEffects:'',references:''}, addDoses:[newDoseEntry()]})
  })
  document.getElementById('btn-create-set')?.addEventListener('click', () => {
    setState({screen:'create-set', setDraft:{name:'',drugIds:[]}, setQuery:'', editSetId:null})
  })
  app.querySelectorAll('[data-confirm-drug]').forEach(b => b.addEventListener('click', () => {
    const drugId = b.dataset.confirmDrug
    // マスターデータの薬剤の場合（全てが確認制）
    if (DRUGS.find(d => d.id === drugId)) {
      confirmMasterDrug(drugId)
      render()
      return
    }
    // カスタムpending薬剤の場合
    const pending = loadPendingDrugs()
    const drug = pending.find(d => d.id === drugId)
    if (!drug) return
    const custom = loadCustomDrugs()
    custom.push(drug)
    saveCustomDrugs(custom)
    savePendingDrugs(pending.filter(d => d.id !== drugId))
    render()
  }))
  app.querySelectorAll('[data-del-pending]').forEach(b => b.addEventListener('click', () => {
    if (!confirm('この薬剤を削除しますか？')) return
    const drugId = b.dataset.delPending
    // マスターデータの薬剤は非表示にする
    if (DRUGS.find(d => d.id === drugId)) {
      hideDrug(drugId)
      render()
      return
    }
    savePendingDrugs(loadPendingDrugs().filter(d => d.id !== drugId))
    render()
  }))
  // 疾患カテゴリ
  app.querySelectorAll('[data-disease-cat]').forEach(b => b.addEventListener('click', () => {
    const cat = b.dataset.diseaseCat
    const newCat = state.diseaseCat === cat ? null : cat
    state.diseaseCat = newCat
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  // 疾患アイテム
  app.querySelectorAll('[data-disease]').forEach(b => b.addEventListener('click', () => {
    setState({screen:'disease-detail', diseaseId: b.dataset.disease})
  }))
  // 疾患追加
  document.getElementById('btn-add-disease')?.addEventListener('click', () => {
    setState({screen:'add-disease'})
  })
  document.getElementById('btn-edit-cats')?.addEventListener('click', () => setState({screen:'manage-categories'}))
  document.getElementById('btn-edit-disease-cats')?.addEventListener('click', () => setState({screen:'manage-disease-categories'}))
  app.querySelectorAll('[data-iv-tab]').forEach(b => b.addEventListener('click', () => {
    state.ivSubTab = b.dataset.ivTab
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  app.querySelectorAll('[data-iv-mode]').forEach(b => b.addEventListener('click', () => {
    state.ivMode = b.dataset.ivMode
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  document.getElementById('iv-weight')?.addEventListener('input', e => {
    state.ivWeight = e.target.value
    const resultDiv = document.getElementById('iv-calc-result')
    if (resultDiv) resultDiv.innerHTML = buildIVCalcResultHTML()
  })
  // GIR inputs — ボトムバーのみ更新してフォーカス維持
  const updateGIRBar = () => {
    const bar = document.getElementById('gir-result-bar')
    if (!bar) return
    const r = calcGIR(state.girGlucose, state.girRate, state.girWeight)
    bar.textContent = (r !== null ? r : '--') + ' mg/kg/min'
  }
  document.getElementById('gir-glucose')?.addEventListener('input', e=>{state.girGlucose=e.target.value; updateGIRBar()})
  document.getElementById('gir-rate')?.addEventListener('input', e=>{state.girRate=e.target.value; updateGIRBar()})
  document.getElementById('gir-weight')?.addEventListener('input', e=>{state.girWeight=e.target.value; updateGIRBar()})
  // GIR 内部タブ切り替え
  app.querySelectorAll('[data-gir-tab]').forEach(b=>b.addEventListener('click', ()=>{
    state.girTab = b.dataset.girTab
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  // ガンマ計算 inputs — ボトムバーのみ更新してフォーカス維持
  const updateGammaABar = () => {
    const bar = document.getElementById('gamma-a-result-bar')
    if (!bar) return
    const r = calcMlhFromGamma(state.gammaA_drug, state.gammaA_fluid, state.gammaA_gamma, state.gammaA_weight)
    bar.innerHTML = (r !== null ? r : '--') + ' <span class="text-base font-normal">mL/hr</span>'
  }
  const updateGammaBBar = () => {
    const bar = document.getElementById('gamma-b-result-bar')
    if (!bar) return
    const r = calcGammaFromMlh(state.gammaB_drug, state.gammaB_fluid, state.gammaB_rate, state.gammaB_weight)
    bar.innerHTML = (r !== null ? r : '--') + ' <span class="text-base font-normal">μg/kg/min</span>'
  }
  document.getElementById('gamma-a-drug')?.addEventListener('input', e=>{state.gammaA_drug=e.target.value; updateGammaABar()})
  document.getElementById('gamma-a-fluid')?.addEventListener('input', e=>{state.gammaA_fluid=e.target.value; updateGammaABar()})
  document.getElementById('gamma-a-gamma')?.addEventListener('input', e=>{state.gammaA_gamma=e.target.value; updateGammaABar()})
  document.getElementById('gamma-a-weight')?.addEventListener('input', e=>{state.gammaA_weight=e.target.value; updateGammaABar()})
  document.getElementById('gamma-b-drug')?.addEventListener('input', e=>{state.gammaB_drug=e.target.value; updateGammaBBar()})
  document.getElementById('gamma-b-fluid')?.addEventListener('input', e=>{state.gammaB_fluid=e.target.value; updateGammaBBar()})
  document.getElementById('gamma-b-rate')?.addEventListener('input', e=>{state.gammaB_rate=e.target.value; updateGammaBBar()})
  document.getElementById('gamma-b-weight')?.addEventListener('input', e=>{state.gammaB_weight=e.target.value; updateGammaBBar()})
  // ガンマ計算 内部タブ切り替え
  app.querySelectorAll('[data-gamma-tab]').forEach(b=>b.addEventListener('click', ()=>{
    state.gammaTab = b.dataset.gammaTab
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
}

function dosesToEditForm(doses) {
  return doses.map(d => ({
    _id: Math.random(),
    ageLabel: d.ageLabel || '',
    ageMinYears: d.ageMinMonths != null ? d.ageMinMonths / 12 : '',
    ageMaxYears: d.ageMaxMonths != null ? d.ageMaxMonths / 12 : '',
    purpose: d.purpose || '治療',
    doseType: d.fixedDose ? 'fixed' : (d.dosePerKgMin != null ? 'range' : 'weight'),
    unit: d.unit || 'mg',
    dosePerKg: d.dosePerKg ?? '',
    dosePerKgMin: d.dosePerKgMin ?? '',
    dosePerKgMax: d.dosePerKgMax ?? '',
    fixedDose: d.fixedDose || '',
    maxDosePerDay: d.maxDosePerDay ?? '',
    frequency: d.frequency || '',
    duration: d.duration || '',
    notes: d.notes || '',
  }))
}

function updateDetailDoseResults() {
  const drug = getDrugById(state.drugId)
  if (!drug) return
  const el = document.getElementById('dose-results')

  const doses = filteredDoses(drug)
  const weight = state.weight
  el.innerHTML = `

  document.getElementById('btn-edit-doses')?.addEventListener('click', () => {
    const drug = getDrugById(state.drugId)

}

function attachDetail() {
  const drug = getDrugById(state.drugId)
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list',editMode:false,editDoses:[]}))
  document.getElementById('btn-fav')?.addEventListener('click', () => toggleFav(drug.id))
  document.getElementById('btn-delete-drug')?.addEventListener('click', () => {
    if (confirm(`「${drug.genericName}」を削除しますか？`)) deleteDrug(drug.id)
  })
  app.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => setState({tab:b.dataset.tab,editMode:false,editDoses:[]})))
  const weightInput = document.getElementById('weight-input')
  if (weightInput) {
    weightInput.value = state.weight
    weightInput.addEventListener('input', e => { state.weight = e.target.value; updateDetailDoseResults() })
  }
  const ageInput = document.getElementById('age-input')
  if (ageInput) {
    ageInput.value = state.age
    ageInput.addEventListener('input', e => { state.age = e.target.value; updateDetailDoseResults() })
  }
  document.getElementById('unit-years')?.addEventListener('click', () => setState({ageUnit:'years',age:''}))
  document.getElementById('unit-months')?.addEventListener('click', () => setState({ageUnit:'months',age:''}))

  // calcタブ：投与量編集ボタン（初期表示時。weight変更時はupdateDetailDoseResultsが担当）
  document.getElementById('btn-edit-doses')?.addEventListener('click', () => {
    const d = getDrugById(state.drugId)
    setState({editMode:true, editDoses:dosesToEditForm(d?.pediatricDoses||[]), tab:'calc'})
  })

  // calcタブ：投与量編集 キャンセル / 保存
  document.getElementById('btn-cancel-edit')?.addEventListener('click', () => setState({editMode:false,editDraft:null,editDoses:[]}))
  document.getElementById('btn-save-doses')?.addEventListener('click', () => {
    // editDosesフォームからデータ収集
    const newDoses = state.editDoses.map((d,i) => {
      const entry = {
        ageLabel: document.querySelector(`[data-ed="${i}"][data-field="ageLabel"]`)?.value || d.ageLabel || '全年齢',
        purpose: document.querySelector(`[data-ed="${i}"][data-field="purpose"]`)?.value || '治療',
      }
      const minY = document.querySelector(`[data-ed="${i}"][data-field="ageMinYears"]`)?.value
      const maxY = document.querySelector(`[data-ed="${i}"][data-field="ageMaxYears"]`)?.value
      if (minY) entry.ageMinMonths = parseFloat(minY)*12
      if (maxY) entry.ageMaxMonths = parseFloat(maxY)*12
      if (d.doseType==='weight') {
        const v = document.querySelector(`[data-ed="${i}"][data-field="dosePerKg"]`)?.value
        if (v) entry.dosePerKg = parseFloat(v)
      } else if (d.doseType==='range') {
        const lo = document.querySelector(`[data-ed="${i}"][data-field="dosePerKgMin"]`)?.value
        const hi = document.querySelector(`[data-ed="${i}"][data-field="dosePerKgMax"]`)?.value
        if (lo) entry.dosePerKgMin = parseFloat(lo)
        if (hi) entry.dosePerKgMax = parseFloat(hi)
      } else {
        entry.fixedDose = document.querySelector(`[data-ed="${i}"][data-field="fixedDose"]`)?.value || ''
      }
      const maxD = document.querySelector(`[data-ed="${i}"][data-field="maxDosePerDay"]`)?.value
      if (maxD) entry.maxDosePerDay = parseFloat(maxD)
      const unit = document.querySelector(`[data-ed="${i}"][data-field="unit"]`)?.value
      if (unit && unit !== 'mg') entry.unit = unit
      const freq = document.querySelector(`[data-ed="${i}"][data-field="frequency"]`)?.value
      if (freq) entry.frequency = freq
      const dur = document.querySelector(`[data-ed="${i}"][data-field="duration"]`)?.value
      if (dur) entry.duration = dur
      const notes = document.querySelector(`[data-ed="${i}"][data-field="notes"]`)?.value
      if (notes) entry.notes = notes
      return entry
    })
    saveEdit(drug.id, {pediatricDoses: newDoses})
    setState({editMode:false, editDoses:[]})
  })

  // calcタブ：用量タイプ切り替え（editDoses）
  app.querySelectorAll('[data-ed-type]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.edType)
    const doses = [...state.editDoses]
    doses[idx] = {...doses[idx], doseType: b.dataset.type}
    setState({editDoses: doses})
  }))
  // calcタブ：用量エントリ削除
  app.querySelectorAll('[data-rm-dose]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.rmDose)
    setState({editDoses: state.editDoses.filter((_,i)=>i!==idx)})
  }))
  // calcタブ：用量エントリ追加
  document.getElementById('btn-add-ed-dose')?.addEventListener('click', () => {
    setState({editDoses: [...state.editDoses, {_id:Math.random(),ageLabel:'',ageMinYears:'',ageMaxYears:'',purpose:'治療',doseType:'weight',unit:'mg',dosePerKg:'',dosePerKgMin:'',dosePerKgMax:'',fixedDose:'',maxDosePerDay:'',frequency:'',duration:'',notes:''}]})
  })

  // overviewタブ：概要編集
  document.getElementById('btn-edit')?.addEventListener('click', () => setState({editMode:true, editDraft:{...drug}, tab:'overview'}))
  document.getElementById('btn-save-edit')?.addEventListener('click', () => {
    saveEdit(drug.id, {
      genericName: document.getElementById('edit-genericName').value,
      abbreviation: document.getElementById('edit-abbreviation').value,
      brandNames: document.getElementById('edit-brandNames').value.split(',').map(s=>s.trim()).filter(Boolean),
      route: document.getElementById('edit-route').value,
      formulations: document.getElementById('edit-formulations').value.split(',').map(s=>s.trim()).filter(Boolean),
      adultDose: document.getElementById('edit-adultDose').value,
      notes: document.getElementById('edit-notes').value,
      sideEffects: document.getElementById('edit-sideEffects').value,
    })
    setState({editMode:false,editDraft:null})
  })
}

function buildSetSearchResultsHTML(query) {
  const draft = state.setDraft || {drugIds:[]}
  const searchResults = query.trim()
    ? searchDrugsQ(query).filter(d=>!draft.drugIds.includes(d.id)).slice(0,8)
    : []
  if (!query.trim()) return ''
  if (searchResults.length===0) return `<div id="set-search-results"><p class="text-sm text-gray-400 text-center py-2">見つかりません</p></div>`
  return `<div id="set-search-results" class="space-y-1">${searchResults.map(d=>`
    <button data-add-drug="${d.id}" class="w-full flex items-center justify-between px-3 py-2 hover:bg-gray-50 rounded-lg text-left">
      <div><span class="text-sm text-gray-800">${esc(d.genericName)}</span>${d.abbreviation?`<span class="text-xs text-gray-500 ml-1">${esc(d.abbreviation)}</span>`:''}</div>
      <span class="text-blue-600 text-sm font-medium">追加</span>
    </button>`).join('')}</div>`
}

function attachCreateSet() {
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list',category:'__sets__'}))

  const setNameInput = document.getElementById('set-name-input')
  if (setNameInput) {
    setNameInput.value = state.setDraft?.name || ''
  }

  const setSearchInput = document.getElementById('set-search-input')
  if (setSearchInput) {
    setSearchInput.value = state.setQuery
    setSearchInput.addEventListener('input', e => {
      state.setQuery = e.target.value
      const resultsContainer = document.getElementById('set-search-results-wrapper')
      if (resultsContainer) {
        resultsContainer.innerHTML = buildSetSearchResultsHTML(state.setQuery)
        attachSetSearchResults()
      }
    })
  }

  attachSetSearchResults()

  app.querySelectorAll('[data-remove-drug]').forEach(b => b.addEventListener('click', () => {
    const ids = (state.setDraft?.drugIds||[]).filter(id=>id!==b.dataset.removeDrug)
    setState({setDraft:{...state.setDraft, drugIds:ids}})
  }))

  document.getElementById('btn-save-set')?.addEventListener('click', () => {
    const name = document.getElementById('set-name-input')?.value?.trim() || ''
    const draft = state.setDraft
    if (!name) { alert('セット名を入力してください'); return }
    if (!draft || draft.drugIds.length<1) { alert('薬剤を1つ以上選択してください'); return }
    const sets = loadSets()
    if (state.editSetId) {
      const idx = sets.findIndex(s=>s.id===state.editSetId)
      if (idx>=0) sets[idx] = {...sets[idx], name, drugIds:draft.drugIds}
    } else {
      sets.push({id:'set_'+Date.now(), name, drugIds:draft.drugIds})
    }
    saveSets(sets)
    setState({screen:'list', category:'__sets__', setDraft:null, editSetId:null})
  })
}

function attachSetSearchResults() {
  app.querySelectorAll('[data-add-drug]').forEach(b => b.addEventListener('click', () => {
    const ids = [...(state.setDraft?.drugIds||[]), b.dataset.addDrug]
    state.setQuery = ''
    setState({setDraft:{...state.setDraft, drugIds:ids}})
  }))
}

function attachAddDrug() {
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list'}))
  document.getElementById('btn-add-dose')?.addEventListener('click', () => setState({addDoses:[...(state.addDoses||[]), newDoseEntry()]}))
  app.querySelectorAll('[data-remove-dose]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.removeDose)
    setState({addDoses: state.addDoses.filter((_,i)=>i!==idx)})
  }))
  app.querySelectorAll('[data-dose][data-field]').forEach(input => {
    input.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.dose)
      const field = e.target.dataset.field
      const doses = [...state.addDoses]
      doses[idx] = {...doses[idx], [field]: e.target.value}
      setState({addDoses: doses})
    })
    input.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.dose)
      const field = e.target.dataset.field
      const doses = [...state.addDoses]
      doses[idx] = {...doses[idx], [field]: e.target.value}
      setState({addDoses: doses})
    })
  })
  app.querySelectorAll('[data-dose-type]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.doseType)
    const doses = [...state.addDoses]
    doses[idx] = {...doses[idx], doseType: b.dataset.type}
    setState({addDoses: doses})
  }))
  document.getElementById('btn-save-drug')?.addEventListener('click', () => {
    const gname = document.getElementById('add-genericName').value.trim()
    if (!gname) { alert('一般名を入力してください'); return }
    const drug = {
      id: 'custom_' + Date.now(),
      genericName: gname,
      abbreviation: document.getElementById('add-abbreviation').value.trim(),
      brandNames: document.getElementById('add-brandNames').value.split(',').map(s=>s.trim()).filter(Boolean),
      category: document.getElementById('add-category').value,
      route: document.getElementById('add-route').value.trim() || '内服',
      formulations: document.getElementById('add-formulations').value.split(',').map(s=>s.trim()).filter(Boolean),
      adultDose: document.getElementById('add-adultDose').value.trim(),
      notes: document.getElementById('add-notes').value.trim(),
      sideEffects: document.getElementById('add-sideEffects').value.trim(),
      references: document.getElementById('add-references').value.split(',').map(s=>s.trim()).filter(Boolean),
      pediatricDoses: state.addDoses.map(d => {
        const entry = {ageLabel: d.ageLabel || '全年齢', purpose: d.purpose || '治療'}
        if (d.ageMinYears!=='') entry.ageMinMonths = parseFloat(d.ageMinYears)*12
        if (d.ageMaxYears!=='') entry.ageMaxMonths = parseFloat(d.ageMaxYears)*12
        if (d.doseType==='weight' && d.dosePerKg!=='') entry.dosePerKg = parseFloat(d.dosePerKg)
        else if (d.doseType==='range') { if (d.dosePerKgMin!=='') entry.dosePerKgMin=parseFloat(d.dosePerKgMin); if (d.dosePerKgMax!=='') entry.dosePerKgMax=parseFloat(d.dosePerKgMax) }
        else if (d.fixedDose) entry.fixedDose = d.fixedDose
        if (d.maxDosePerDay!=='') entry.maxDosePerDay = parseFloat(d.maxDosePerDay)
        if (d.unit && d.unit !== 'mg') entry.unit = d.unit
        if (d.frequency) entry.frequency = d.frequency
        if (d.duration) entry.duration = d.duration
        if (d.notes) entry.notes = d.notes
        return entry
      }),
    }
    const pending = loadPendingDrugs()
    pending.push(drug)
    savePendingDrugs(pending)
    setState({screen:'list', category:'__pending__', addForm:null, addDoses:[]})
  })
}

function renderSectionContent(content) {
  if (!content) return ''
  return content.split('\n').map(line => {
    if (!line.trim()) return '<div class="h-2"></div>'
    if (line.match(/^[•・]/))
      return `<div class="flex gap-2 my-0.5"><span class="shrink-0 text-blue-500 font-bold">•</span><span>${esc(line.replace(/^[•・]\s*/,''))}</span></div>`
    if (line.match(/^[×✕]/))
      return `<div class="flex gap-2 my-0.5"><span class="shrink-0 text-red-500 font-bold">×</span><span>${esc(line.replace(/^[×✕]\s*/,''))}</span></div>`
    return `<p class="my-0.5">${esc(line)}</p>`
  }).join('')
}

function attachDiseaseDetail() {
  const disease = getDiseaseById(state.diseaseId)
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list'}))
  document.getElementById('btn-dis-fav')?.addEventListener('click', () => { if (disease) toggleDiseaseFav(disease.id) })

  document.getElementById('btn-confirm-disease')?.addEventListener('click', () => {
    if (!disease) return
    if (DISEASES.find(d => d.id === disease.id)) {
      confirmMasterDisease(disease.id)
    } else {
      const pending = loadPendingDiseases()
      const d = pending.find(x => x.id === disease.id)
      if (d) {
        const custom = loadCustomDiseases(); custom.push(d)
        saveCustomDiseases(custom)
        savePendingDiseases(pending.filter(x => x.id !== disease.id))
      }
    }
    render()
  })

  document.getElementById('btn-edit-disease')?.addEventListener('click', () => {
    if (!disease) return
    // 編集フォームに既存データをセット
    const contentStr = (disease.sections||[]).map(s => `【${s.title}】\n${s.content}`).join('\n\n')
    setState({screen:'add-disease', addDiseaseForm:{
      ...disease,
      points: disease.points||[],
      content: contentStr,
      _editId: disease.id,
    }})
  })

  document.getElementById('btn-del-disease')?.addEventListener('click', () => {
    if (!confirm('この疾患を削除しますか？')) return
    const id = state.diseaseId
    if (DISEASES.find(d => d.id === id)) {
      const h = new Set(LS.get('hidden_diseases','[]')); h.add(id)
      LS.set('hidden_diseases', [...h])
    } else {
      saveCustomDiseases(loadCustomDiseases().filter(d => d.id !== id))
      savePendingDiseases(loadPendingDiseases().filter(d => d.id !== id))
    }
    setState({screen:'list', diseaseId:null})
  })

  app.querySelectorAll('[data-drug]').forEach(b => b.addEventListener('click', () => {
    setState({screen:'detail', drugId:b.dataset.drug, tab:'calc', weight:'', age:'', ageUnit:'years', editMode:false})

function attachAddDisease() {
  const f = state.addDiseaseForm || {}
  document.getElementById('btn-back')?.addEventListener('click', () => {
    setState({screen: f._editId ? 'disease-detail' : 'list', addDiseaseForm:null})
  })

  // 画像追加
  document.getElementById('lbl-add-img')?.addEventListener('click', () => document.getElementById('inp-img')?.click())
  document.getElementById('inp-img')?.addEventListener('change', e => {
    const files = [...e.target.files]
    if (!files.length) return
    const currentImgs = (state.addDiseaseForm||{}).images || []
    let loaded = 0
    const newImgs = [...currentImgs]
    files.forEach(file => {
      const reader = new FileReader()
      reader.onload = ev => { newImgs.push({dataUrl:ev.target.result,caption:''}); if(++loaded===files.length) setState({addDiseaseForm:{...(state.addDiseaseForm||{}),images:newImgs}}) }
      reader.onerror = () => { alert(`「${file.name}」の読み込みに失敗しました`); if(++loaded===files.length) setState({addDiseaseForm:{...(state.addDiseaseForm||{}),images:newImgs}}) }
      reader.readAsDataURL(file)
    })
    e.target.value = ''
  })
  app.querySelectorAll('[data-del-img]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.delImg)
    const imgs = [...((state.addDiseaseForm||{}).images||[])]
    imgs.splice(idx,1)
    setState({addDiseaseForm:{...(state.addDiseaseForm||{}),images:imgs}})
  }))

  document.getElementById('btn-save-disease')?.addEventListener('click', () => {
    const name = document.getElementById('ad-name').value.trim()
    if (!name) { alert('疾患名を入力してください'); return }

    // 【見出し】でセクション分割
    const rawContent = document.getElementById('ad-content').value.trim()
    const sections = []
    let current = null
    rawContent.split('\n').forEach(line => {
      const m = line.match(/^【(.+?)】(.*)$/)
      if (m) {
        if (current) sections.push(current)
        current = {title: m[1], content: m[2].trim()}
      } else if (current) {
        current.content += (current.content ? '\n' : '') + line
      } else if (line.trim()) {
        sections.push({title: '内容', content: line})
      }
    })
    if (current) sections.push(current)

    // 画像キャプション収集
    const images = (state.addDiseaseForm?.images||[]).map((img,i) => ({
      dataUrl: img.dataUrl,
      caption: (document.querySelector(`[data-img-cap="${i}"]`)?.value||'').trim()
    }))

    const editId = f._editId
    const disease = {
      id: editId || 'disease_' + Date.now(),
      name,
      englishName: document.getElementById('ad-englishName').value.trim(),
      abbreviation: document.getElementById('ad-abbreviation').value.trim(),
      category: document.getElementById('ad-category').value,
      tags: [],
      points: document.getElementById('ad-points').value.split('\n').map(s=>s.trim()).filter(Boolean),
      sections,
      relatedDrugIds: editId ? (getDiseaseById(editId)?.relatedDrugIds||[]) : [],
      images,
      notes: document.getElementById('ad-notes').value.trim(),
    }

    if (editId) {
      // カスタム疾患を検索
      const custom = loadCustomDiseases()
      const ci = custom.findIndex(d => d.id === editId)
      if (ci >= 0) {
        custom[ci] = disease
        saveCustomDiseases(custom)
      } else {
        // pending を検索
        const pend = loadPendingDiseases()
        const pi = pend.findIndex(d => d.id === editId)
        if (pi >= 0) {
          pend[pi] = disease
          savePendingDiseases(pend)
        } else {
          // マスター疾患（DISEASES配列）→ カスタムにコピーして上書き
          custom.push(disease)
          saveCustomDiseases(custom)
          // マスターを非表示にして重複を防ぐ
          const h = new Set(LS.get('hidden_diseases','[]')); h.add(editId)
          LS.set('hidden_diseases', [...h])
        }
      }
      setState({screen:'disease-detail', diseaseId:editId, addDiseaseForm:null})
    } else {
      const pending = loadPendingDiseases()
      pending.push(disease)
      savePendingDiseases(pending)
      setState({screen:'list', mainTab:'diseases', addDiseaseForm:null, diseaseCat:null})
    }
  })
}

    const cats = getCategories()
    if (i === cats.length-1) return
    const c = [...cats];[c[i], c[i+1]] = [c[i+1], c[i]]
    saveUserCategories(c); render()
  }))

  app.querySelectorAll('[data-delete-cat]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.deleteCat)
    const cats = getCategories()
    if (cats.length <= 1) { alert('カテゴリは最低1つ必要です'); return }
    if (!confirm(`「${cats[i]}」を削除しますか？`)) return
    saveUserCategories(cats.filter((_,idx) => idx !== i)); render()
  }))

  document.getElementById('btn-add-cat')?.addEventListener('click', () => {
    const input = document.getElementById('new-cat-input')
    const name = input?.value?.trim()
    if (!name) return
    const cats = getCategories()
    if (cats.includes(name)) { alert('そのカテゴリはすでに存在します'); return }
    saveUserCategories([...cats, name]); render()
  })

  document.getElementById('btn-reset-cats')?.addEventListener('click', () => {
    if (!confirm('カテゴリを標準に戻しますか？')) return
    localStorage.removeItem('user_categories'); render()
  })
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox')
  document.getElementById('lightbox-img').src = src
  lb.style.display = 'flex'
}

render()
</script>
<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;" onclick="document.getElementById('lightbox').style.display='none'">
  <img id="lightbox-img" style="max-width:100%;max-height:100%;object-fit:contain;padding:16px;" />
</div>
</body>
</html>
