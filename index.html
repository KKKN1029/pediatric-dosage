const LS = {
  get: (k, d='{}') => { try { return JSON.parse(localStorage.getItem(k) || d) } catch { return JSON.parse(d) } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k),
}

// ============================================================
// マスターデータ同期 (Gist)
//   URL に ?gist=ID があれば優先して保存。
//   localStorage キャッシュを即時適用 → リモート再取得で上書き。
//   失敗時は組込みデータ (DRUGS / DISEASES / IV_FLUID_TABLES) で動作継続。
// ============================================================
const GIST_FILENAME = 'pediatric-dosage-data.json'
const GIST_LS_ID = 'master_gist_id'
const GIST_LS_CACHE = 'master_gist_cache'
const GIST_LS_CACHE_AT = 'master_gist_cache_at'

function getGistId() {
  try {
    const u = new URL(location.href)
    const fromUrl = u.searchParams.get('gist')
    if (fromUrl) {
      const id = extractGistId(fromUrl)
      localStorage.setItem(GIST_LS_ID, id)
      return id
    }
  } catch {}
  return localStorage.getItem(GIST_LS_ID) || ''
}
function setGistId(id) {
  if (!id) localStorage.removeItem(GIST_LS_ID)
  else localStorage.setItem(GIST_LS_ID, extractGistId(id))
}

function applyMasterData(data) {
  if (!data || typeof data !== 'object') return false
  // Gist のデータをそのまま採用（id ベースの自動同期は行わない。確認/未確認はユーザーが判断する）
  if (Array.isArray(data.drugs)) DRUGS = data.drugs
  if (Array.isArray(data.diseases)) DISEASES = data.diseases
  if (Array.isArray(data.ivFluidTables)) IV_FLUID_TABLES = data.ivFluidTables
  if (Array.isArray(data.drugCategories) && data.drugCategories.length) CATEGORIES = data.drugCategories
  if (Array.isArray(data.diseaseCategories) && data.diseaseCategories.length) DISEASE_CATEGORIES = data.diseaseCategories
  return true
}

// 入力された文字列から Gist ID を抽出する。
//   - 32桁/40桁の hex そのもの → そのまま返す
//   - https://gist.github.com/USER/ABC123 形式 → 末尾の hex を返す
//   - https://gist.github.com/ABC123 形式 → ABC123 を返す
//   - https://gist.githubusercontent.com/USER/ABC123/raw/... → ABC123 を返す
function extractGistId(input) {
  if (!input) return ''
  const s = String(input).trim()
  // 既に hex のみ
  if (/^[a-f0-9]{20,40}$/i.test(s)) return s
  // URL から最後の hex 部分を抽出
  const m = s.match(/([a-f0-9]{20,40})/i)
  return m ? m[1] : s
}

// Gist 取得は 2 段構え:
//   1) gist.github.com/{ID}.json で owner と filename を取得 (公開Webページ扱いで rate limit / CORS 制限が緩い)
//   2) gist.githubusercontent.com/{owner}/{ID}/raw/{filename} で実データを取得 (静的ファイル配信で確実)
// API (api.github.com) は iPhone Safari + プライベートリレー / 共有 IP で 404 になる事例があるため
// fallback としてのみ使用する。
async function fetchGistMaster(id) {
  let primaryError = null
  // --- Strategy A: メタJSON + raw (推奨) ---
  try {
    const metaRes = await fetch(`https://gist.github.com/${id}.json`, { cache: 'no-cache' })
    if (!metaRes.ok) throw new Error(`metadata HTTP ${metaRes.status}`)
    const meta = await metaRes.json()
    const owner = meta.owner
    const files = Array.isArray(meta.files) ? meta.files : []
    const filename = files.find(f => f === GIST_FILENAME) || files[0]
    if (!owner) throw new Error('owner 不明')
    if (!filename) throw new Error('ファイル一覧が空')
    const rawUrl = `https://gist.githubusercontent.com/${owner}/${id}/raw/${filename}`
    const rawRes = await fetch(rawUrl, { cache: 'no-cache' })
    if (!rawRes.ok) throw new Error(`raw HTTP ${rawRes.status}`)
    const text = await rawRes.text()
    return JSON.parse(text)
  } catch (e) {
    primaryError = e.message
    console.warn('[Gist raw 経由 失敗]', primaryError)
  }
  // --- Strategy B: API (fallback) ---
  try {
    const url = `https://api.github.com/gists/${id}`
    const token = localStorage.getItem('editor_gh_token') || ''
    const headers = { 'Accept': 'application/vnd.github+json' }
    if (token) headers['Authorization'] = 'Bearer ' + token
    const res = await fetch(url, { headers })
    if (!res.ok) {
      let detail = ''
      try { const j = await res.json(); if (j && j.message) detail = ' / ' + j.message } catch {}
      throw new Error(`API HTTP ${res.status}${detail}`)
    }
    const gist = await res.json()
    const file = gist.files[GIST_FILENAME] || Object.values(gist.files)[0]
    if (!file) throw new Error(`Gist 内に ${GIST_FILENAME} がありません (含まれるファイル: ${Object.keys(gist.files).join(', ') || 'なし'})`)
    const content = file.truncated ? await fetch(file.raw_url).then(r => r.text()) : file.content
    return JSON.parse(content)
  } catch (e) {
    throw new Error(`Gist 取得失敗\n  raw経由: ${primaryError}\n  API経由: ${e.message}`)
  }
}

// 起動時の同期: キャッシュ即時適用 → リモート fetch (バックグラウンド)
function applyCachedMasterIfAny() {
  const id = getGistId()
  if (!id) return false
  const cached = LS.get(GIST_LS_CACHE, 'null')
  return cached ? applyMasterData(cached) : false
}

// 直近の同期エラー (openMasterGistDialog でユーザーに見せるため)
let __lastGistError = ''
async function refreshMasterFromGist() {
  const id = getGistId()
  if (!id) return false
  try {
    const data = await fetchGistMaster(id)
    const changed = applyMasterData(data)
    LS.set(GIST_LS_CACHE, data)
    localStorage.setItem(GIST_LS_CACHE_AT, String(Date.now()))
    __lastGistError = ''
    return changed
  } catch (e) {
    __lastGistError = e.message
    console.warn('[Gist 同期失敗]', e.message)
    return false
  }
}

// マスターデータ同期の設定ダイアログ (sidebar の ⚙ ボタンから開く)
async function openMasterGistDialog() {
  const current = getGistId()
  const cachedAt = localStorage.getItem(GIST_LS_CACHE_AT)
  const cachedAtStr = cachedAt ? new Date(+cachedAt).toLocaleString('ja-JP') : '(未同期)'
  const status = current
    ? `現在の Gist ID: ${current}\n最終同期: ${cachedAtStr}\n\n変更しない場合はそのまま OK を、解除する場合は空欄にしてください。`
    : 'マスターデータの Gist ID を入力してください。\n空欄のままなら組込みデータを使用します。'
  const next = prompt(status + '\n\nGist ID:', current)
  if (next === null) return // キャンセル
  const trimmed = next.trim()
  if (trimmed === current) return
  if (!trimmed) {
    if (!confirm('Gist 連携を解除します。組込みデータのみを使用するようになります。よろしいですか？')) return
    setGistId('')
    localStorage.removeItem(GIST_LS_CACHE)
    localStorage.removeItem(GIST_LS_CACHE_AT)
    alert('解除しました。ページを再読込します。')
    location.reload()
    return
  }
  const cleanId = extractGistId(trimmed)
  setGistId(cleanId)
  localStorage.removeItem(GIST_LS_CACHE)
  localStorage.removeItem(GIST_LS_CACHE_AT)
  const ok = await refreshMasterFromGist()
  if (ok) { alert('Gist からマスターデータを取得しました。ページを再読込します。'); location.reload() }
  else {
    alert('Gist の取得に失敗しました。\n\n入力された ID: ' + cleanId + '\n\nエラー詳細:\n' + (__lastGistError || '不明なエラー') + '\n\n確認事項:\n• Gist ID が正しいか (32桁の英数字)\n• Gist が削除されていないか\n• ネットワーク接続が有効か')
  }
}

// ============================================================
// 計算
// ============================================================

function round1(n) { return Math.round(n*10)/10 }
// 製剤文字列から濃度を解釈し、必要 mg を実際の量 (g/mL/mg/錠/包/V) に換算する。
//   戻り値: { label, amount }[] または [] (該当なし)
//   amount は文字列で、単位込みで返す ("3 g", "12.5 mL", "1.5 錠" など)
//
// 認識する記法:
//   "細粒 10%"        → solid (粉/末/細粒/顆粒/DS/散) → X% = (X*10) mg/g
//   "シロップ 0.5mg/mL" → liquid → X mg/mL
//   "シロップ 0.2%"   → liquid → X% = (X*10) mg/mL
//   "DS 100mg/g"     → solid → X mg/g
//   "錠 250mg"        → 1錠あたり X mg (その他: カプセル, OD錠, チュアブル錠, 散剤..)
//   "注射用 1g/V"     → 1V あたり X g (バイアル換算)
//   "顆粒 4mg/包"     → 1包あたり X mg
function parseFormulation(s) {
  if (!s) return null
  const text = String(s).trim()
  // 区切り (空白) で本体名と濃度部分に分けるが、含むキーワードを判定するため全体も使う
  const isLiquid = /シロップ|液|内用液|懸濁液|ドロップ|ドライシロップ|エリキシル|drops?|syrup/i.test(text)
  const isSolid = /細粒|顆粒|散|末|粉|DS|ドライ|ドライシロップ|G\b|granul/i.test(text) && !isLiquid
  // ドライシロップ (DS) は溶解前は固形だが、調剤時は固形として扱う (mg/g 表記が一般的)
  // X mg/mL
  let m = text.match(/(\d+(?:\.\d+)?)\s*mg\s*\/\s*ml/i)
  if (m) return { kind: 'mg_per_mL', value: +m[1], displayUnit: 'mL', formText: text }
  // X mg/g (DS, 細粒)
  m = text.match(/(\d+(?:\.\d+)?)\s*mg\s*\/\s*g/i)
  if (m) {
    // 副情報として「Y g/包」(1包あたりのg数) も拾う → 換算結果に "X g (= P 包)" を併記
    const ppm = text.match(/(\d+(?:\.\d+)?)\s*g\s*\/\s*包/i)
    const perPacketG = ppm ? +ppm[1] : null
    return { kind: 'mg_per_g', value: +m[1], displayUnit: 'g', formText: text, perPacketG }
  }
  // X mg/包 (分包品)
  m = text.match(/(\d+(?:\.\d+)?)\s*mg\s*\/\s*包/)
  if (m) return { kind: 'mg_per_unit', value: +m[1], displayUnit: '包', formText: text }
  // X mg/V (バイアル, 注射剤)
  m = text.match(/(\d+(?:\.\d+)?)\s*mg\s*\/\s*V/i)
  if (m) return { kind: 'mg_per_unit', value: +m[1], displayUnit: 'V', formText: text }
  m = text.match(/(\d+(?:\.\d+)?)\s*g\s*\/\s*V/i)
  if (m) return { kind: 'mg_per_unit', value: +m[1] * 1000, displayUnit: 'V', formText: text }
  // X mg/ブリスター (吸入剤)
  m = text.match(/(\d+(?:\.\d+)?)\s*mg\s*\/\s*ブリスター/)
  if (m) return { kind: 'mg_per_unit', value: +m[1], displayUnit: 'ブリスター', formText: text }
  // X% (濃度)
  m = text.match(/(\d+(?:\.\d+)?)\s*%/)
  if (m) {
    const pct = +m[1]
    if (isLiquid) return { kind: 'mg_per_mL', value: pct * 10, displayUnit: 'mL', formText: text }
    if (isSolid) return { kind: 'mg_per_g', value: pct * 10, displayUnit: 'g', formText: text }
    // どちらか不明 → 固形扱い (DS や細粒/散で % 表記が圧倒的に多い)
    return { kind: 'mg_per_g', value: pct * 10, displayUnit: 'g', formText: text }
  }
  // 単位用量 (錠, カプセル, 坐剤, OD錠, チュアブル錠, バッグ, バイアル, アンプル, キット ..)
  // 例: "錠 250mg" / "錠 100/200mg" / "坐剤 100/200/400mg" / "点滴静注液バッグ 300mg"
  m = text.match(/(\d+(?:\.\d+)?)\s*mg(?!\s*\/)/i)
  if (m) {
    return { kind: 'mg_per_unit', value: +m[1], displayUnit: guessUnitLabel(text), formText: text }
  }
  m = text.match(/(\d+(?:\.\d+)?)\s*g(?!\s*\/)/i)
  if (m) {
    return { kind: 'mg_per_unit', value: +m[1] * 1000, displayUnit: guessUnitLabel(text), formText: text }
  }
  return null
}

// 製剤文字列から単位ラベル ("錠"/"カプセル"/"バイアル" など) を推定する
function guessUnitLabel(text) {
  // 注射剤 (より具体的なものから判定)
  if (/バッグ|bag\b/i.test(text)) return 'バッグ'
  if (/バイアル|vial\b/i.test(text)) return 'バイアル'
  if (/アンプル|ampoule|ampule\b/i.test(text)) return 'アンプル'
  if (/キット/.test(text)) return 'キット'
  if (/プレフィルド|シリンジ/.test(text)) return '本'
  // 注射剤 (一般指定)
  if (/注射用|注射液|点滴|静注|筋注|皮下注/.test(text)) return 'V'
  // 経口固形剤
  if (/カプセル|capsule/i.test(text)) return 'カプセル'
  if (/OD錠/.test(text)) return 'OD錠'
  if (/チュアブル/.test(text)) return '錠'
  if (/錠/.test(text)) return '錠'
  // 坐剤・吸入・パッチ
  if (/坐剤|坐薬|座薬|suppos/i.test(text)) return '個'
  if (/吸入|inhal|ブリスター/i.test(text)) return '吸入'
  if (/パッチ|貼付|テープ/.test(text)) return '枚'
  // 包・分包 (1包あたりの記載があるもの)
  if (/分包|包/.test(text)) return '包'
  // 粉末・顆粒系 (DS等は重量で計量するため '錠' や '包' ではなく g)
  if (/DS|ドライシロップ|ドライシ|細粒|顆粒|散剤|散\b|末|粉末/.test(text)) return 'g'
  // 液剤系
  if (/シロップ|液|ドロップ/.test(text)) return 'mL'
  return '個'  // デフォルト
}

// 必要 mg 量から、各 formulation で必要な実数量を計算する。
//   needMg: 必要 mg 量 (単一値)
//   forms: drug.formulations (string[] または object[])
//   戻り値: { formText, amountStr }[]  (患者の年齢/体重に合わない剤形は除外)
function buildFormulationAmounts(needMg, forms, dose) {
  if (!Array.isArray(forms) || forms.length === 0) return []
  if (!isFinite(needMg) || needMg <= 0) return []
  const round = (v) => {
    if (!isFinite(v)) return '?'
    if (v >= 100) return Math.round(v).toString()
    if (v >= 10) return (Math.round(v * 10) / 10).toString()
    return (Math.round(v * 100) / 100).toString()
  }
  const am = ageToMonths()
  const w = parseFloat(state.weight)
  return forms.map(f => {
    const norm = normalizeFormulation(f)
    if (!norm) return null
    if (!isFormulationAllowed(norm, am, w, dose)) return null  // 年齢/体重制約に合わない剤形は除外
    const p = parseFormulation(norm.text)
    if (!p) return null
    let amount
    if (p.kind === 'mg_per_mL' || p.kind === 'mg_per_g' || p.kind === 'mg_per_unit') {
      amount = needMg / p.value
      let amountStr = `${round(amount)} ${p.displayUnit}`
      // mg/g 形式 + 1包あたりのg数が指定されていれば包数を併記
      // 例: "クラバモックス配合DS 600mg/g (1.01g/包)" → "2.1 g (= 2.08 包)"
      if (p.kind === 'mg_per_g' && p.perPacketG && p.perPacketG > 0) {
        const packets = amount / p.perPacketG
        amountStr = `${round(amount)} g (= ${round(packets)} 包)`
      }
      // notes (例: "1包 1.01g中 AMPC 600mg") を補助情報として返す
      return { formText: p.formText, amountStr, notes: norm.notes || '', amountValue: amount, amountUnit: p.displayUnit }
    }
    return null
  }).filter(Boolean)
}

function calcDoseResult(dose, weight) {
  // 固定量は体重に依存しないため、体重未入力でも結果を返す
  if (dose.fixedDose) return {text: dose.fixedDose, perDose: null}
  if (!weight || weight <= 0) return null
  const unit = dose.unit || 'mg'
  // 力価ラベル (例: "AMPC として") を 1日量・1回量の文頭に付ける
  const activePrefix = dose.activeLabel ? `${dose.activeLabel} ` : ''
  let text, min, max
  if (dose.dosePerKg) {
    const t = round1(Math.min(dose.dosePerKg*weight, dose.maxDosePerDay??Infinity))
    text=`${activePrefix}${t} ${unit}/日`; min=max=t
  } else if (dose.dosePerKgMin!=null && dose.dosePerKgMax!=null) {
    const lo=round1(Math.min(dose.dosePerKgMin*weight, dose.maxDosePerDay??Infinity))
    const hi=round1(Math.min(dose.dosePerKgMax*weight, dose.maxDosePerDay??Infinity))
    text = lo===hi ? `${activePrefix}${lo} ${unit}/日` : `${activePrefix}${lo}〜${hi} ${unit}/日`; min=lo; max=hi
  } else return null
  let perDose=null
  const m=dose.frequency?.match(/分(\d+)/)
  if (m) { const n=parseInt(m[1]); perDose=min===max?`1回 ${activePrefix}${round1(min/n)} ${unit}`:`1回 ${activePrefix}${round1(min/n)}〜${round1(max/n)} ${unit}` }
  return {text, perDose}
}

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

// 日本語検索用の正規化:
//   ・ひらがな → カタカナ (例: あもきししりん → アモキシシリン に一致)
//   ・全角英数 → 半角 (NFKC)
//   ・小文字化、トリム
function jpNorm(s) {
  if (s == null) return ''
  let v = String(s)
  try { v = v.normalize('NFKC') } catch {}
  // ひらがな(U+3041..U+3096) → カタカナ(U+30A1..U+30F6) は +0x60
  v = v.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60))
  return v.toLowerCase().trim()
}

function bindTextInput(id, callback) {
  const el = document.getElementById(id)
  if (!el) return
  let composing = false
  el.addEventListener('compositionstart', () => { composing = true })
  el.addEventListener('compositionend', e => { composing = false; callback(e.target.value) })
  el.addEventListener('input', e => { if (!composing) callback(e.target.value) })
}

function doseCard(dose, weight, compact=false, drug=null) {
  const result = calcDoseResult(dose, weight)
  const unit = dose.unit || 'mg'
  const activePref = dose.activeLabel ? `${dose.activeLabel} として ` : ''
  const prescText = dose.fixedDose ? dose.fixedDose
    : dose.dosePerKg ? `${activePref}${dose.dosePerKg} ${unit}/kg/日${dose.maxDosePerDay?` ［最大${dose.maxDosePerDay}${unit}/日］`:''}`
    : dose.dosePerKgMin!=null ? `${activePref}${dose.dosePerKgMin}〜${dose.dosePerKgMax} ${unit}/kg/日${dose.maxDosePerDay?` ［最大${dose.maxDosePerDay}${unit}/日］`:''}`
    : ''
  // 固定量の場合は処方内容そのものを青ボックスで大きく表示し、上の灰色プレ表示は省略する。
  // mg/kg の場合は、灰色の処方式 (例: 0.06 mg/kg/日) と青の計算結果 (例: 0.6 mg/日) を分けて表示。
  const isFixedDose = !!dose.fixedDose
  const resultHtml = !result ? (parseFloat(weight)>0 ? `<div class="text-gray-400 text-xs mt-1">この年齢では対象外</div>` : '')
    : `<div class="bg-blue-50 rounded-lg p-3 ${isFixedDose ? '' : 'mt-2'}">
        <div class="text-blue-800 font-bold ${compact?'text-base':'text-lg'}">${result.text}</div>
        ${result.perDose||dose.frequency?`<div class="text-blue-600 text-sm mt-0.5">${result.perDose?result.perDose+'　':''}${dose.frequency||''}${dose.duration?'　'+dose.duration:''}</div>`:''}
      </div>`
  // 製剤量換算 (mg / g / μg ベースの用量に対応)
  // 単位 → mg 変換係数。null は換算不可 (mL, IU, 包, カプセル など)
  const unitMgFactor = (u) => u === 'mg' ? 1 : u === 'g' ? 1000 : (u === 'μg' || u === 'ug') ? 0.001 : null
  const factor = unitMgFactor(unit)
  let formulationsHtml = ''
  if (result && drug && factor !== null && Array.isArray(drug.formulations) && drug.formulations.length > 0) {
    // 1日量と1回量の両方を計算 (dose.unit 単位で算出後に mg へ変換)
    const freq = (() => { const m = dose.frequency?.match(/分(\d+)/); return m ? parseInt(m[1]) : null })()
    let dailyMin, dailyMax  // dose.unit 単位
    if (dose.dosePerKg) {
      dailyMin = dailyMax = Math.min(dose.dosePerKg * weight, dose.maxDosePerDay ?? Infinity)
    } else if (dose.dosePerKgMin != null && dose.dosePerKgMax != null) {
      dailyMin = Math.min(dose.dosePerKgMin * weight, dose.maxDosePerDay ?? Infinity)
      dailyMax = Math.min(dose.dosePerKgMax * weight, dose.maxDosePerDay ?? Infinity)
    } else if (dose.fixedDose) {
      // 「X mg/日」「X g/日」「X μg/日」「範囲」のパターンを抽出 (dose.unit と一致しない場合も対応)
      const fd = String(dose.fixedDose)
      const unitPat = unit === 'g' ? 'g' : unit === 'μg' || unit === 'ug' ? '(?:μg|ug)' : 'mg'
      let mm = fd.match(new RegExp(`(\\d+(?:\\.\\d+)?)\\s*[〜~]\\s*(\\d+(?:\\.\\d+)?)\\s*${unitPat}\\s*/\\s*日`, 'i'))
      if (mm) { dailyMin = parseFloat(mm[1]); dailyMax = parseFloat(mm[2]) }
      else {
        const m1 = fd.match(new RegExp(`(\\d+(?:\\.\\d+)?)\\s*${unitPat}\\s*/\\s*日`, 'i'))
        if (m1) dailyMin = dailyMax = parseFloat(m1[1])
        else {
          const m2 = fd.match(new RegExp(`(\\d+(?:\\.\\d+)?)\\s*${unitPat}.*?1日\\s*(\\d+)\\s*回`, 'i'))
          if (m2) { dailyMin = dailyMax = parseFloat(m2[1]) * parseInt(m2[2]) }
        }
      }
    }
    if (dailyMin != null && dailyMax != null) {
      // dose の単位を mg に変換して buildFormulationAmounts に渡す
      const toMg = v => v * factor
      const buildAmount = (valMin, valMax) => {
        const mgMin = toMg(valMin); const mgMax = toMg(valMax)
        const list = buildFormulationAmounts(mgMin, drug.formulations, dose)
        if (mgMin === mgMax) return list.map(a => ({ formText: a.formText, str: a.amountStr, notes: a.notes || '' }))
        const maxList = buildFormulationAmounts(mgMax, drug.formulations, dose)
        return list.map(a => {
          const max = maxList.find(b => b.formText === a.formText)
          return { formText: a.formText, str: max ? `${a.amountStr.split(' ')[0]}〜${max.amountStr}` : a.amountStr, notes: a.notes || '' }
        })
      }
      const daily = buildAmount(dailyMin, dailyMax)
      const perDose = freq ? buildAmount(dailyMin/freq, dailyMax/freq) : []
      if (daily.length > 0) {
        // 力価ラベル付きの場合: "AMPC 換算 X mg" のような表示
        const activePrefix = dose.activeLabel ? `${dose.activeLabel} ` : ''
        const fmtUnit = unit
        const fmtAmount = v => {
          if (v >= 100) return Math.round(v).toString()
          if (v >= 10) return (Math.round(v * 10) / 10).toString()
          return (Math.round(v * 100) / 100).toString()
        }
        const activeStr = dailyMin === dailyMax
          ? `${activePrefix}${fmtAmount(dailyMin)} ${fmtUnit}/日`
          : `${activePrefix}${fmtAmount(dailyMin)}〜${fmtAmount(dailyMax)} ${fmtUnit}/日`
        const headerLabel = freq ? `1日量 (1回量 ${dose.frequency})` : '1日量'
        const rows = daily.map(d => {
          const p = perDose.find(x => x.formText === d.formText)
          const perStr = p ? `<span class="text-gray-500 text-[11px] ml-1">(1回 ${p.str})</span>` : ''
          const noteStr = d.notes ? `<div class="text-[10px] text-gray-500 leading-tight">${esc(d.notes)}</div>` : ''
          return `<div class="flex justify-between items-baseline gap-2 text-xs">
            <div class="min-w-0 flex-1">
              <div class="text-gray-600 truncate">${esc(d.formText)}</div>
              ${noteStr}
            </div>
            <span class="text-gray-800 font-semibold whitespace-nowrap">${d.str}${perStr}</span>
          </div>`
        }).join('')
        const activeBadge = dose.activeLabel
          ? `<div class="text-[11px] text-emerald-700 font-semibold mb-1">${esc(activeStr)}</div>`
          : ''
        formulationsHtml = `
          <div class="mt-2 bg-emerald-50 border border-emerald-100 rounded-lg p-2.5">
            ${activeBadge}
            <div class="text-[11px] text-gray-500 font-medium mb-1">${headerLabel}</div>
            <div class="space-y-0.5">${rows}</div>
          </div>`
      }
    }
  }
  // 成分内訳 (合剤・配合処方用): dose.components に [{label, mgPerDay}] を登録すると
  // 各成分の mg/日 と mg/kg/日、および比率を表示する。
  let componentsHtml = ''
  if (Array.isArray(dose.components) && dose.components.length > 0) {
    const w = parseFloat(weight)
    const hasW = isFinite(w) && w > 0
    const fmtMg = v => v >= 100 ? Math.round(v).toString() : v >= 10 ? (Math.round(v*10)/10).toString() : (Math.round(v*100)/100).toString()
    const validComps = dose.components.filter(c => c && c.label && isFinite(+c.mgPerDay) && +c.mgPerDay > 0)
    if (validComps.length > 0) {
      const rows = validComps.map(c => {
        const mg = +c.mgPerDay
        const perKg = hasW ? (mg / w) : null
        const perKgStr = perKg != null ? `<span class="text-gray-500 text-[11px] ml-1">(${fmtMg(perKg)} mg/kg/日)</span>` : ''
        return `<div class="flex justify-between items-baseline gap-2 text-xs">
          <span class="text-purple-800 font-semibold">${esc(c.label)}</span>
          <span class="text-gray-800 font-semibold whitespace-nowrap">${fmtMg(mg)} mg/日 ${perKgStr}</span>
        </div>`
      }).join('')
      // 比率 (2成分以上時のみ)
      let ratioStr = ''
      if (validComps.length >= 2) {
        const minComp = validComps.reduce((a, b) => +a.mgPerDay < +b.mgPerDay ? a : b)
        const ratios = validComps.map(c => `${esc(c.label)}:${(+c.mgPerDay / +minComp.mgPerDay).toFixed(1)}`).join(' = ')
        ratioStr = `<div class="text-[11px] text-purple-600 mt-1">比率 ${ratios}</div>`
      }
      componentsHtml = `
        <div class="mt-2 bg-purple-50 border border-purple-100 rounded-lg p-2.5">
          <div class="text-[11px] text-purple-700 font-medium mb-1">成分内訳${hasW?` (体重 ${w}kg)`:''}</div>
          <div class="space-y-0.5">${rows}</div>
          ${ratioStr}
        </div>`
    }
  }
  return `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="bg-gray-50 border-b border-gray-100 px-4 py-2 flex items-center justify-between">
        <span class="text-sm font-semibold text-gray-700">${dose.ageLabel}</span>
        ${purposeBadge(dose.purpose)}
      </div>
      <div class="px-4 py-3">
        ${isFixedDose ? '' : `<div class="text-sm text-gray-500">${prescText}</div>`}
        ${resultHtml}
        ${componentsHtml}
        ${formulationsHtml}
        ${dose.notes?`<div class="mt-2 text-xs text-amber-700 bg-amber-50 rounded-lg px-3 py-2">${esc(dose.notes)}</div>`:''}
      </div>
    </div>`
}

function filteredDoses(drug) {
  const am = ageToMonths()
  const w = parseFloat(state.weight)
  const hasWeight = isFinite(w) && w > 0
  return drug.pediatricDoses.filter(d => {
    // 年齢フィルタ (年齢未入力なら通過)
    if (am !== undefined) {
      const minOk = d.ageMinMonths==null || am>=d.ageMinMonths
      const maxOk = d.ageMaxMonths==null || am<d.ageMaxMonths
      if (!(minOk && maxOk)) return false
    }
    // 体重フィルタ (体重未入力なら通過)
    if (hasWeight) {
      const wMinOk = d.weightMinKg==null || w>=d.weightMinKg
      const wMaxOk = d.weightMaxKg==null || w<d.weightMaxKg
      if (!(wMinOk && wMaxOk)) return false
    }
    return true
  })
}

// 入力された年齢が、設定された小児用量の最小年齢を「すべて」下回っているかを判定。
//   - 全ての pediatricDoses に ageMinMonths が設定されていて、
//   - 入力年齢がすべての ageMinMonths 未満の場合 → true
function isAgeUnderPediatric(drug) {
  const am = ageToMonths()
  if (am === undefined) return false
  const doses = drug.pediatricDoses || []
  if (doses.length === 0) return false
  const minAges = doses.map(d => d.ageMinMonths).filter(v => v != null)
  if (minAges.length === 0) return false
  if (minAges.length < doses.length) return false  // 最小年齢未設定の用量があれば該当しない
  return am < Math.min(...minAges)
}

// 入力された年齢が、設定された小児用量の最大年齢を「すべて」超えているかを判定。
//   - 全ての pediatricDoses に ageMaxMonths が設定されていて、
//   - 入力年齢がすべての ageMaxMonths 以上の場合 → true
//   - どれか1つでも上限未設定 (open-ended) の用量があれば false (高年齢もカバーされていると判断)
function isAgeOverPediatric(drug) {
  const am = ageToMonths()
  if (am === undefined) return false
  const doses = drug.pediatricDoses || []
  if (doses.length === 0) return false
  const hasOpenEnded = doses.some(d => d.ageMaxMonths == null)
  if (hasOpenEnded) return false
  const maxAge = Math.max(...doses.map(d => d.ageMaxMonths))
  return am >= maxAge
}

// 成人量カード (年齢が小児用量範囲を超えた場合に表示)

      </div>

// 用量カード一覧の HTML を返す共通ヘルパー。
//   年齢が小児用量範囲を超えていれば成人量カード、そうでなければ通常の小児用量カードを並べる。
function dosesHTML(drug, weight, compact=false) {
  if (isAgeOverPediatric(drug)) return adultDoseCard(drug, compact)
  if (isAgeUnderPediatric(drug)) {
    return `
      <div class="bg-white rounded-xl shadow-sm border-2 border-gray-200 overflow-hidden">
        <div class="bg-gray-50 border-b border-gray-200 px-4 py-2">
          <span class="text-sm font-semibold text-gray-700">適応外（最小年齢未満）</span>
        </div>
        <div class="px-4 py-3">
          <div class="text-gray-500 text-xs leading-relaxed">入力された年齢がこの薬剤の小児用量設定の最小年齢を下回っています。<br/>必要に応じて担当医の判断で投与量を決定してください。</div>
        </div>
      </div>`
  }
  const matched = filteredDoses(drug)
  if (matched.length === 0) {
    const w = parseFloat(state.weight)
    const hasW = isFinite(w) && w > 0
    const am = ageToMonths()
    const reasons = []
    if (am !== undefined) reasons.push('年齢')
    if (hasW) reasons.push('体重')
    const reason = reasons.length > 0 ? `この${reasons.join('・')}` : '入力条件'
    return `
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-center text-xs text-gray-500">
        ${reason}に該当する用量設定がありません
      </div>`
  }
  return matched.map(d => doseCard(d, weight, compact, drug)).join('')
}

// ── リスト画面 ────────────────────────────────────────────

// 投与経路文字列をカラーバッジ HTML に変換する。
//   freeform string ('内服', '点滴静注', '内服・坐剤', etc.) を「・」で分割し、
//   各経路をキーワード判定して色付きの小さなバッジで返す。
function routeBadge(route) {
  if (!route) return ''
  const parts = String(route).split(/[・,、\/]/).map(s => s.trim()).filter(Boolean)
  return parts.map(p => {
    let color, label = p
    if (/点滴|静注|筋注|皮下注|注射/.test(p)) {
      color = 'bg-purple-100 text-purple-700'
      // 短縮表示
      if (p === '点滴静注') label = '点滴'
    } else if (/吸入/.test(p)) color = 'bg-cyan-100 text-cyan-700'
    else if (/坐剤|坐薬|座薬/.test(p)) { color = 'bg-orange-100 text-orange-700'; label = '坐剤' }
    else if (/外用|塗布|貼付|貼/.test(p)) color = 'bg-green-100 text-green-700'
    else if (/点眼|点鼻|点耳/.test(p)) color = 'bg-teal-100 text-teal-700'
    else if (/内服/.test(p)) color = 'bg-blue-100 text-blue-700'
    else color = 'bg-gray-100 text-gray-700'
    return `<span class="text-[10px] px-1.5 py-0.5 rounded font-medium leading-none ${color} shrink-0">${esc(label)}</span>`
  }).join('')
}

// 製剤文字列または { text, ageMinMonths, ageMaxMonths, weightMinKg, weightMaxKg, notes } 形式を
// 共通の object に正規化する。
function normalizeFormulation(f) {
  if (typeof f === 'string') return { text: f }
  if (f && typeof f === 'object' && typeof f.text === 'string') return { ...f }
  return null
}

// 制約 object → 表示用テキスト (例: "≥6歳", "≥10kg, <40kg", "<3ヶ月禁忌")
function formulationConstraintText(form) {
  if (!form) return ''
  const parts = []
  const fmtAge = m => {
    if (m === 0) return '0ヶ月'
    if (m < 12) return `${m}ヶ月`
    if (m % 12 === 0) return `${m/12}歳`
    return `${m}ヶ月`
  }
  if (form.ageMinMonths != null && form.ageMaxMonths != null) {
    parts.push(`${fmtAge(form.ageMinMonths)}〜${fmtAge(form.ageMaxMonths)}未満`)
  } else if (form.ageMinMonths != null) {
    parts.push(`${fmtAge(form.ageMinMonths)}以上`)
  } else if (form.ageMaxMonths != null) {
    parts.push(`${fmtAge(form.ageMaxMonths)}未満`)
  }
  if (form.weightMinKg != null && form.weightMaxKg != null) {
    parts.push(`${form.weightMinKg}〜${form.weightMaxKg}kg未満`)
  } else if (form.weightMinKg != null) {
    parts.push(`${form.weightMinKg}kg以上`)
  } else if (form.weightMaxKg != null) {
    parts.push(`${form.weightMaxKg}kg未満`)
  }
  if (form.notes) parts.push(form.notes)
  return parts.join(' / ')
}

// 全 formulations を表示用テキスト (制約付き) に変換 (info 行用)
function formulationDisplay(forms) {
  if (!Array.isArray(forms)) return ''
  return forms.map(f => {
    const n = normalizeFormulation(f)
    if (!n) return ''
    const c = formulationConstraintText(n)
    return c ? `${n.text} [${c}]` : n.text
  }).filter(Boolean).join('、')
}

// 患者の年齢 (月数) と体重 (kg) で formulation が使用可能か判定する。
// 患者値が未入力でも、dose の年齢/体重範囲があればそれを使って範囲オーバーラップ判定する。
function isFormulationAllowed(form, am, w, dose) {
  if (!form) return false
  // 年齢: 患者の年齢が入力されていればそれで判定。未入力なら dose の年齢範囲と重なるかチェック
  if (am !== undefined) {
    if (form.ageMinMonths != null && am < form.ageMinMonths) return false
    if (form.ageMaxMonths != null && am >= form.ageMaxMonths) return false
  } else if (dose) {
    // form が必要とする最小年齢が dose の最大年齢以上 → 範囲が交わらないので除外
    if (dose.ageMaxMonths != null && form.ageMinMonths != null && form.ageMinMonths >= dose.ageMaxMonths) return false
    // form の最大年齢が dose の最小年齢以下 → 同上
    if (dose.ageMinMonths != null && form.ageMaxMonths != null && form.ageMaxMonths <= dose.ageMinMonths) return false
  }
  // 体重: 同様
  if (isFinite(w) && w > 0) {
    if (form.weightMinKg != null && w < form.weightMinKg) return false
    if (form.weightMaxKg != null && w >= form.weightMaxKg) return false
  } else if (dose) {
    if (dose.weightMaxKg != null && form.weightMinKg != null && form.weightMinKg >= dose.weightMaxKg) return false
    if (dose.weightMinKg != null && form.weightMaxKg != null && form.weightMaxKg <= dose.weightMinKg) return false
  }
  return true
}

// サブカテゴリで items をグループ化して見出し付き <ul> 文字列を返す。
// item ごとに renderItem(item) が呼ばれ、<li> を返すこと。
// グループ分けが不要 (全アイテムにサブカテゴリが無い) 場合は単純なリストを返す。
function renderListBySubcategory(items, renderItem) {
  if (!items || items.length === 0) return ''
  const hasAnySub = items.some(i => i && typeof i.subcategory === 'string' && i.subcategory.trim() !== '')
  if (!hasAnySub) return items.map(renderItem).join('')
  // 出現順を維持しつつグループ化
  const order = []
  const groups = new Map()
  for (const i of items) {
    const sub = (i && typeof i.subcategory === 'string') ? i.subcategory.trim() : ''
    const key = sub || '__other__'
    if (!groups.has(key)) { groups.set(key, []); order.push(key) }
    groups.get(key).push(i)
  }
  // 「__other__」(サブカテゴリなし) は末尾へ
  const ordered = order.filter(k => k !== '__other__').concat(order.includes('__other__') ? ['__other__'] : [])
  return ordered.map(key => {
    const list = groups.get(key)
    const label = key === '__other__' ? 'その他' : key
    const header = `<li class="px-4 py-1.5 text-[11px] font-semibold text-gray-500 bg-gray-50 border-b border-gray-100 sticky top-0">${esc(label)} <span class="text-gray-400 font-normal">(${list.length})</span></li>`
    return header + list.map(renderItem).join('')
  }).join('')
}

function calcHolidaySegar(weight) {
  if (!weight || weight <= 0) return null
  const w = parseFloat(weight)
  if (isNaN(w) || w <= 0) return null
  let daily
  if (w <= 10) { daily = w * 100 }
  else if (w <= 20) { daily = 1000 + (w - 10) * 50 }
  else { daily = 1500 + (w - 20) * 20 }
  const hourly = daily / 24
  return {
    daily: Math.round(daily),
    hourly: Math.round(hourly * 10) / 10,
  }
}

function calcGIR(glc, rate, weight) {
  const g = parseFloat(glc), r = parseFloat(rate), w = parseFloat(weight)
  if (!g || !r || !w || g<=0 || r<=0 || w<=0) return null
  return Math.round(g * 10 * r / (w * 60) * 100) / 100
}
function calcGIRRate(gir, glc, weight) {
  const t = parseFloat(gir), g = parseFloat(glc), w = parseFloat(weight)
  if (!t || !g || !w || t<=0 || g<=0 || w<=0) return null
  return Math.round(t * w * 60 / (g * 10) * 10) / 10
}

// 薬剤量 (mg), 溶解液量 (mL), γ (μg/kg/min), 体重 (kg) → 注入速度 (mL/hr)
function calcMlhFromGamma(drug, fluid, gamma, weight) {
  const d = parseFloat(drug), f = parseFloat(fluid), g = parseFloat(gamma), w = parseFloat(weight)
  if (!d || !f || !g || !w || d<=0 || f<=0 || g<=0 || w<=0) return null
  return Math.round((g * w * 60 * f) / (d * 1000) * 100) / 100
}
// 薬剤量 (mg), 溶解液量 (mL), 注入速度 (mL/hr), 体重 (kg) → γ (μg/kg/min)
function calcGammaFromMlh(drug, fluid, rate, weight) {
  const d = parseFloat(drug), f = parseFloat(fluid), r = parseFloat(rate), w = parseFloat(weight)
  if (!d || !f || !r || !w || d<=0 || f<=0 || r<=0 || w<=0) return null
  return Math.round((d * r * 1000) / (f * w * 60) * 100) / 100
}

          ${cell('K', f.K)}
          ${cell('Cl', f.Cl)}
          ${cell('緩衝剤', f.buffer)}
          ${cell('糖 %', f.glucose, {bold:true})}
        </div>
      </div>`
    }).join('')
    const notesHtml = section.notes.length > 0 ? `<div class="px-3 py-2 text-[11px] text-gray-500 leading-relaxed border-t border-gray-100 bg-gray-50">${section.notes.map(n=>`<div>${esc(n)}</div>`).join('')}</div>` : ''
    return `
      <div class="rounded-xl shadow-sm border border-blue-100 overflow-hidden">
        <div class="flex bg-blue-50"><div class="w-1.5 bg-blue-500 shrink-0"></div><div class="flex-1 px-4 py-3"><h3 class="text-sm font-bold text-gray-900">${esc(section.category)}</h3></div></div>
        <div class="bg-white">${rows}</div>
        ${notesHtml}
      </div>`
  }).join('')

  const legend = `<div class="text-[11px] text-gray-500 px-1">単位: 電解質 mEq/L、糖質 %。緩衝剤の数字は mEq/L。Ca/Mg は含有時のみ製品名下に小さく表示。</div>`

  return `${subTabs}<div class="p-4 space-y-4">${legend}${tableHtml}</div>`
}

function buildListBodyHTML(query) {
  const isSearch = query.trim()!==''

  // ── 検索時: 薬剤・疾患を同時表示 ──────────────────────────
  if (isSearch) {
    const drugResults = searchDrugsQ(query)
    const diseaseResults = searchDiseasesQ(query)
    const drugSection = drugResults.length > 0
      ? `<div class="px-4 py-2 text-xs font-semibold text-gray-500 bg-gray-50 border-b border-gray-100 sticky top-0">💊 薬剤 (${drugResults.length}件)</div><ul class="bg-white">${drugResults.map(drugListItem).join('')}</ul>`
      : ''
    const diseaseSection = diseaseResults.length > 0
      ? `<div class="px-4 py-2 text-xs font-semibold text-gray-500 bg-gray-50 border-b border-gray-100 sticky top-0 flex items-center gap-1.5">${ICON.hospital} 疾患 (${diseaseResults.length}件)</div><ul class="bg-white">${diseaseResults.map(diseaseListItem).join('')}</ul>`
      : ''
    const empty = drugResults.length===0 && diseaseResults.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span>${ICON.searchBig}</span><span>見つかりません</span></div>` : ''
    return `<main class="flex-1 overflow-y-auto bg-white">${drugSection}${diseaseSection}${empty}</main>`
  }

  // ── 輸液タブ ─────────────────────────────────────────────
  if (state.mainTab === 'ivfluids') {
    return `<main class="flex-1 overflow-y-auto bg-white">${buildIVFluidsHTML()}</main>`
  }
  // ── 疾患タブ ─────────────────────────────────────────────
  if (state.mainTab === 'diseases') {
    const pendingDiseases = getAllPendingDiseases()
    const isPendingDiseaseCat = state.diseaseCat === '__pending_diseases__'
    const userDiseaseCats = getDiseaseCategories()
    const diseaseSidebar = [
      ...userDiseaseCats.map(cat =>
        `<button data-disease-cat="${cat}" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors ${state.diseaseCat===cat?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">${cat}</button>`
      ),
      `<button data-disease-cat="__pending_diseases__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors border-t border-gray-100 ${isPendingDiseaseCat?'border-l-orange-500 bg-orange-50 text-orange-700 font-semibold':'border-l-transparent text-gray-600'}"><span class="inline-block text-base leading-none">${ICON.fileEdit}</span><br>未確認${pendingDiseases.length>0?('<br><b class="text-orange-500">'+pendingDiseases.length+'</b>'):''}
</button>`,
      `<div class="flex justify-center py-1 border-t border-gray-100"><button id="btn-edit-disease-cats" class="text-gray-400 hover:text-blue-500 text-sm px-2 py-1 rounded border border-gray-200 bg-white leading-none" title="カテゴリ編集">${ICON.pencil}</button></div>`,
    ].join('')

    let diseaseList, headerTitle, headerColor
    if (isPendingDiseaseCat) {
      diseaseList = pendingDiseases; headerTitle = '未確認の疾患'; headerColor = 'bg-orange-500'
    } else if (state.diseaseCat) {
      diseaseList = getDiseasesByCategory(state.diseaseCat); headerTitle = state.diseaseCat; headerColor = 'bg-blue-600'
    } else {
      diseaseList = getAllDiseases(); headerTitle = '全疾患'; headerColor = 'bg-blue-600'
    }

    const diseaseItems = diseaseList.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-4xl">${ICON.hospital}</span><span>${isPendingDiseaseCat?'未確認の疾患はありません':'疾患がありません'}</span></div>`
      : (isPendingDiseaseCat
          ? diseaseList.map(d => diseaseListItem(d, true)).join('')
          : renderListBySubcategory(diseaseList, d => diseaseListItem(d, false)))

    return `
      <aside class="w-20 bg-white border-r border-gray-200 overflow-y-auto shrink-0">${diseaseSidebar}</aside>
      <main class="flex-1 overflow-y-auto bg-white">
        <div class="px-4 py-2 ${headerColor} flex items-center justify-between">
          <h2 class="text-sm font-bold text-white">${headerTitle}</h2>
          ${!isPendingDiseaseCat ? `<button id="btn-add-disease" class="text-xs text-white bg-blue-500 hover:bg-blue-400 px-2 py-1 rounded-lg inline-flex items-center gap-1">${ICON.plus} 疾患追加</button>` : `<span class="text-xs text-white opacity-80">${pendingDiseases.length}件</span>`}
        </div>
        <ul class="bg-white">${diseaseItems}</ul>
      </main>`
  }

  // ── 薬剤タブ（既存） ──────────────────────────────────────
  const isFav = state.category==='__favorites__'
  const isSets = state.category==='__sets__'
  const isPending = state.category === '__pending__'
  const sets = loadSets()
  const pending = getAllPendingDrugs()
  const pendingCount = pending.length
  const userCats = getCategories()

  const sidebarItems = [
    `<button data-cat="__favorites__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors flex flex-col items-center gap-0.5 ${state.category==='__favorites__'?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">${ICON.star(state.category==='__favorites__')}<span>お気に入り</span></button>`,
    `<button data-cat="__sets__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors ${state.category==='__sets__'?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}"><span class="inline-block text-base leading-none">${ICON.bookmark}</span><br>セット</button>`,
    ...userCats.map(cat => `<button data-cat="${cat}" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors ${state.category===cat?'border-blue-600 bg-blue-50 text-blue-700 font-semibold':'border-transparent text-gray-600'}">${cat}</button>`),
    `<button data-cat="__pending__" class="w-full text-xs py-3 px-1 text-center border-l-2 transition-colors border-t border-gray-100 ${state.category==='__pending__'?'border-l-orange-500 bg-orange-50 text-orange-700 font-semibold':'border-l-transparent text-gray-600'}"><span class="inline-block text-base leading-none">${ICON.fileEdit}</span><br>未確認${pendingCount>0?('<br><b class="text-orange-500">'+pendingCount+'</b>'):''}
</button>`,
    `<div class="flex justify-center py-1 border-t border-gray-100 gap-1"><button id="btn-edit-cats" class="text-gray-400 hover:text-blue-500 text-sm px-2 py-1 rounded border border-gray-200 bg-white leading-none" title="カテゴリ編集">${ICON.pencil}</button><button id="btn-master-gist" class="text-gray-400 hover:text-blue-500 text-sm px-2 py-1 rounded border border-gray-200 bg-white leading-none" title="マスターデータ同期 (Gist)">${ICON.settings}</button></div>`,
  ].join('')

  let mainContent = ''
  if (isSets) {
    const setItems = sets.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-4xl">${ICON.bookmark}</span><span>セットがありません</span></div>`
      : sets.map(s => {
          const drugNames = s.drugIds.map(id => getDrugById(id)?.abbreviation || getDrugById(id)?.genericName || '?').join(' + ')
          return `<li><button data-set="${s.id}" class="w-full flex items-center px-4 py-3 hover:bg-gray-50 text-left gap-3 border-b border-gray-100">
            <div class="flex-1 min-w-0">
              <div class="font-medium text-gray-900 text-sm">${esc(s.name)}</div>
              <div class="text-xs text-gray-500 truncate">${esc(drugNames)}</div>
            </div>
            <button data-del-set="${s.id}" class="text-gray-300 hover:text-red-400 text-lg px-1">${ICON.x}</button>
          </button></li>`
        }).join('')
    mainContent = `
      <div class="px-4 py-2 bg-blue-600 flex items-center justify-between">
        <h2 class="text-sm font-bold text-white">セット</h2>
        <button id="btn-create-set" class="text-xs text-white bg-blue-500 hover:bg-blue-400 px-2 py-1 rounded-lg">＋ セット作成</button>
      </div>
      <ul class="bg-white">${setItems}</ul>`
  } else if (isPending) {
    const pendingItems = pending.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-4xl">${ICON.fileEdit}</span><span>未確認の薬剤はありません</span></div>`
      : pending.map(d => `
          <li class="border-b border-gray-100">
            <div class="flex items-start px-4 py-3 gap-3">
              <div class="flex-1 min-w-0">
                <div class="font-medium text-gray-900 text-sm">${esc(d.genericName)}</div>
                <div class="text-xs text-gray-500">${d.abbreviation?d.abbreviation+'　':''}${(d.brandNames||[]).join('・')}</div>
                <div class="text-xs text-orange-600 mt-0.5">カテゴリ: ${esc(d.category)}</div>
              </div>
              <div class="flex flex-col gap-1 shrink-0">
                <button data-confirm-drug="${d.id}" class="text-xs bg-blue-600 text-white px-2 py-1 rounded-lg font-medium inline-flex items-center gap-1">${ICON.check} 確認</button>
                <button data-del-pending="${d.id}" class="text-xs bg-red-50 text-red-500 px-2 py-1 rounded-lg">削除</button>
              </div>
            </div>
          </li>`).join('')
    mainContent = `
      <div class="px-4 py-2 bg-orange-500 flex items-center justify-between">
        <h2 class="text-sm font-bold text-white">未確認の薬剤</h2>
        <span class="text-xs text-white opacity-80">${pending.length}件</span>
      </div>
      <ul class="bg-white">${pendingItems}</ul>`
  } else {
    let drugs = isFav ? getAllDrugs().filter(d=>state.favorites.has(d.id)) : getDrugsByCategory(state.category)
    const items = drugs.length===0
      ? `<div class="flex flex-col items-center justify-center h-40 text-gray-400 text-sm gap-2"><span class="text-3xl">💊</span><span>薬剤が見つかりません</span></div>`
      : (isFav ? drugs.map(drugListItem).join('') : renderListBySubcategory(drugs, drugListItem))
    mainContent = `
      <div class="px-4 py-2 bg-blue-600 flex items-center justify-between">
        <h2 class="text-sm font-bold text-white">${isFav?'お気に入り':esc(state.category)}</h2>
        <button id="btn-add-drug" class="text-xs text-white bg-blue-500 hover:bg-blue-400 px-2 py-1 rounded-lg inline-flex items-center gap-1">${ICON.plus} 薬剤追加</button>
      </div>
      <ul class="bg-white">${items}</ul>`
  }

  return `
    <aside class="w-20 bg-white border-r border-gray-200 overflow-y-auto shrink-0">${sidebarItems}</aside>
    <main class="flex-1 overflow-y-auto bg-white">${mainContent}</main>`
}

function attachListBody() {
  app.querySelectorAll('[data-cat]').forEach(b => b.addEventListener('click', () => {
    state.query = ''
    setState({category:b.dataset.cat})
  }))
  app.querySelectorAll('[data-drug]').forEach(b => b.addEventListener('click', () => {
    setState({screen:'detail', drugId:b.dataset.drug, tab:'calc', weight:'', age:'', ageUnit:'years', editMode:false})
  }))
  app.querySelectorAll('[data-set]').forEach(b => b.addEventListener('click', e => {
    if (e.target.closest('[data-del-set]')) return
    setState({screen:'set-detail', setId:b.dataset.set, weight:'', age:'', ageUnit:'years'})
  }))
  app.querySelectorAll('[data-del-set]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation()
    if (!confirm('このセットを削除しますか？')) return
    saveSets(loadSets().filter(s=>s.id!==b.dataset.delSet))
    render()
  }))
  document.getElementById('btn-add-drug')?.addEventListener('click', () => {
    setState({screen:'add-drug', addForm:{genericName:'',abbreviation:'',brandNames:'',category:state.category==='__favorites__'||state.category==='__sets__'||state.category==='__pending__'?getCategories()[0]:state.category,subcategory:'',route:'内服',formulations:'',adultDose:'',notes:'',sideEffects:'',references:''}, addDoses:[newDoseEntry()]})
  })
  document.getElementById('btn-create-set')?.addEventListener('click', () => {
    setState({screen:'create-set', setDraft:{name:'',drugIds:[]}, setQuery:'', editSetId:null})
  })
  app.querySelectorAll('[data-confirm-drug]').forEach(b => b.addEventListener('click', () => {
    const drugId = b.dataset.confirmDrug
    // マスターデータの薬剤の場合（全てが確認制）
    if (DRUGS.find(d => d.id === drugId)) {
      confirmMasterDrug(drugId)
      render()
      return
    }
    // カスタムpending薬剤の場合
    const pending = loadPendingDrugs()
    const drug = pending.find(d => d.id === drugId)
    if (!drug) return
    const custom = loadCustomDrugs()
    custom.push(drug)
    saveCustomDrugs(custom)
    savePendingDrugs(pending.filter(d => d.id !== drugId))
    render()
  }))
  app.querySelectorAll('[data-del-pending]').forEach(b => b.addEventListener('click', () => {
    if (!confirm('この薬剤を削除しますか？')) return
    const drugId = b.dataset.delPending
    // マスターデータの薬剤は非表示にする
    if (DRUGS.find(d => d.id === drugId)) {
      hideDrug(drugId)
      render()
      return
    }
    savePendingDrugs(loadPendingDrugs().filter(d => d.id !== drugId))
    render()
  }))
  // 疾患カテゴリ
  app.querySelectorAll('[data-disease-cat]').forEach(b => b.addEventListener('click', () => {
    const cat = b.dataset.diseaseCat
    const newCat = state.diseaseCat === cat ? null : cat
    state.diseaseCat = newCat
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  // 疾患アイテム
  app.querySelectorAll('[data-disease]').forEach(b => b.addEventListener('click', () => {
    setState({screen:'disease-detail', diseaseId: b.dataset.disease})
  }))
  // 疾患追加
  document.getElementById('btn-add-disease')?.addEventListener('click', () => {
    setState({screen:'add-disease'})
  })
  document.getElementById('btn-edit-cats')?.addEventListener('click', () => setState({screen:'manage-categories'}))
  document.getElementById('btn-master-gist')?.addEventListener('click', openMasterGistDialog)
  document.getElementById('btn-edit-disease-cats')?.addEventListener('click', () => setState({screen:'manage-disease-categories'}))
  app.querySelectorAll('[data-iv-tab]').forEach(b => b.addEventListener('click', () => {
    state.ivSubTab = b.dataset.ivTab
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  app.querySelectorAll('[data-iv-mode]').forEach(b => b.addEventListener('click', () => {
    state.ivMode = b.dataset.ivMode
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  document.getElementById('iv-weight')?.addEventListener('input', e => {
    state.ivWeight = e.target.value
    const resultDiv = document.getElementById('iv-calc-result')
    if (resultDiv) resultDiv.innerHTML = buildIVCalcResultHTML()
  })
  // GIR inputs — ボトムバーのみ更新してフォーカス維持
  const updateGIRBar = () => {
    const bar = document.getElementById('gir-result-bar')
    if (!bar) return
    const r = calcGIR(state.girGlucose, state.girRate, state.girWeight)
    bar.textContent = (r !== null ? r : '--') + ' mg/kg/min'
  }
  document.getElementById('gir-glucose')?.addEventListener('input', e=>{state.girGlucose=e.target.value; updateGIRBar()})
  document.getElementById('gir-rate')?.addEventListener('input', e=>{state.girRate=e.target.value; updateGIRBar()})
  document.getElementById('gir-weight')?.addEventListener('input', e=>{state.girWeight=e.target.value; updateGIRBar()})
  // GIR 内部タブ切り替え
  app.querySelectorAll('[data-gir-tab]').forEach(b=>b.addEventListener('click', ()=>{
    state.girTab = b.dataset.girTab
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
  // ガンマ計算 inputs — ボトムバーのみ更新してフォーカス維持
  const updateGammaABar = () => {
    const bar = document.getElementById('gamma-a-result-bar')
    if (!bar) return
    const r = calcMlhFromGamma(state.gammaA_drug, state.gammaA_fluid, state.gammaA_gamma, state.gammaA_weight)
    bar.innerHTML = (r !== null ? r : '--') + ' <span class="text-base font-normal">mL/hr</span>'
  }
  const updateGammaBBar = () => {
    const bar = document.getElementById('gamma-b-result-bar')
    if (!bar) return
    const r = calcGammaFromMlh(state.gammaB_drug, state.gammaB_fluid, state.gammaB_rate, state.gammaB_weight)
    bar.innerHTML = (r !== null ? r : '--') + ' <span class="text-base font-normal">μg/kg/min</span>'
  }
  document.getElementById('gamma-a-drug')?.addEventListener('input', e=>{state.gammaA_drug=e.target.value; updateGammaABar()})
  document.getElementById('gamma-a-fluid')?.addEventListener('input', e=>{state.gammaA_fluid=e.target.value; updateGammaABar()})
  document.getElementById('gamma-a-gamma')?.addEventListener('input', e=>{state.gammaA_gamma=e.target.value; updateGammaABar()})
  document.getElementById('gamma-a-weight')?.addEventListener('input', e=>{state.gammaA_weight=e.target.value; updateGammaABar()})
  document.getElementById('gamma-b-drug')?.addEventListener('input', e=>{state.gammaB_drug=e.target.value; updateGammaBBar()})
  document.getElementById('gamma-b-fluid')?.addEventListener('input', e=>{state.gammaB_fluid=e.target.value; updateGammaBBar()})
  document.getElementById('gamma-b-rate')?.addEventListener('input', e=>{state.gammaB_rate=e.target.value; updateGammaBBar()})
  document.getElementById('gamma-b-weight')?.addEventListener('input', e=>{state.gammaB_weight=e.target.value; updateGammaBBar()})
  // ガンマ計算 内部タブ切り替え
  app.querySelectorAll('[data-gamma-tab]').forEach(b=>b.addEventListener('click', ()=>{
    state.gammaTab = b.dataset.gammaTab
    const listBody = document.getElementById('list-body')
    if (listBody) { listBody.innerHTML = buildListBodyHTML(state.query); attachListBody() }
  }))
}

  const isFav = state.favorites.has(drug.id)
  const weight = state.weight
  const editDosesHTML = state.editMode && state.tab === 'calc' ? renderEditDoses(drug) : ''
  const calcTab = state.editMode && state.tab === 'calc' ? `
    <div class="p-4 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-gray-700">投与量を編集</span>
        <div class="flex gap-2">
          <button id="btn-cancel-edit" class="text-sm text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg">キャンセル</button>
          <button id="btn-save-doses" class="text-sm text-white bg-blue-600 px-3 py-1.5 rounded-lg font-medium">保存</button>
        </div>
      </div>
      ${editDosesHTML}
    </div>` : `
    <div class="p-4 space-y-4">
      ${ageWeightInput()}

// 既存の投与量データをeditDoses形式に変換
function dosesToEditForm(doses) {
  return doses.map(d => ({
    _id: Math.random(),
    ageLabel: d.ageLabel || '',
    ageMinYears: d.ageMinMonths != null ? d.ageMinMonths / 12 : '',
    ageMaxYears: d.ageMaxMonths != null ? d.ageMaxMonths / 12 : '',
    purpose: d.purpose || '治療',
    doseType: d.fixedDose ? 'fixed' : (d.dosePerKgMin != null ? 'range' : 'weight'),
    unit: d.unit || 'mg',
    dosePerKg: d.dosePerKg ?? '',
    dosePerKgMin: d.dosePerKgMin ?? '',
    dosePerKgMax: d.dosePerKgMax ?? '',
    fixedDose: d.fixedDose || '',
    maxDosePerDay: d.maxDosePerDay ?? '',
    frequency: d.frequency || '',
    duration: d.duration || '',
    notes: d.notes || '',
  }))
}

function updateDetailDoseResults() {
  const drug = getDrugById(state.drugId)
  if (!drug) return
  const el = document.getElementById('dose-results')
  if (!el) return
  const weight = state.weight
  el.innerHTML = `
    <div class="flex justify-end mb-2">
      <button id="btn-edit-doses" class="flex items-center gap-1.5 text-sm text-blue-600 font-medium bg-blue-50 px-3 py-1.5 rounded-lg">✏️ 投与量を編集</button>
    </div>
    ${dosesHTML(drug, weight)}
    <div class="bg-gray-100 rounded-xl p-4"><p class="text-xs text-gray-500 leading-relaxed">本コンテンツは特定の治療法を推奨するものではありません。最新の情報を確認の上、担当医の判断と責任で用法・用量を決定してください。</p></div>`
  document.getElementById('btn-edit-doses')?.addEventListener('click', () => {
    const drug = getDrugById(state.drugId)
    setState({editMode:true, editDoses:dosesToEditForm(drug.pediatricDoses||[]), tab:'calc'})
  })
}

function attachDetail() {
  const drug = getDrugById(state.drugId)
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list',editMode:false,editDoses:[]}))
  document.getElementById('btn-fav')?.addEventListener('click', () => toggleFav(drug.id))
  document.getElementById('btn-delete-drug')?.addEventListener('click', () => {
    if (confirm(`「${drug.genericName}」を削除しますか？`)) deleteDrug(drug.id)
  })
  app.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => setState({tab:b.dataset.tab,editMode:false,editDoses:[]})))
  const weightInput = document.getElementById('weight-input')
  if (weightInput) {
    weightInput.value = state.weight
    weightInput.addEventListener('input', e => { state.weight = e.target.value; updateDetailDoseResults() })
  }
  const ageInput = document.getElementById('age-input')
  if (ageInput) {
    ageInput.value = state.age
    ageInput.addEventListener('input', e => { state.age = e.target.value; updateDetailDoseResults() })
  }
  document.getElementById('unit-years')?.addEventListener('click', () => setState({ageUnit:'years',age:''}))
  document.getElementById('unit-months')?.addEventListener('click', () => setState({ageUnit:'months',age:''}))

  // calcタブ：投与量編集ボタン（初期表示時。weight変更時はupdateDetailDoseResultsが担当）
  document.getElementById('btn-edit-doses')?.addEventListener('click', () => {
    const d = getDrugById(state.drugId)
    setState({editMode:true, editDoses:dosesToEditForm(d?.pediatricDoses||[]), tab:'calc'})
  })

  // calcタブ：投与量編集 キャンセル / 保存
  document.getElementById('btn-cancel-edit')?.addEventListener('click', () => setState({editMode:false,editDraft:null,editDoses:[]}))
  document.getElementById('btn-save-doses')?.addEventListener('click', () => {
    // editDosesフォームからデータ収集
    const newDoses = state.editDoses.map((d,i) => {
      const entry = {
        ageLabel: document.querySelector(`[data-ed="${i}"][data-field="ageLabel"]`)?.value || d.ageLabel || '全年齢',
        purpose: document.querySelector(`[data-ed="${i}"][data-field="purpose"]`)?.value || '治療',
      }
      const minY = document.querySelector(`[data-ed="${i}"][data-field="ageMinYears"]`)?.value
      const maxY = document.querySelector(`[data-ed="${i}"][data-field="ageMaxYears"]`)?.value
      if (minY) entry.ageMinMonths = parseFloat(minY)*12
      if (maxY) entry.ageMaxMonths = parseFloat(maxY)*12
      if (d.doseType==='weight') {
        const v = document.querySelector(`[data-ed="${i}"][data-field="dosePerKg"]`)?.value
        if (v) entry.dosePerKg = parseFloat(v)
      } else if (d.doseType==='range') {
        const lo = document.querySelector(`[data-ed="${i}"][data-field="dosePerKgMin"]`)?.value
        const hi = document.querySelector(`[data-ed="${i}"][data-field="dosePerKgMax"]`)?.value
        if (lo) entry.dosePerKgMin = parseFloat(lo)
        if (hi) entry.dosePerKgMax = parseFloat(hi)
      } else {
        entry.fixedDose = document.querySelector(`[data-ed="${i}"][data-field="fixedDose"]`)?.value || ''
      }
      const maxD = document.querySelector(`[data-ed="${i}"][data-field="maxDosePerDay"]`)?.value
      if (maxD) entry.maxDosePerDay = parseFloat(maxD)
      const unit = document.querySelector(`[data-ed="${i}"][data-field="unit"]`)?.value
      if (unit && unit !== 'mg') entry.unit = unit
      const freq = document.querySelector(`[data-ed="${i}"][data-field="frequency"]`)?.value
      if (freq) entry.frequency = freq
      const dur = document.querySelector(`[data-ed="${i}"][data-field="duration"]`)?.value
      if (dur) entry.duration = dur
      const notes = document.querySelector(`[data-ed="${i}"][data-field="notes"]`)?.value
      if (notes) entry.notes = notes
      return entry
    })
    saveEdit(drug.id, {pediatricDoses: newDoses})
    setState({editMode:false, editDoses:[]})
  })

  // calcタブ：用量タイプ切り替え（editDoses）
  app.querySelectorAll('[data-ed-type]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.edType)
    const doses = [...state.editDoses]
    doses[idx] = {...doses[idx], doseType: b.dataset.type}
    setState({editDoses: doses})
  }))
  // calcタブ：用量エントリ削除
  app.querySelectorAll('[data-rm-dose]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.rmDose)
    setState({editDoses: state.editDoses.filter((_,i)=>i!==idx)})
  }))
  // calcタブ：用量エントリ追加
  document.getElementById('btn-add-ed-dose')?.addEventListener('click', () => {
    setState({editDoses: [...state.editDoses, {_id:Math.random(),ageLabel:'',ageMinYears:'',ageMaxYears:'',purpose:'治療',doseType:'weight',unit:'mg',dosePerKg:'',dosePerKgMin:'',dosePerKgMax:'',fixedDose:'',maxDosePerDay:'',frequency:'',duration:'',notes:''}]})
  })

  // overviewタブ：概要編集
  document.getElementById('btn-edit')?.addEventListener('click', () => setState({editMode:true, editDraft:{...drug}, tab:'overview'}))
  document.getElementById('btn-save-edit')?.addEventListener('click', () => {
    saveEdit(drug.id, {
      genericName: document.getElementById('edit-genericName').value,
      abbreviation: document.getElementById('edit-abbreviation').value,
      brandNames: document.getElementById('edit-brandNames').value.split(',').map(s=>s.trim()).filter(Boolean),
      route: document.getElementById('edit-route').value,
      formulations: document.getElementById('edit-formulations').value.split(',').map(s=>s.trim()).filter(Boolean),
      adultDose: document.getElementById('edit-adultDose').value,
      notes: document.getElementById('edit-notes').value,
      sideEffects: document.getElementById('edit-sideEffects').value,
    })
    setState({editMode:false,editDraft:null})
  })
}

function buildSetSearchResultsHTML(query) {
  const draft = state.setDraft || {drugIds:[]}
  const searchResults = query.trim()
    ? searchDrugsQ(query).filter(d=>!draft.drugIds.includes(d.id)).slice(0,8)
    : []
  if (!query.trim()) return ''
  if (searchResults.length===0) return `<div id="set-search-results"><p class="text-sm text-gray-400 text-center py-2">見つかりません</p></div>`
  return `<div id="set-search-results" class="space-y-1">${searchResults.map(d=>`

function attachAddDrug() {
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list'}))
  document.getElementById('btn-add-dose')?.addEventListener('click', () => setState({addDoses:[...(state.addDoses||[]), newDoseEntry()]}))
  app.querySelectorAll('[data-remove-dose]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.removeDose)
    setState({addDoses: state.addDoses.filter((_,i)=>i!==idx)})
  }))
  app.querySelectorAll('[data-dose][data-field]').forEach(input => {
    input.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.dose)
      const field = e.target.dataset.field
      const doses = [...state.addDoses]
      doses[idx] = {...doses[idx], [field]: e.target.value}
      setState({addDoses: doses})
    })
    input.addEventListener('change', e => {
      const idx = parseInt(e.target.dataset.dose)
      const field = e.target.dataset.field
      const doses = [...state.addDoses]
      doses[idx] = {...doses[idx], [field]: e.target.value}
      setState({addDoses: doses})
    })
  })
  app.querySelectorAll('[data-dose-type]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.doseType)
    const doses = [...state.addDoses]
    doses[idx] = {...doses[idx], doseType: b.dataset.type}
    setState({addDoses: doses})
  }))
  document.getElementById('btn-save-drug')?.addEventListener('click', () => {
    const gname = document.getElementById('add-genericName').value.trim()
    if (!gname) { alert('一般名を入力してください'); return }
    const drug = {
      id: 'custom_' + Date.now(),
      genericName: gname,
      abbreviation: document.getElementById('add-abbreviation').value.trim(),
      brandNames: document.getElementById('add-brandNames').value.split(',').map(s=>s.trim()).filter(Boolean),
      category: document.getElementById('add-category').value,
      subcategory: document.getElementById('add-subcategory').value.trim(),
      route: document.getElementById('add-route').value.trim() || '内服',
      formulations: document.getElementById('add-formulations').value.split(',').map(s=>s.trim()).filter(Boolean),
      adultDose: document.getElementById('add-adultDose').value.trim(),
      notes: document.getElementById('add-notes').value.trim(),
      sideEffects: document.getElementById('add-sideEffects').value.trim(),
      references: document.getElementById('add-references').value.split(',').map(s=>s.trim()).filter(Boolean),
      pediatricDoses: state.addDoses.map(d => {
        const entry = {ageLabel: d.ageLabel || '全年齢', purpose: d.purpose || '治療'}
        if (d.ageMinYears!=='') entry.ageMinMonths = parseFloat(d.ageMinYears)*12
        if (d.ageMaxYears!=='') entry.ageMaxMonths = parseFloat(d.ageMaxYears)*12
        if (d.doseType==='weight' && d.dosePerKg!=='') entry.dosePerKg = parseFloat(d.dosePerKg)
        else if (d.doseType==='range') { if (d.dosePerKgMin!=='') entry.dosePerKgMin=parseFloat(d.dosePerKgMin); if (d.dosePerKgMax!=='') entry.dosePerKgMax=parseFloat(d.dosePerKgMax) }
        else if (d.fixedDose) entry.fixedDose = d.fixedDose
        if (d.maxDosePerDay!=='') entry.maxDosePerDay = parseFloat(d.maxDosePerDay)
        if (d.unit && d.unit !== 'mg') entry.unit = d.unit
        if (d.frequency) entry.frequency = d.frequency
        if (d.duration) entry.duration = d.duration
        if (d.notes) entry.notes = d.notes
        return entry
      }),
    }
    const pending = loadPendingDrugs()
    pending.push(drug)
    savePendingDrugs(pending)
    setState({screen:'list', category:'__pending__', addForm:null, addDoses:[]})
  })
}

// ── 疾患セクションコンテンツ レンダラー ──────────────────────

function renderSectionContent(content) {
  if (!content) return ''
  return content.split('\n').map(line => {
    if (!line.trim()) return '<div class="h-2"></div>'
    if (line.match(/^[•・]/))
      return `<div class="flex gap-2 my-0.5"><span class="shrink-0 text-blue-500 font-bold">•</span><span>${esc(line.replace(/^[•・]\s*/,''))}</span></div>`
    if (line.match(/^[×✕]/))
      return `<div class="flex gap-2 my-0.5"><span class="shrink-0 text-red-500 font-bold">×</span><span>${esc(line.replace(/^[×✕]\s*/,''))}</span></div>`
    return `<p class="my-0.5">${esc(line)}</p>`
  }).join('')
}

function attachDiseaseDetail() {
  const disease = getDiseaseById(state.diseaseId)
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list'}))
  document.getElementById('btn-dis-fav')?.addEventListener('click', () => { if (disease) toggleDiseaseFav(disease.id) })

  document.getElementById('btn-confirm-disease')?.addEventListener('click', () => {
    if (!disease) return
    if (DISEASES.find(d => d.id === disease.id)) {
      confirmMasterDisease(disease.id)
    } else {
      const pending = loadPendingDiseases()
      const d = pending.find(x => x.id === disease.id)
      if (d) {
        const custom = loadCustomDiseases(); custom.push(d)
        saveCustomDiseases(custom)
        savePendingDiseases(pending.filter(x => x.id !== disease.id))
      }
    }
    render()
  })

  document.getElementById('btn-edit-disease')?.addEventListener('click', () => {
    if (!disease) return
    // 編集フォームに既存データをセット
    const contentStr = (disease.sections||[]).map(s => `【${s.title}】\n${s.content}`).join('\n\n')
    setState({screen:'add-disease', addDiseaseForm:{
      ...disease,
      points: disease.points||[],
      content: contentStr,
      _editId: disease.id,
    }})
  })

  document.getElementById('btn-del-disease')?.addEventListener('click', () => {
    if (!confirm('この疾患を削除しますか？')) return
    const id = state.diseaseId
    if (DISEASES.find(d => d.id === id)) {
      const h = new Set(LS.get('hidden_diseases','[]')); h.add(id)
      LS.set('hidden_diseases', [...h])
    } else {
      saveCustomDiseases(loadCustomDiseases().filter(d => d.id !== id))
      savePendingDiseases(loadPendingDiseases().filter(d => d.id !== id))
    }
    setState({screen:'list', diseaseId:null})
  })

  app.querySelectorAll('[data-drug]').forEach(b => b.addEventListener('click', () => {
    setState({screen:'detail', drugId:b.dataset.drug, tab:'calc', weight:'', age:'', ageUnit:'years', editMode:false})

}

function attachAddDisease() {
  const f = state.addDiseaseForm || {}
  document.getElementById('btn-back')?.addEventListener('click', () => {
    setState({screen: f._editId ? 'disease-detail' : 'list', addDiseaseForm:null})
  })

  // 画像追加
  document.getElementById('lbl-add-img')?.addEventListener('click', () => document.getElementById('inp-img')?.click())
  document.getElementById('inp-img')?.addEventListener('change', e => {
    const files = [...e.target.files]
    if (!files.length) return
    const currentImgs = (state.addDiseaseForm||{}).images || []
    let loaded = 0
    const newImgs = [...currentImgs]
    files.forEach(file => {
      const reader = new FileReader()
      reader.onload = ev => { newImgs.push({dataUrl:ev.target.result,caption:''}); if(++loaded===files.length) setState({addDiseaseForm:{...(state.addDiseaseForm||{}),images:newImgs}}) }
      reader.onerror = () => { alert(`「${file.name}」の読み込みに失敗しました`); if(++loaded===files.length) setState({addDiseaseForm:{...(state.addDiseaseForm||{}),images:newImgs}}) }
      reader.readAsDataURL(file)
    })
    e.target.value = ''
  })
  app.querySelectorAll('[data-del-img]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.delImg)
    const imgs = [...((state.addDiseaseForm||{}).images||[])]
    imgs.splice(idx,1)
    setState({addDiseaseForm:{...(state.addDiseaseForm||{}),images:imgs}})
  }))

  document.getElementById('btn-save-disease')?.addEventListener('click', () => {
    const name = document.getElementById('ad-name').value.trim()
    if (!name) { alert('疾患名を入力してください'); return }

    // 【見出し】でセクション分割
    const rawContent = document.getElementById('ad-content').value.trim()
    const sections = []
    let current = null
    rawContent.split('\n').forEach(line => {
      const m = line.match(/^【(.+?)】(.*)$/)
      if (m) {
        if (current) sections.push(current)
        current = {title: m[1], content: m[2].trim()}
      } else if (current) {
        current.content += (current.content ? '\n' : '') + line
      } else if (line.trim()) {
        sections.push({title: '内容', content: line})
      }
    })
    if (current) sections.push(current)

    // 画像キャプション収集
    const images = (state.addDiseaseForm?.images||[]).map((img,i) => ({
      dataUrl: img.dataUrl,
      caption: (document.querySelector(`[data-img-cap="${i}"]`)?.value||'').trim()
    }))

    const editId = f._editId
    const disease = {
      id: editId || 'disease_' + Date.now(),
      name,
      englishName: document.getElementById('ad-englishName').value.trim(),
      abbreviation: document.getElementById('ad-abbreviation').value.trim(),
      category: document.getElementById('ad-category').value,
      subcategory: document.getElementById('ad-subcategory').value.trim(),
      tags: [],
      points: document.getElementById('ad-points').value.split('\n').map(s=>s.trim()).filter(Boolean),
      sections,
      relatedDrugIds: editId ? (getDiseaseById(editId)?.relatedDrugIds||[]) : [],
      images,
      notes: document.getElementById('ad-notes').value.trim(),
    }

    if (editId) {
      // カスタム疾患を検索
      const custom = loadCustomDiseases()
      const ci = custom.findIndex(d => d.id === editId)
      if (ci >= 0) {
        custom[ci] = disease
        saveCustomDiseases(custom)
      } else {
        // pending を検索
        const pend = loadPendingDiseases()
        const pi = pend.findIndex(d => d.id === editId)
        if (pi >= 0) {
          pend[pi] = disease
          savePendingDiseases(pend)
        } else {
          // マスター疾患（DISEASES配列）→ カスタムにコピーして上書き
          custom.push(disease)
          saveCustomDiseases(custom)
          // マスターを非表示にして重複を防ぐ
          const h = new Set(LS.get('hidden_diseases','[]')); h.add(editId)
          LS.set('hidden_diseases', [...h])
        }
      }
      setState({screen:'disease-detail', diseaseId:editId, addDiseaseForm:null})
    } else {
      const pending = loadPendingDiseases()
      pending.push(disease)
      savePendingDiseases(pending)
      setState({screen:'list', mainTab:'diseases', addDiseaseForm:null, diseaseCat:null})
    }
  })
}

  app.querySelectorAll('[data-edit-dis-cat]').forEach(b => b.addEventListener('click', () => {
    setState({editingDisCatIdx: parseInt(b.dataset.editDisCat)})
    setTimeout(() => document.getElementById('edit-dis-cat-input')?.focus(), 50)
  }))
  app.querySelectorAll('[data-save-dis-cat]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.saveDisCat)
    const val = document.getElementById('edit-dis-cat-input')?.value?.trim()
    if (!val) return
    const cats = getDiseaseCategories()
    if (cats.some((c,idx) => c===val && idx!==i)) { alert('そのカテゴリ名はすでに存在します'); return }
    cats[i] = val; saveUserDiseaseCategories(cats); setState({editingDisCatIdx:null})
  }))
  app.querySelectorAll('[data-cancel-dis-cat]').forEach(b => b.addEventListener('click', () => setState({editingDisCatIdx:null})))

  app.querySelectorAll('[data-dis-move-up]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.disMoveUp); const cats = getDiseaseCategories(); if (i===0) return
    const c=[...cats];[c[i-1],c[i]]=[c[i],c[i-1]]; saveUserDiseaseCategories(c); render()
  }))
  app.querySelectorAll('[data-dis-move-down]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.disMoveDown); const cats = getDiseaseCategories(); if (i===cats.length-1) return
    const c=[...cats];[c[i],c[i+1]]=[c[i+1],c[i]]; saveUserDiseaseCategories(c); render()
  }))
  app.querySelectorAll('[data-dis-delete-cat]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.disDeleteCat); const cats = getDiseaseCategories()
    if (cats.length<=1) { alert('カテゴリは最低1つ必要です'); return }
    if (!confirm(`「${cats[i]}」を削除しますか？`)) return
    saveUserDiseaseCategories(cats.filter((_,idx)=>idx!==i)); render()
  }))
  document.getElementById('btn-add-dis-cat')?.addEventListener('click', () => {
    const input = document.getElementById('new-dis-cat-input')
    const name = input?.value?.trim()
    if (!name) return
    const cats = getDiseaseCategories()
    if (cats.includes(name)) { alert('そのカテゴリはすでに存在します'); return }
    saveUserDiseaseCategories([...cats, name]); render()
  })
  document.getElementById('btn-reset-dis-cats')?.addEventListener('click', () => {
    if (!confirm('疾患カテゴリを標準に戻しますか？')) return
    localStorage.removeItem('user_disease_categories'); render()
  })
}

// ── カテゴリ管理画面 ──────────────────────────────────────────

function renderManageCategories() {
  const cats = getCategories()
  const editIdx = state.editingCatIdx
  const catRows = cats.map((cat, i) => {
    if (i === editIdx) return `
      <div class="flex items-center px-3 py-2 gap-2 border-b border-gray-100 last:border-0 bg-blue-50">
        <input id="edit-cat-input" type="text" value="${esc(cat)}"
          class="flex-1 border border-blue-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button data-save-cat="${i}" class="text-white bg-blue-600 text-sm px-2.5 py-1 rounded-lg font-medium shrink-0">保存</button>
        <button data-cancel-cat class="text-gray-500 bg-gray-100 text-sm px-2 py-1 rounded-lg shrink-0">${ICON.x}</button>
      </div>`
    return `
    <div class="flex items-center px-3 py-2.5 gap-2 border-b border-gray-100 last:border-0">
      <span class="flex-1 text-sm text-gray-800">${esc(cat)}</span>
      <button data-edit-cat="${i}" class="text-gray-400 hover:text-blue-500 text-sm px-1.5 py-0.5 rounded">${ICON.pencil}</button>
      <button data-move-up="${i}" class="text-gray-400 hover:text-blue-500 text-base px-1.5 py-0.5 rounded ${i===0?'opacity-20 pointer-events-none':''}">${ICON.chevUp}</button>
      <button data-move-down="${i}" class="text-gray-400 hover:text-blue-500 text-base px-1.5 py-0.5 rounded ${i===cats.length-1?'opacity-20 pointer-events-none':''}">${ICON.chevDown}</button>
      <button data-delete-cat="${i}" class="text-gray-400 hover:text-red-500 text-sm px-1.5 py-0.5 rounded">${ICON.x}</button>
    </div>`}).join('')
  return `
    <div class="bg-white border-b border-gray-200 px-4 py-3">
      <div class="flex items-center gap-3">
        <button id="btn-back" class="text-blue-600 text-3xl font-light w-8">‹</button>
        <div class="flex-1 text-center font-bold text-gray-900 text-base">カテゴリ管理</div>
        <div class="w-8"></div>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <p class="text-xs text-gray-500">カテゴリの追加・削除・並び替えができます。</p>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        ${catRows}
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 space-y-2">
        <label class="text-xs font-medium text-gray-600">新しいカテゴリを追加</label>
        <div class="flex gap-2">
          <input id="new-cat-input" type="text" placeholder="例: 循環器薬"
            class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <button id="btn-add-cat" class="text-sm text-white bg-blue-600 px-3 py-2 rounded-lg font-medium shrink-0">追加</button>
        </div>
      </div>
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 space-y-2">
        <p class="text-xs text-amber-700">カテゴリを削除してもそのカテゴリの薬剤は残ります。初期化ボタンで標準カテゴリに戻せます。</p>
        <button id="btn-reset-cats" class="text-xs text-amber-700 border border-amber-300 bg-white px-3 py-1.5 rounded-lg">初期化（標準に戻す）</button>
      </div>
    </div>`
}

function attachManageCategories() {
  document.getElementById('btn-back')?.addEventListener('click', () => setState({screen:'list', editingCatIdx:null}))

  app.querySelectorAll('[data-edit-cat]').forEach(b => b.addEventListener('click', () => {
    setState({editingCatIdx: parseInt(b.dataset.editCat)})
    setTimeout(() => document.getElementById('edit-cat-input')?.focus(), 50)
  }))
  app.querySelectorAll('[data-save-cat]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.saveCat)
    const val = document.getElementById('edit-cat-input')?.value?.trim()
    if (!val) return
    const cats = getCategories()
    if (cats.some((c,idx) => c===val && idx!==i)) { alert('そのカテゴリ名はすでに存在します'); return }
    cats[i] = val; saveUserCategories(cats); setState({editingCatIdx:null})
  }))
  app.querySelectorAll('[data-cancel-cat]').forEach(b => b.addEventListener('click', () => setState({editingCatIdx:null})))

  app.querySelectorAll('[data-move-up]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.moveUp)
    const cats = getCategories()
    if (i === 0) return
    const c = [...cats];[c[i-1], c[i]] = [c[i], c[i-1]]
    saveUserCategories(c); render()
  }))

  app.querySelectorAll('[data-move-down]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.moveDown)
    const cats = getCategories()
    if (i === cats.length-1) return
    const c = [...cats];[c[i], c[i+1]] = [c[i+1], c[i]]
    saveUserCategories(c); render()
  }))

  app.querySelectorAll('[data-delete-cat]').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.dataset.deleteCat)
    const cats = getCategories()
    if (cats.length <= 1) { alert('カテゴリは最低1つ必要です'); return }
    if (!confirm(`「${cats[i]}」を削除しますか？`)) return
    saveUserCategories(cats.filter((_,idx) => idx !== i)); render()
  }))

  document.getElementById('btn-add-cat')?.addEventListener('click', () => {
    const input = document.getElementById('new-cat-input')
    const name = input?.value?.trim()
    if (!name) return
    const cats = getCategories()
    if (cats.includes(name)) { alert('そのカテゴリはすでに存在します'); return }
    saveUserCategories([...cats, name]); render()
  })

  document.getElementById('btn-reset-cats')?.addEventListener('click', () => {
    if (!confirm('カテゴリを標準に戻しますか？')) return
    localStorage.removeItem('user_categories'); render()
  })
}
