<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 (iOS が自動で角丸にするが念のため広く塗る) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- カプセル (-30度回転、中央) -->
  <g transform="translate(512 512) rotate(-30)" filter="url(#shadow)">
    <!-- 左半分 (白) -->
    <path d="M -300 -130 A 130 130 0 0 0 -300 130 L 0 130 L 0 -130 Z" fill="url(#pill1)"/>
    <!-- 右半分 (オレンジ) -->
    <path d="M 0 -130 L 300 -130 A 130 130 0 0 1 300 130 L 0 130 Z" fill="url(#pill2)"/>
    <!-- 中央の溝 -->
    <line x1="0" y1="-130" x2="0" y2="130" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
    <!-- 白側のハイライト -->
    <ellipse cx="-180" cy="-70" rx="60" ry="18" fill="#ffffff" opacity="0.7"/>
    <!-- オレンジ側のハイライト -->
    <ellipse cx="180" cy="-70" rx="60" ry="18" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- 「小」を右下に小さく配置 (ペディアトリックの示唆) -->
  <g transform="translate(820 820)">
    <circle cx="0" cy="0" r="100" fill="#ffffff" opacity="0.95"/>
    <text x="0" y="38" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif"
          font-size="120" font-weight="900" fill="#1d4ed8">小</text>
  </g>
</svg>
