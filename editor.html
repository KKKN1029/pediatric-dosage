<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>小児薬用量 — 編集ツール</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background: #f8fafc; color: #111827; }

  .btn-primary { background: #2563eb; color: #fff; padding: 0.55rem 0.95rem; font-size: 0.875rem; font-weight: 600; border-radius: 0.5rem; cursor: pointer; border: none; transition: background-color 0.15s, opacity 0.15s; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }

  .btn-secondary { background: #f1f5f9; color: #334155; padding: 0.55rem 0.95rem; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; cursor: pointer; border: 1px solid #e2e8f0; transition: background-color 0.15s; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: #fef2f2; color: #b91c1c; padding: 0.55rem 0.95rem; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; cursor: pointer; border: 1px solid #fecaca; transition: background-color 0.15s; }

  .btn-ghost:hover { background: #f1f5f9; }

  .dose-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.625rem; padding: 0.875rem; }
  .dose-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.625rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0; }
  .dose-card-title { font-size: 0.8rem; font-weight: 700; color: #1e40af; }
  /* セクションヘッダ */
  .section-title { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-bottom: 0.875rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0; }
  /* グループ見出し */
  .group-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<div id="app" class="min-h-screen flex flex-col"></div>

<script>
'use strict'

// ============================================================
// 定数
// ============================================================
const GIST_FILENAME = 'pediatric-dosage-data.json'
const GIST_DESCRIPTION = '小児薬用量アプリ マスターデータ'
const SCHEMA_VERSION = 1

// ============================================================
// localStorage
// ============================================================
const LS = {
  get: (k, def='null') => { try { return JSON.parse(localStorage.getItem(k) ?? def) } catch { return JSON.parse(def) } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k),
}

// 設定情報の保存キー
const K_TOKEN = 'editor_gh_token'
const K_GIST_ID = 'editor_gist_id'
const K_DRAFT = 'editor_draft'         // 未保存編集
const K_LAST_SAVED = 'editor_last_saved'

// ============================================================
// 状態
// ============================================================
const state = {
  // 設定
  token: LS.get(K_TOKEN, '""') || '',
  gistId: LS.get(K_GIST_ID, '""') || '',

  // データ
  data: null,   // { drugs, diseases, ivFluidTables, drugCategories, diseaseCategories }

  // UI
  loading: false,
  error: null,
  view: 'init',       // 'init' | 'setup' | 'main'
  tab: 'drugs',
  search: '',
  filter: '',         // category filter
  editingDrugId: null,
  editingDiseaseId: null,
  editingIvSection: null,  // section index
  editingIvFluid: null,    // {sectionIdx, fluidIdx}
  dirty: false,
  toast: null,
  saving: false,
  busy: '',
}

// ============================================================
// ユーティリティ
// ============================================================
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const uid = (prefix='id') => prefix + '-' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-3)
const debounce = (fn, ms=200) => { let t; return (...a)=>{clearTimeout(t); t=setTimeout(()=>fn(...a), ms)} }

function setState(patch) { Object.assign(state, patch); render() }

function showToast(msg, kind='info') {
  state.toast = { msg, kind, t: Date.now() }
  render()
  setTimeout(() => { if (state.toast && Date.now() - state.toast.t >= 2400) { state.toast = null; render() } }, 2500)
}

function markDirty() {
  state.dirty = true
  // 下書きを localStorage に保存（ブラウザ閉じても残るように）
  if (state.data) LS.set(K_DRAFT, state.data)
  renderHeader()
}

// ============================================================
// GitHub Gist API
// ============================================================
async function ghFetch(url, opts={}) {
  const headers = {
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    ...(opts.headers || {}),
  }
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json'
    opts = { ...opts, body: JSON.stringify(opts.body) }
  }
  const res = await fetch(url, { ...opts, headers })
  if (!res.ok) {
    let msg = `GitHub API ${res.status}`
    try { const j = await res.json(); msg += ': ' + (j.message || JSON.stringify(j)) } catch {}
    throw new Error(msg)
  }
  return res.json()
}

async function gistGet(id) {
  return ghFetch(`https://api.github.com/gists/${id}`)
}

async function gistCreate(content, isPublic=false) {
  return ghFetch('https://api.github.com/gists', {
    method: 'POST',
    body: {
      description: GIST_DESCRIPTION,
      public: isPublic,
      files: { [GIST_FILENAME]: { content } },
    },
  })
}

async function gistUpdate(id, content) {
  return ghFetch(`https://api.github.com/gists/${id}`, {
    method: 'PATCH',
    body: { files: { [GIST_FILENAME]: { content } } },
  })
}

// ============================================================
// データ初期化・移行
// ============================================================
function emptyData() {
  return {
    version: SCHEMA_VERSION,
    updatedAt: new Date().toISOString(),
    drugCategories: ['抗ウイルス薬','βラクタム系','マクロライド系','セフェム系','アミノグリコシド系','テトラサイクリン系','その他の抗菌薬','抗真菌薬','抗アレルギー薬','解熱鎮痛薬','その他'],
    diseaseCategories: ['呼吸器','感染症','消化器','循環器','神経','その他'],
    drugs: [],
    diseases: [],
    ivFluidTables: [],
  }
}

function normalizeData(raw) {
  const d = { ...emptyData(), ...(raw || {}) }
  d.drugs = Array.isArray(d.drugs) ? d.drugs : []
  d.diseases = Array.isArray(d.diseases) ? d.diseases : []
  d.ivFluidTables = Array.isArray(d.ivFluidTables) ? d.ivFluidTables : []
  d.drugCategories = Array.isArray(d.drugCategories) ? d.drugCategories : emptyData().drugCategories
  d.diseaseCategories = Array.isArray(d.diseaseCategories) ? d.diseaseCategories : emptyData().diseaseCategories
  // 各 drug の pediatricDoses を必ず配列に
  d.drugs.forEach(x => { if (!Array.isArray(x.pediatricDoses)) x.pediatricDoses = [] })
  d.diseases.forEach(x => {
    if (!Array.isArray(x.sections)) x.sections = []
    if (!Array.isArray(x.tags)) x.tags = []
    if (!Array.isArray(x.points)) x.points = []
    if (!Array.isArray(x.relatedDrugIds)) x.relatedDrugIds = []
    if (!Array.isArray(x.references)) x.references = []
  })
  d.ivFluidTables.forEach(s => {
    if (!Array.isArray(s.fluids)) s.fluids = []
    if (!Array.isArray(s.notes)) s.notes = []
  })
  return d
}

// index.html からデータを抽出（File オブジェクト経由）
async function importFromIndexHtml(file) {
  const text = await file.text()
  const extract = (name) => {
    const re = new RegExp(`const\\s+${name}\\s*=\\s*(\\[[\\s\\S]*?\\n\\])`, '')
    const m = text.match(re)
    if (!m) return null
    return Function('"use strict"; return (' + m[1] + ')')()
  }
  const d = emptyData()
  const drugs = extract('DRUGS')
  const diseases = extract('DISEASES')
  const iv = extract('IV_FLUID_TABLES')
  const drugCats = extract('CATEGORIES')
  if (drugs) d.drugs = drugs
  if (diseases) d.diseases = diseases
  if (iv) d.ivFluidTables = iv
  if (drugCats) d.drugCategories = drugCats
  // DISEASE_CATEGORIES は 1 行
  const m = text.match(/const\s+DISEASE_CATEGORIES\s*=\s*(\[[^\]]*\])/)
  if (m) d.diseaseCategories = Function('return ' + m[1])()
  return normalizeData(d)
}

// ============================================================
// 保存・読み込み
// ============================================================
async function loadFromGist() {
  if (!state.token || !state.gistId) { setState({ view:'setup' }); return }
  setState({ loading:true, busy:'Gist から読み込み中…', error:null })
  try {
    const gist = await gistGet(state.gistId)
    const file = gist.files[GIST_FILENAME] || Object.values(gist.files)[0]
    if (!file) throw new Error(`Gist に ${GIST_FILENAME} が見つかりません`)
    const content = file.truncated ? await fetch(file.raw_url).then(r=>r.text()) : file.content
    const parsed = JSON.parse(content)
    const data = normalizeData(parsed)
    LS.set(K_LAST_SAVED, data)
    LS.del(K_DRAFT)
    setState({ data, loading:false, busy:'', view:'main', dirty:false })
  } catch (e) {
    setState({ loading:false, busy:'', error: e.message })
  }
}

async function saveToGist() {
  if (!state.data) return
  if (!state.token || !state.gistId) { setState({ view:'setup' }); return }
  setState({ saving:true, busy:'Gist に保存中…' })
  try {
    state.data.updatedAt = new Date().toISOString()
    const content = JSON.stringify(state.data, null, 2)
    await gistUpdate(state.gistId, content)
    LS.set(K_LAST_SAVED, state.data)
    LS.del(K_DRAFT)
    setState({ saving:false, busy:'', dirty:false })
    showToast('保存しました', 'ok')
  } catch (e) {
    setState({ saving:false, busy:'' })
    showToast('保存失敗: ' + e.message, 'err')
  }
}

async function createNewGist(initialData) {
  if (!state.token) { showToast('先にトークンを入力してください', 'err'); return }
  setState({ saving:true, busy:'Gist を作成中…' })
  try {
    const content = JSON.stringify(initialData, null, 2)
    const gist = await gistCreate(content, false)
    LS.set(K_GIST_ID, gist.id)
    LS.set(K_LAST_SAVED, initialData)
    setState({ gistId: gist.id, data: initialData, saving:false, busy:'', view:'main', dirty:false })
    showToast('Gist を作成しました', 'ok')
  } catch (e) {
    setState({ saving:false, busy:'' })
    showToast('作成失敗: ' + e.message, 'err')
  }
}

// ============================================================
// 編集ヘルパー
// ============================================================
function findDrug(id) { return state.data.drugs.find(d => d.id === id) }
function findDisease(id) { return state.data.diseases.find(d => d.id === id) }

function newDrug() {
  return {
    id: uid('drug'),
    genericName: '',
    abbreviation: '',
    brandNames: [],
    category: state.data.drugCategories[0] || '',
    subcategory: '',
    route: '内服',
    formulations: [],
    adultDose: '',
    pediatricDoses: [],
    notes: '',
    sideEffects: '',
    references: [],
  }
}

function newDose() {
  return {
    ageLabel: '全年齢',
    purpose: '治療',
    frequency: '分3',
  }
}

function newDisease() {
  return {
    id: uid('dis'),
    name: '',
    englishName: '',
    abbreviation: '',
    category: state.data.diseaseCategories[0] || '',
    tags: [],
    points: [],
    sections: [],
    relatedDrugIds: [],
    references: [],
    notes: '',
  }
}

function newSection() {
  return { title: '', content: '' }
}

function newIvFluid() {
  return { name: '', Na: '', K: '', Cl: '', Ca: '', Mg: '', buffer: '', glucose: '' }
}

function newIvSection() {
  return { category: '新しい区分', notes: [], fluids: [] }
}

// ============================================================
// 描画: ヘッダー
// ============================================================
function headerHTML() {
  const status = state.loading ? '読み込み中…' :
    state.saving ? '保存中…' :
    state.dirty ? '未保存の変更あり' :
    state.data ? '保存済み' : ''
  const statusColor = state.dirty ? 'text-amber-600' : 'text-gray-500'

  return `
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 shadow-sm">
      <div class="flex-1 min-w-0">
        <h1 class="text-base font-bold text-gray-900">小児薬用量 編集ツール</h1>
        <div class="text-xs ${statusColor} truncate">${esc(status)}${state.busy ? ' — ' + esc(state.busy) : ''}</div>
      </div>
      ${state.view === 'main' ? `
        <button data-act="save" class="btn-primary" ${(!state.dirty || state.saving) ? 'disabled' : ''}>
          ${state.saving ? '保存中' : '💾 保存'}
        </button>
      ` : ''}
    </header>
  `
}

function tabsHTML() {
  if (state.view !== 'main') return ''
  const tabs = [
    ['drugs', '薬剤', state.data.drugs.length],
    ['diseases', '疾患', state.data.diseases.length],
    ['iv', '輸液', state.data.ivFluidTables.reduce((n, s) => n + s.fluids.length, 0)],
    ['categories', 'カテゴリ', ''],
    ['settings', '設定', ''],
  ]
  return `
    <nav class="sticky top-[57px] z-20 bg-white border-b border-gray-200 flex overflow-x-auto">
      ${tabs.map(([k, l, c]) => `
        <button data-tab="${k}" class="flex-shrink-0 px-4 py-2.5 text-sm font-medium border-b-2 ${state.tab === k ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-600 hover:text-gray-900'}">
          ${esc(l)}${c !== '' ? ` <span class="text-xs text-gray-400">${c}</span>` : ''}
        </button>
      `).join('')}
    </nav>
  `
}

function toastHTML() {
  if (!state.toast) return ''
  const colors = { ok: 'bg-green-600', err: 'bg-red-600', info: 'bg-gray-800' }
  return `
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 ${colors[state.toast.kind] || colors.info} text-white px-4 py-2 rounded-lg shadow-lg text-sm">
      ${esc(state.toast.msg)}
    </div>
  `
}

// ============================================================
// 描画: 初期画面
// ============================================================
function initScreenHTML() {
  return `
    <div class="flex-1 flex items-center justify-center p-6">
      <div class="max-w-md w-full bg-white rounded-xl shadow-md p-6 space-y-4">
        <h2 class="text-lg font-bold text-gray-900">ようこそ</h2>
        <p class="text-sm text-gray-600 leading-relaxed">
          このツールは <strong>小児薬用量アプリ</strong> のマスターデータを編集して、GitHub Gist に保存するための画面です。
          編集内容は自動的に Gist に保存され、複数端末から同じデータを参照できるようになります。
        </p>
        <div class="bg-blue-50 border border-blue-100 rounded-lg p-3 text-xs text-blue-900 space-y-1">
          <div>① GitHub アカウントで <strong>Personal Access Token (gist スコープ)</strong> を作成</div>
          <div>② このツールにトークンを登録</div>
          <div>③ 既存データをインポート、または新規作成</div>
        </div>
        <button data-act="goto-setup" class="btn-primary w-full">セットアップを始める</button>
        ${state.error ? `<div class="text-xs text-red-600">${esc(state.error)}</div>` : ''}
      </div>
    </div>
  `
}

// ============================================================
// 描画: セットアップ画面
// ============================================================
function setupScreenHTML() {
  return `
    <div class="flex-1 p-4 sm:p-6 overflow-y-auto">
      <div class="max-w-2xl mx-auto space-y-4">
        <!-- Step 1: トークン -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-3">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-blue-600 text-white text-sm font-bold flex items-center justify-center">1</div>
            <h3 class="text-base font-bold text-gray-900">GitHub Personal Access Token</h3>
          </div>
          <p class="text-xs text-gray-600 leading-relaxed">
            <a href="https://github.com/settings/tokens/new?scopes=gist&description=pediatric-dosage" target="_blank" rel="noopener" class="text-blue-600 underline font-semibold">こちら (Classic Token)</a>
            から「Generate new token (classic)」で発行してください。
            スコープは <code class="px-1 bg-gray-100 rounded">gist</code> のみ ON にすれば OK です。
          </p>
          <div class="bg-amber-50 border border-amber-200 rounded p-2 text-[11px] text-amber-900 leading-relaxed">
            ⚠️ <strong>Fine-grained token は使えません</strong> (Gist API 非対応)。必ず <strong>Personal access tokens (classic)</strong> の方で作成してください。
          </div>
          <input id="setup-token" type="password" placeholder="ghp_… (トークン)" value="${esc(state.token)}"
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
          <div class="text-[11px] text-gray-500">トークンはこの端末の localStorage にのみ保存されます（外部送信なし）。</div>
          <button data-act="save-token" class="btn-secondary">保存</button>
        </div>

        <!-- Step 2: Gist -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-3">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full ${state.token ? 'bg-blue-600' : 'bg-gray-300'} text-white text-sm font-bold flex items-center justify-center">2</div>
            <h3 class="text-base font-bold text-gray-900">Gist の準備</h3>
          </div>
          <p class="text-xs text-gray-600 leading-relaxed">
            データを保存する Gist を準備します。3つの方法から選んでください。
          </p>

          <!-- A: 既存 Gist ID -->
          <div class="border border-gray-200 rounded-lg p-3 space-y-2">
            <div class="text-sm font-medium text-gray-800">A. 既存の Gist を使う</div>
            <input id="setup-gist-id" type="text" placeholder="Gist ID (例: 1a2b3c4d5e6f7890)" value="${esc(state.gistId)}"
              class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
            <button data-act="use-gist" class="btn-secondary" ${!state.token ? 'disabled' : ''}>この Gist を使う</button>
          </div>

          <!-- B: 新規 Gist -->
          <div class="border border-gray-200 rounded-lg p-3 space-y-2">
            <div class="text-sm font-medium text-gray-800">B. 新規 Gist を作成 (空データから)</div>
            <button data-act="create-empty-gist" class="btn-secondary" ${!state.token ? 'disabled' : ''}>空の Gist を新規作成</button>
          </div>

          <!-- C: index.html から取り込む -->
          <div class="border border-gray-200 rounded-lg p-3 space-y-2">
            <div class="text-sm font-medium text-gray-800">C. 既存の index.html からインポート</div>
            <p class="text-xs text-gray-500">アプリの index.html を選択すると、薬剤・疾患・輸液データが取り込まれて新しい Gist に保存されます。</p>
            <input id="setup-import-file" type="file" accept=".html,.htm" class="text-xs" />
            <button data-act="import-from-html" class="btn-secondary" ${!state.token ? 'disabled' : ''}>インポートして Gist 作成</button>
          </div>
        </div>

        ${state.error ? `<div class="bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-700">${esc(state.error)}</div>` : ''}
      </div>
    </div>
  `
}

// ============================================================
// 描画: 薬剤タブ
// ============================================================
function drugsTabHTML() {
  const editing = state.editingDrugId ? findDrug(state.editingDrugId) : null
  if (editing) return drugFormHTML(editing)
  return drugsListHTML()
}

function drugsListHTML() {
  const q = state.search.toLowerCase().trim()
  const cat = state.filter
  let drugs = state.data.drugs
  if (cat) drugs = drugs.filter(d => d.category === cat)

    drugs = drugs.filter(d => {

          <option value="">全カテゴリ (${state.data.drugs.length}件)</option>
          ${state.data.drugCategories.map(c => `<option value="${esc(c)}" ${state.filter===c?'selected':''}>${esc(c)} (${state.data.drugs.filter(d=>d.category===c).length})</option>`).join('')}
        </select>
        <button data-act="add-drug" class="btn-primary whitespace-nowrap">+ 新規追加</button>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        ${drugs.length === 0 ? `
          <div class="p-8 text-center text-sm text-gray-500">該当する薬剤がありません</div>
        ` : drugs.map(d => `
          <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50 cursor-pointer" data-edit-drug="${esc(d.id)}">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-sm font-medium text-gray-900">${esc(d.genericName || '(未入力)')}</span>
                ${d.abbreviation ? `<span class="badge bg-blue-50 text-blue-700">${esc(d.abbreviation)}</span>` : ''}
                ${d.brandNames && d.brandNames.length ? `<span class="text-xs text-gray-500">${esc(d.brandNames.join(' / '))}</span>` : ''}
              </div>
              <div class="text-xs text-gray-500 mt-0.5">
                ${esc(d.category || '')}${d.subcategory ? ' / ' + esc(d.subcategory) : ''} · ${esc(d.route || '')} · 用量 ${(d.pediatricDoses||[]).length}件
              </div>

            <button data-act="del-drug" data-id="${esc(d.id)}" class="text-gray-400 hover:text-red-600 text-sm px-2" title="削除">✕</button>
          </div>
        `).join('')}
      </div>
    </div>
  `
}

function doseRowHTML(dose, i) {
  return `
    <div class="dose-card">
      <div class="dose-card-header">
        <div class="dose-card-title">用量 #${i + 1}</div>
        <div class="flex gap-1">
          <button data-act="dose-up" data-i="${i}" class="btn-ghost" title="上へ">↑</button>
          <button data-act="dose-down" data-i="${i}" class="btn-ghost" title="下へ">↓</button>
          <button data-act="dose-del" data-i="${i}" class="btn-ghost" style="color:#dc2626;" title="削除">✕</button>
        </div>
      </div>

      <div class="space-y-4">
        <!-- 対象 -->
        <div>
          <div class="group-label">対象</div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div class="sm:col-span-3"><label class="label">年齢ラベル <span class="text-gray-400 font-normal">（表示用テキスト）</span></label>
              <input data-bind="dose.${i}.ageLabel" type="text" value="${esc(dose.ageLabel || '')}" class="input" placeholder="例: 1歳以上、新生児〜1歳未満" /></div>
            <div><label class="label">最小月齢</label>
              <input data-bind="dose.${i}.ageMinMonths" type="number" value="${dose.ageMinMonths ?? ''}" class="input" placeholder="0" /></div>
            <div><label class="label">最大月齢</label>
              <input data-bind="dose.${i}.ageMaxMonths" type="number" value="${dose.ageMaxMonths ?? ''}" class="input" placeholder="制限なしなら空欄" /></div>
            <div><label class="label">目的</label>
              <input data-bind="dose.${i}.purpose" type="text" value="${esc(dose.purpose || '')}" class="input" placeholder="治療 / 予防" /></div>
          </div>
          <div class="text-[11px] text-gray-500 mt-1">月齢: 1歳=12 / 6歳=72 / 12歳=144</div>
        </div>

        <!-- 用量本体 -->
        <div>
          <div class="group-label">用量 <span style="color:#dc2626;font-weight:500;text-transform:none;letter-spacing:0;">（A・B・C のいずれか1つを使用）</span></div>
          <div class="space-y-3">

            <!-- A: 固定用量 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label" style="display:flex;align-items:center;gap:0.4rem;">
                <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:0.1rem 0.4rem;border-radius:0.25rem;">A</span>
                固定用量
              </label>
              <input data-bind="dose.${i}.fixedDose" type="text" value="${esc(dose.fixedDose || '')}" class="input" placeholder="例: 5mg/日、10mg を 1日2回" />
            </div>

            <!-- B: mg/kg 単一 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label" style="display:flex;align-items:center;gap:0.4rem;">
                <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:0.1rem 0.4rem;border-radius:0.25rem;">B</span>
                mg/kg/日（単一値）
              </label>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <input data-bind="dose.${i}.dosePerKg" type="number" step="0.01" value="${dose.dosePerKg ?? ''}" class="input" style="max-width:140px;" placeholder="例: 6" />
                <span class="text-sm text-gray-500">mg/kg/日</span>
              </div>
            </div>

            <!-- C: mg/kg 範囲 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label" style="display:flex;align-items:center;gap:0.4rem;">
                <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:0.1rem 0.4rem;border-radius:0.25rem;">C</span>
                mg/kg/日（範囲）
              </label>
              <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                <input data-bind="dose.${i}.dosePerKgMin" type="number" step="0.01" value="${dose.dosePerKgMin ?? ''}" class="input" style="max-width:120px;" placeholder="最小" />
                <span class="text-sm text-gray-500">〜</span>
                <input data-bind="dose.${i}.dosePerKgMax" type="number" step="0.01" value="${dose.dosePerKgMax ?? ''}" class="input" style="max-width:120px;" placeholder="最大" />
                <span class="text-sm text-gray-500">mg/kg/日</span>
              </div>
            </div>

            <!-- 1日最大量 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label">1日最大量（上限）</label>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <input data-bind="dose.${i}.maxDosePerDay" type="number" value="${dose.maxDosePerDay ?? ''}" class="input" style="max-width:140px;" placeholder="例: 1500" />
                <span class="text-sm text-gray-500">mg/日</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 投与方法 -->
        <div>
          <div class="group-label">投与方法</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div><label class="label">頻度</label>
              <input data-bind="dose.${i}.frequency" type="text" value="${esc(dose.frequency || '')}" class="input" placeholder="例: 分3、1日2回" /></div>
            <div><label class="label">期間</label>
              <input data-bind="dose.${i}.duration" type="text" value="${esc(dose.duration || '')}" class="input" placeholder="例: 5日間" /></div>
            <div class="sm:col-span-2"><label class="label">用量メモ <span class="text-gray-400 font-normal">（補足）</span></label>
              <input data-bind="dose.${i}.notes" type="text" value="${esc(dose.notes || '')}" class="input" placeholder="例: 食後、重症例では最大90mg/kg/日" /></div>
          </div>
        </div>
      </div>
    </div>
  `
}

function diseasesTabHTML() {

  return diseasesListHTML()

  if (cat) diseases = diseases.filter(d => d.category === cat)
  if (q) {
    diseases = diseases.filter(d => {
      const hay = [d.id, d.name, d.englishName, d.abbreviation, ...(d.tags||[])].join(' ').toLowerCase()
      return hay.includes(q)
    })
  }
  return `
    <div class="p-4 space-y-3">

          <option value="">全カテゴリ (${state.data.diseases.length}件)</option>
          ${state.data.diseaseCategories.map(c => `<option value="${esc(c)}" ${state.filter===c?'selected':''}>${esc(c)} (${state.data.diseases.filter(d=>d.category===c).length})</option>`).join('')}

        <button data-act="add-disease" class="btn-primary whitespace-nowrap">+ 新規追加</button>

          <div class="p-8 text-center text-sm text-gray-500">該当する疾患がありません</div>

          <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50 cursor-pointer" data-edit-disease="${esc(d.id)}">

function bodyHTML() {
  if (state.view === 'init') return initScreenHTML()
  if (state.view === 'setup') return setupScreenHTML()
  if (!state.data) return `<div class="flex-1 flex items-center justify-center text-sm text-gray-500">${esc(state.busy || '読み込み中…')}</div>`
  switch (state.tab) {
    case 'drugs': return drugsTabHTML()
    case 'diseases': return diseasesTabHTML()
    case 'iv': return ivTabHTML()
    case 'categories': return categoriesTabHTML()
    case 'settings': return settingsTabHTML()
  }
  return ''
}

function render() {
  const app = document.getElementById('app')
  app.innerHTML = headerHTML() + tabsHTML() + `<main class="flex-1 overflow-y-auto">${bodyHTML()}</main>` + toastHTML()
}

function renderHeader() {
  // 部分更新: ヘッダーのみ
  const app = document.getElementById('app')
  if (!app) return
  const h = app.querySelector('header')
  if (!h) { render(); return }
  h.outerHTML = headerHTML()
}

// ============================================================
// イベント処理
// ============================================================
function bindGlobalEvents() {
  document.addEventListener('click', onClick)
  document.addEventListener('change', onChange)
  document.addEventListener('input', onInput)
}

function onClick(e) {
  const t = e.target.closest('[data-act], [data-tab], [data-edit-drug], [data-edit-disease]')
  if (!t) return
  const act = t.dataset.act
  const tab = t.dataset.tab
  const editDrug = t.dataset.editDrug
  const editDisease = t.dataset.editDisease

  if (tab) { setState({ tab, search:'', filter:'', editingDrugId:null, editingDiseaseId:null }); return }
  if (editDrug) { setState({ editingDrugId: editDrug }); return }
  if (editDisease) { setState({ editingDiseaseId: editDisease }); return }

  if (act === 'goto-setup') { setState({ view:'setup' }); return }
  if (act === 'save-token') {
    const v = document.getElementById('setup-token').value.trim()
    state.token = v; LS.set(K_TOKEN, v); showToast('トークンを保存しました', 'ok'); render(); return
  }
  if (act === 'use-gist') {
    const v = document.getElementById('setup-gist-id').value.trim()
    if (!v) { showToast('Gist ID を入力してください', 'err'); return }
    state.gistId = v; LS.set(K_GIST_ID, v)
    loadFromGist()
    return
  }
  if (act === 'create-empty-gist') { createNewGist(emptyData()); return }
  if (act === 'import-from-html') {
    const f = document.getElementById('setup-import-file').files[0]
    if (!f) { showToast('ファイルを選択してください', 'err'); return }
    importFromIndexHtml(f).then(d => createNewGist(d)).catch(err => showToast('読込失敗: ' + err.message, 'err'))
    return
  }
  if (act === 'save') { saveToGist(); return }
  if (act === 'reload') {
    if (state.dirty && !confirm('未保存の変更があります。破棄して再読込しますか？')) return
    loadFromGist(); return
  }
  if (act === 'logout') {
    if (!confirm('保存設定をすべてクリアします。よろしいですか？\n（Gist のデータ自体は消えません）')) return
    LS.del(K_TOKEN); LS.del(K_GIST_ID); LS.del(K_DRAFT); LS.del(K_LAST_SAVED)
    state.token = ''; state.gistId = ''; state.data = null; state.view = 'init'; state.dirty = false
    render(); return
  }
  if (act === 'export-json') {
    downloadJson(GIST_FILENAME, JSON.stringify(state.data, null, 2)); return
  }
  if (act === 'copy-share') {
    const url = t.dataset.url
    navigator.clipboard.writeText(url).then(() => showToast('URL をコピーしました', 'ok')).catch(() => showToast('コピーできませんでした', 'err'))
    return
  }
  if (act === 'import-replace') {
    const f = document.getElementById('import-file').files[0]
    if (!f) { showToast('ファイルを選択してください', 'err'); return }
    if (!confirm('現在のデータに上書きします。よろしいですか？')) return
    importFromIndexHtml(f).then(d => { state.data = d; markDirty(); showToast('インポートしました。「保存」を押して Gist に反映してください', 'ok'); render() }).catch(err => showToast('失敗: ' + err.message, 'err'))
    return
  }

  // 薬剤
  if (act === 'add-drug') { const d = newDrug(); state.data.drugs.push(d); state.editingDrugId = d.id; markDirty(); render(); return }
  if (act === 'back-drug') { setState({ editingDrugId:null }); return }
  if (act === 'del-drug') {
    const id = t.dataset.id; const drug = findDrug(id)
    if (!drug) return
    if (!confirm(`「${drug.genericName || id}」を削除しますか？`)) return
    state.data.drugs = state.data.drugs.filter(d => d.id !== id)
    state.editingDrugId = null; markDirty(); render(); return
  }
  if (act === 'add-dose') {
    const d = findDrug(state.editingDrugId); d.pediatricDoses.push(newDose()); markDirty(); render(); return
  }
  if (act === 'dose-up' || act === 'dose-down' || act === 'dose-del') {
    const d = findDrug(state.editingDrugId); const i = +t.dataset.i
    if (act === 'dose-up' && i > 0) { [d.pediatricDoses[i-1], d.pediatricDoses[i]] = [d.pediatricDoses[i], d.pediatricDoses[i-1]] }
    if (act === 'dose-down' && i < d.pediatricDoses.length - 1) { [d.pediatricDoses[i+1], d.pediatricDoses[i]] = [d.pediatricDoses[i], d.pediatricDoses[i+1]] }
    if (act === 'dose-del') { d.pediatricDoses.splice(i, 1) }
    markDirty(); render(); return
  }

  // 疾患
  if (act === 'add-disease') { const d = newDisease(); state.data.diseases.push(d); state.editingDiseaseId = d.id; markDirty(); render(); return }
  if (act === 'back-disease') { setState({ editingDiseaseId:null }); return }
  if (act === 'del-disease') {
    const id = t.dataset.id; const dis = findDisease(id)
    if (!dis) return
    if (!confirm(`「${dis.name || id}」を削除しますか？`)) return
    state.data.diseases = state.data.diseases.filter(d => d.id !== id)
    state.editingDiseaseId = null; markDirty(); render(); return
  }
  if (act === 'add-section') {
    const d = findDisease(state.editingDiseaseId); d.sections.push(newSection()); markDirty(); render(); return
  }
  if (act === 'section-up' || act === 'section-down' || act === 'section-del') {
    const d = findDisease(state.editingDiseaseId); const i = +t.dataset.i
    if (act === 'section-up' && i > 0) { [d.sections[i-1], d.sections[i]] = [d.sections[i], d.sections[i-1]] }
    if (act === 'section-down' && i < d.sections.length - 1) { [d.sections[i+1], d.sections[i]] = [d.sections[i], d.sections[i+1]] }
    if (act === 'section-del') { d.sections.splice(i, 1) }
    markDirty(); render(); return
  }

  // 輸液
  if (act === 'add-iv-section') { state.data.ivFluidTables.push(newIvSection()); markDirty(); render(); return }
  if (act === 'iv-sect-up' || act === 'iv-sect-down' || act === 'iv-sect-del') {
    const i = +t.dataset.i; const arr = state.data.ivFluidTables
    if (act === 'iv-sect-up' && i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]] }
    if (act === 'iv-sect-down' && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]] }
    if (act === 'iv-sect-del') {
      if (!confirm(`区分「${arr[i].category}」(製剤 ${arr[i].fluids.length}件) を削除しますか？`)) return
      arr.splice(i, 1)
    }
    markDirty(); render(); return
  }
  if (act === 'add-iv-fluid') { const si = +t.dataset.si; state.data.ivFluidTables[si].fluids.push(newIvFluid()); markDirty(); render(); return }
  if (act === 'iv-fluid-del') {
    const si = +t.dataset.si, fi = +t.dataset.fi
    state.data.ivFluidTables[si].fluids.splice(fi, 1); markDirty(); render(); return
  }

  // カテゴリ
  if (act === 'add-cat') {
    const k = t.dataset.kind; const arr = k === 'drug' ? state.data.drugCategories : state.data.diseaseCategories
    arr.push('新カテゴリ'); markDirty(); render(); return
  }
  if (act === 'cat-up' || act === 'cat-down' || act === 'cat-del') {
    const k = t.dataset.kind; const i = +t.dataset.i
    const arr = k === 'drug' ? state.data.drugCategories : state.data.diseaseCategories
    if (act === 'cat-up' && i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]] }
    if (act === 'cat-down' && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]] }
    if (act === 'cat-del') { arr.splice(i, 1) }
    markDirty(); render(); return
  }
}

function onChange(e) {
  const t = e.target
  if (t.id === 'drugs-filter' || t.id === 'diseases-filter') {
    setState({ filter: t.value }); return
  }
  // data-bind 経由の更新は input イベントで処理
}

function onInput(e) {
  const t = e.target
  if (t.id === 'drugs-search' || t.id === 'diseases-search') {
    state.search = t.value
    // リスト部分のみを再描画したいが、簡易に全体再描画 (フォーカスは戻らないので debounce)
    debouncedRender(t)
    return
  }
  const bind = t.dataset.bind
  if (!bind) return
  applyBind(bind, t.value, t.type)
}

const debouncedRender = debounce((focusEl) => {
  const id = focusEl.id, val = focusEl.value
  render()
  const after = document.getElementById(id)
  if (after) { after.focus(); after.value = val; after.setSelectionRange(val.length, val.length) }
}, 200)

function applyBind(bind, value, inputType) {
  const parseListPipe = v => v.split('|').map(s => s.trim()).filter(Boolean)
  const parseListNL = v => v.split('\n').map(s => s.trim()).filter(Boolean)
  const numOrEmpty = v => v === '' ? '' : (isNaN(+v) ? v : +v)

  const parts = bind.split('.')
  const root = parts[0]
  const drug = state.editingDrugId ? findDrug(state.editingDrugId) : null
  const dis = state.editingDiseaseId ? findDisease(state.editingDiseaseId) : null

  if (root === 'drug' && drug) {
    const f = parts[1]
    if (f === 'brandNames' || f === 'formulations' || f === 'references') drug[f] = parseListPipe(value)
    else drug[f] = value
    markDirty(); return
  }
  if (root === 'dose' && drug) {
    const i = +parts[1]; const f = parts[2]; const dose = drug.pediatricDoses[i]
    if (['ageMinMonths','ageMaxMonths','dosePerKg','dosePerKgMin','dosePerKgMax','maxDosePerDay'].includes(f)) {
      const n = value === '' ? undefined : +value
      if (n === undefined) delete dose[f]; else dose[f] = n
    } else {
      if (value === '') delete dose[f]; else dose[f] = value
    }
    markDirty(); return
  }
  if (root === 'disease' && dis) {
    const f = parts[1]
    if (['tags','points','relatedDrugIds','references'].includes(f)) dis[f] = parseListPipe(value)
    else dis[f] = value
    markDirty(); return
  }
  if (root === 'section' && dis) {
    const i = +parts[1]; const f = parts[2]
    dis.sections[i][f] = value; markDirty(); return
  }
  if (root === 'ivSect') {
    const i = +parts[1]; const f = parts[2]; const sect = state.data.ivFluidTables[i]
    if (f === 'notes') sect.notes = parseListNL(value)
    else sect[f] = value
    markDirty(); return
  }
  if (root === 'ivFluid') {
    const si = +parts[1], fi = +parts[2], f = parts[3]
    const fluid = state.data.ivFluidTables[si].fluids[fi]
    if (['Na','K','Cl','Ca','Mg','glucose'].includes(f)) fluid[f] = numOrEmpty(value)
    else fluid[f] = value
    markDirty(); return
  }
  if (root === 'cat') {
    const kind = parts[1]; const i = +parts[2]
    const arr = kind === 'drug' ? state.data.drugCategories : state.data.diseaseCategories
    arr[i] = value; markDirty(); return
  }
}

function downloadJson(filename, content) {
  const blob = new Blob([content], { type: 'application/json' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url; a.download = filename; a.click()
  URL.revokeObjectURL(url)
}

// ============================================================
// 起動
// ============================================================
function init() {
  bindGlobalEvents()

  // 下書き優先で復元
  const draft = LS.get(K_DRAFT, 'null')
  const lastSaved = LS.get(K_LAST_SAVED, 'null')

  if (state.token && state.gistId) {
    if (draft) {
      state.data = normalizeData(draft)
      state.dirty = true
      state.view = 'main'
      render()
      // バックグラウンドで Gist と比較するとよいが MVP では下書き表示のみ
    } else if (lastSaved) {
      // キャッシュを表示しつつ、リモートを再取得
      state.data = normalizeData(lastSaved)
      state.view = 'main'
      render()
      loadFromGist()
    } else {
      loadFromGist()
    }
  } else {
    state.view = 'init'
    render()
  }
}

init()

// 離脱時警告
window.addEventListener('beforeunload', e => {
  if (state.dirty) { e.preventDefault(); e.returnValue = '' }
})
</script>
