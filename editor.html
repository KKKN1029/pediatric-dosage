// ============================================================
// 定数
// ============================================================
const GIST_FILENAME = 'pediatric-dosage-data.json'
const GIST_DESCRIPTION = '小児薬用量アプリ マスターデータ'
const SCHEMA_VERSION = 1

// ============================================================
// localStorage
// ============================================================
const LS = {
  get: (k, def='null') => { try { return JSON.parse(localStorage.getItem(k) ?? def) } catch { return JSON.parse(def) } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k),
}

// 設定情報の保存キー
const K_TOKEN = 'editor_gh_token'
const K_GIST_ID = 'editor_gist_id'
const K_DRAFT = 'editor_draft'         // 未保存編集
const K_LAST_SAVED = 'editor_last_saved'

// index.html (アプリ側) と共有するキー
//   同じオリジン（GitHub Pages や同じローカルパス）で動かしている場合、
//   編集→保存と同時にアプリ側のキャッシュも更新しておくことで、
//   編集後アプリを開いた瞬間に最新データが反映される。
const K_APP_GIST_ID = 'master_gist_id'
const K_APP_CACHE = 'master_gist_cache'
const K_APP_CACHE_AT = 'master_gist_cache_at'

function syncToAppCache(gistId, data) {
  try {
    if (gistId) localStorage.setItem(K_APP_GIST_ID, gistId)
    if (data) {
      localStorage.setItem(K_APP_CACHE, JSON.stringify(data))
      localStorage.setItem(K_APP_CACHE_AT, String(Date.now()))
    }
  } catch (e) { console.warn('app cache sync failed', e) }
}

// ============================================================
// 状態
// ============================================================
const state = {
  // 設定
  token: LS.get(K_TOKEN, '""') || '',
  gistId: LS.get(K_GIST_ID, '""') || '',

  // データ
  data: null,   // { drugs, diseases, ivFluidTables, drugCategories, diseaseCategories }

  // UI
  loading: false,
  error: null,
  view: 'init',       // 'init' | 'setup' | 'main'
  tab: 'drugs',
  search: '',
  filter: '',         // category filter
  editingDrugId: null,
  editingDiseaseId: null,
  editingIvSection: null,  // section index
  editingIvFluid: null,    // {sectionIdx, fluidIdx}
  dirty: false,
  toast: null,
  saving: false,
  busy: '',
}

// ============================================================
// ユーティリティ
// ============================================================
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const uid = (prefix='id') => prefix + '-' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-3)
const debounce = (fn, ms=200) => { let t; return (...a)=>{clearTimeout(t); t=setTimeout(()=>fn(...a), ms)} }

// 日本語検索用の正規化:
//   ・ひらがな → カタカナ (あもきししりん → アモキシシリン に一致)
//   ・全角英数 → 半角
//   ・濁点・半濁点を分解結合 (NFKC)
//   ・小文字化、トリム
function jpNorm(s) {
  if (s == null) return ''
  let v = String(s)
  try { v = v.normalize('NFKC') } catch {}
  // ひらがな(U+3041..U+3096) → カタカナ(U+30A1..U+30F6) は +0x60
  v = v.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60))
  return v.toLowerCase().trim()
}

// IME 変換中フラグ。日本語入力中の再描画を抑制する。
let _imeComposing = false

function setState(patch) { Object.assign(state, patch); render() }

function showToast(msg, kind='info') {
  state.toast = { msg, kind, t: Date.now() }
  render()
  setTimeout(() => { if (state.toast && Date.now() - state.toast.t >= 2400) { state.toast = null; render() } }, 2500)
}

function markDirty() {
  state.dirty = true
  // 下書きを localStorage に保存（ブラウザ閉じても残るように）
  if (state.data) LS.set(K_DRAFT, state.data)
  renderHeader()
}

// ============================================================
// GitHub Gist API
// ============================================================
async function ghFetch(url, opts={}) {
  const headers = {
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    ...(opts.headers || {}),
  }
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json'
    opts = { ...opts, body: JSON.stringify(opts.body) }
  }
  const res = await fetch(url, { ...opts, headers })
  if (!res.ok) {
    let msg = `GitHub API ${res.status}`
    try { const j = await res.json(); msg += ': ' + (j.message || JSON.stringify(j)) } catch {}
    throw new Error(msg)
  }
  return res.json()
}

async function gistGet(id) {
  return ghFetch(`https://api.github.com/gists/${id}`)
}

async function gistCreate(content, isPublic=false) {
  return ghFetch('https://api.github.com/gists', {
    method: 'POST',
    body: {
      description: GIST_DESCRIPTION,
      public: isPublic,
      files: { [GIST_FILENAME]: { content } },
    },
  })
}

async function gistUpdate(id, content) {
  return ghFetch(`https://api.github.com/gists/${id}`, {
    method: 'PATCH',
    body: { files: { [GIST_FILENAME]: { content } } },
  })
}

// ============================================================
// データ初期化・移行
// ============================================================
function emptyData() {
  return {
    version: SCHEMA_VERSION,
    updatedAt: new Date().toISOString(),
    drugCategories: ['抗ウイルス薬','βラクタム系','マクロライド系','セフェム系','アミノグリコシド系','テトラサイクリン系','その他の抗菌薬','抗真菌薬','抗アレルギー薬','解熱鎮痛薬','その他'],
    diseaseCategories: ['呼吸器','感染症','消化器','循環器','神経','その他'],
    drugs: [],
    diseases: [],
    ivFluidTables: [],
  }
}

function normalizeData(raw) {
  const d = { ...emptyData(), ...(raw || {}) }
  d.drugs = Array.isArray(d.drugs) ? d.drugs : []
  d.diseases = Array.isArray(d.diseases) ? d.diseases : []
  d.ivFluidTables = Array.isArray(d.ivFluidTables) ? d.ivFluidTables : []
  d.drugCategories = Array.isArray(d.drugCategories) ? d.drugCategories : emptyData().drugCategories
  d.diseaseCategories = Array.isArray(d.diseaseCategories) ? d.diseaseCategories : emptyData().diseaseCategories
  // 各 drug の pediatricDoses を必ず配列に / pending を boolean に
  d.drugs.forEach(x => {
    if (!Array.isArray(x.pediatricDoses)) x.pediatricDoses = []
    x.pending = x.pending === true
  })
  d.diseases.forEach(x => {
    if (!Array.isArray(x.sections)) x.sections = []
    if (!Array.isArray(x.tags)) x.tags = []
    if (!Array.isArray(x.points)) x.points = []
    if (!Array.isArray(x.relatedDrugIds)) x.relatedDrugIds = []
    if (!Array.isArray(x.references)) x.references = []
    x.pending = x.pending === true
  })
  d.ivFluidTables.forEach(s => {
    if (!Array.isArray(s.fluids)) s.fluids = []
    if (!Array.isArray(s.notes)) s.notes = []
  })
  return d
}

// index.html からデータを抽出（File または text を受け付ける）
async function importFromIndexHtml(source) {
  const text = (typeof source === 'string')
    ? source
    : await source.text()
  // const / let / var どれでも許可 (index.html 側は Gist 同期対応で let に変更済)
  const extract = (name) => {
    const re = new RegExp(`(?:const|let|var)\\s+${name}\\s*=\\s*(\\[[\\s\\S]*?\\n\\])`, '')
    const m = text.match(re)
    if (!m) return null
    return Function('"use strict"; return (' + m[1] + ')')()
  }
  const d = emptyData()
  const drugs = extract('DRUGS')
  const diseases = extract('DISEASES')
  const iv = extract('IV_FLUID_TABLES')
  const drugCats = extract('CATEGORIES')
  if (drugs) d.drugs = drugs
  if (diseases) d.diseases = diseases
  if (iv) d.ivFluidTables = iv
  if (drugCats) d.drugCategories = drugCats
  // DISEASE_CATEGORIES は 1 行
  const m = text.match(/(?:const|let|var)\s+DISEASE_CATEGORIES\s*=\s*(\[[^\]]*\])/)
  if (m) d.diseaseCategories = Function('return ' + m[1])()
  return normalizeData(d)
}

// 同じサーバーの index.html を fetch して取り込む
//   ローカルファイル (file://) で開いている場合は CORS で fetch がブロックされるため、
//   GitHub Pages URL を順番に試す
async function importFromUrl() {
  const candidates = []
  // 1) 同じディレクトリの index.html（GitHub Pages や HTTP サーバー経由なら成功）
  candidates.push(new URL('./index.html', location.href).href)
  // 2) ローカルファイルから開いている場合のフォールバック: GitHub Pages の本番 URL
  if (location.protocol === 'file:') {
    candidates.push('https://kkkn1029.github.io/pediatric-dosage/index.html')
  }
  const errors = []
  for (const url of candidates) {
    try {
      const res = await fetch(url, { cache: 'no-cache' })
      if (!res.ok) { errors.push(`${url} → HTTP ${res.status}`); continue }
      const text = await res.text()
      const data = await importFromIndexHtml(text)
      // 中身がほぼ空なら抽出失敗の可能性
      if (data.drugs.length === 0 && data.diseases.length === 0 && data.ivFluidTables.length === 0) {
        errors.push(`${url} → 取得は成功したが薬剤/疾患/輸液すべて 0 件 (HTML 内に DRUGS/DISEASES/IV_FLUID_TABLES の宣言が見つからない可能性)`)
        continue
      }
      console.log(`[import] ${url} から ${data.drugs.length} 薬 / ${data.diseases.length} 疾患 を取得`)
      return data
    } catch (e) {
      errors.push(`${url} → ${e.message}`)
    }
  }
  throw new Error('すべての候補で失敗:\n' + errors.join('\n'))
}

// ============================================================
// 保存・読み込み
// ============================================================
async function loadFromGist() {
  if (!state.token || !state.gistId) { setState({ view:'setup' }); return }
  setState({ loading:true, busy:'Gist から読み込み中…', error:null })
  try {
    const gist = await gistGet(state.gistId)
    const file = gist.files[GIST_FILENAME] || Object.values(gist.files)[0]
    if (!file) throw new Error(`Gist に ${GIST_FILENAME} が見つかりません`)
    const content = file.truncated ? await fetch(file.raw_url).then(r=>r.text()) : file.content
    const parsed = JSON.parse(content)
    const data = normalizeData(parsed)
    LS.set(K_LAST_SAVED, data)
    LS.del(K_DRAFT)
    syncToAppCache(state.gistId, data)
    setState({ data, loading:false, busy:'', view:'main', dirty:false })
  } catch (e) {
    setState({ loading:false, busy:'', error: e.message })
  }
}

async function saveToGist() {
  if (!state.data) return
  if (!state.token || !state.gistId) { setState({ view:'setup' }); return }
  setState({ saving:true, busy:'Gist に保存中…' })
  try {
    state.data.updatedAt = new Date().toISOString()
    const content = JSON.stringify(state.data, null, 2)
    await gistUpdate(state.gistId, content)
    LS.set(K_LAST_SAVED, state.data)
    LS.del(K_DRAFT)
    syncToAppCache(state.gistId, state.data)
    setState({ saving:false, busy:'', dirty:false })
    showToast('保存しました', 'ok')
  } catch (e) {
    setState({ saving:false, busy:'' })
    showToast('保存失敗: ' + e.message, 'err')
  }
}

async function createNewGist(initialData) {
  if (!state.token) { showToast('先にトークンを入力してください', 'err'); return }
  setState({ saving:true, busy:'Gist を作成中…' })
  try {
    const content = JSON.stringify(initialData, null, 2)
    const gist = await gistCreate(content, false)
    LS.set(K_GIST_ID, gist.id)
    LS.set(K_LAST_SAVED, initialData)
    syncToAppCache(gist.id, initialData)
    setState({ gistId: gist.id, data: initialData, saving:false, busy:'', view:'main', dirty:false })
    showToast('Gist を作成しました', 'ok')
  } catch (e) {
    setState({ saving:false, busy:'' })
    showToast('作成失敗: ' + e.message, 'err')
  }
}

  `

// 剤形 1 件を編集する行 (テキスト入力 + 詳細展開で年齢/体重制約)
// "錠 5mg・10mg" → ["錠 5mg", "錠 10mg"] 等の分割を試みる
function trySplitFormulation(text) {
  if (!text) return null
  // 形式1: 各エントリに単位が付いている (例: "錠 5mg・10mg", "OD錠 2.5mg・5mg")
  let m = text.match(/^(.+?)\s+((?:\d+(?:\.\d+)?\s*(?:mg|μg|ug|g|mL))(?:\s*[・,]\s*\d+(?:\.\d+)?\s*(?:mg|μg|ug|g|mL))+)\s*$/i)
  if (m) {
    const prefix = m[1].trim()
    const amounts = m[2].split(/[・,]/).map(s => s.trim()).filter(Boolean)
    if (amounts.length >= 2) return amounts.map(a => `${prefix} ${a}`)
  }
  // 形式2: 数字のみ並列・末尾に共通単位 (例: "錠 200・300mg", "坐剤 100/200/400mg")
  m = text.match(/^(.+?)\s+((?:\d+(?:\.\d+)?)(?:\s*[・,/]\s*\d+(?:\.\d+)?)+)\s*(mg|μg|ug|g|mL)\s*$/i)
  if (m) {
    const prefix = m[1].trim()
    const numbers = m[2].split(/[・,/]/).map(s => s.trim()).filter(Boolean)
    const unit = m[3]
    if (numbers.length >= 2) return numbers.map(n => `${prefix} ${n}${unit}`)
  }
  return null
}

              <input data-bind="dose.${i}.ageMaxMonths" type="number" value="${dose.ageMaxMonths ?? ''}" class="input" placeholder="制限なしなら空欄" /></div>
            <div><label class="label">目的</label>
              <input data-bind="dose.${i}.purpose" type="text" value="${esc(dose.purpose || '')}" class="input" placeholder="治療 / 予防" /></div>
            <div><label class="label">最小体重 <span class="text-gray-400 font-normal">(kg, 任意)</span></label>
              <input data-bind="dose.${i}.weightMinKg" type="number" step="0.1" value="${dose.weightMinKg ?? ''}" class="input" placeholder="例: 10" /></div>
            <div><label class="label">最大体重 <span class="text-gray-400 font-normal">(kg, 任意, 未満)</span></label>
              <input data-bind="dose.${i}.weightMaxKg" type="number" step="0.1" value="${dose.weightMaxKg ?? ''}" class="input" placeholder="例: 20" /></div>
          </div>
          <div class="text-[11px] text-gray-500 mt-1">月齢: 1歳=12 / 6歳=72 / 12歳=144 　体重: 「最大体重」は未満で判定 (例: 40 → 39.9kg まで該当)</div>
        </div>

        <!-- 用量本体 -->
        <div>
          <div class="group-label">用量 <span style="color:#dc2626;font-weight:500;text-transform:none;letter-spacing:0;">（A・B・C のいずれか1つを使用）</span></div>
          <!-- 単位選択 (重要) -->
          <div style="background:#fef3c7;border:2px solid #fbbf24;border-radius:0.5rem;padding:0.7rem 0.9rem;margin-bottom:0.75rem;">
            <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;margin-bottom:0.4rem;">
              <span style="background:#f59e0b;color:#fff;padding:0.15rem 0.5rem;border-radius:0.25rem;font-size:11px;font-weight:700;">単位 (必須)</span>
              <select data-bind="dose.${i}.unit" class="input" style="max-width:160px;font-weight:600;">
                ${['mg','g','μg','mEq','IU','mL','包','カプセル'].map(u => `<option value="${u}" ${(dose.unit||'mg')===u?'selected':''}>${u}</option>`).join('')}
              </select>
              <span class="text-[11px] text-gray-700">→ B/C 入力欄が <b>${esc(dose.unit||'mg')}/kg/日</b> として扱われる</span>
            </div>
            <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
              <span style="background:#94a3b8;color:#fff;padding:0.15rem 0.5rem;border-radius:0.25rem;font-size:11px;font-weight:700;">力価ラベル (任意)</span>
              <input data-bind="dose.${i}.activeLabel" type="text" value="${esc(dose.activeLabel || '')}" class="input" style="max-width:160px;" placeholder="例: AMPC" />
              <span class="text-[11px] text-gray-600">合剤の力価計算用 (例: AMPC として X mg/kg/日)</span>
            </div>
          </div>
          <div class="space-y-3">

            <!-- A: 固定用量 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label" style="display:flex;align-items:center;gap:0.4rem;">
                <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:0.1rem 0.4rem;border-radius:0.25rem;">A</span>
                固定用量
              </label>
              <input data-bind="dose.${i}.fixedDose" type="text" value="${esc(dose.fixedDose || '')}" class="input" placeholder="例: 5mg/日、10mg を 1日2回" />
            </div>

            <!-- B: 単位/kg 単一 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label" style="display:flex;align-items:center;gap:0.4rem;">
                <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:0.1rem 0.4rem;border-radius:0.25rem;">B</span>
                ${esc(dose.unit||'mg')}/kg/日（単一値）
              </label>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <input data-bind="dose.${i}.dosePerKg" type="number" step="0.01" value="${dose.dosePerKg ?? ''}" class="input" style="max-width:140px;" placeholder="例: 6" />
                <span class="text-sm text-gray-500">${esc(dose.unit||'mg')}/kg/日</span>
              </div>
            </div>

            <!-- C: 単位/kg 範囲 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label" style="display:flex;align-items:center;gap:0.4rem;">
                <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:0.1rem 0.4rem;border-radius:0.25rem;">C</span>
                ${esc(dose.unit||'mg')}/kg/日（範囲）
              </label>
              <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                <input data-bind="dose.${i}.dosePerKgMin" type="number" step="0.01" value="${dose.dosePerKgMin ?? ''}" class="input" style="max-width:120px;" placeholder="最小" />
                <span class="text-sm text-gray-500">〜</span>
                <input data-bind="dose.${i}.dosePerKgMax" type="number" step="0.01" value="${dose.dosePerKgMax ?? ''}" class="input" style="max-width:120px;" placeholder="最大" />
                <span class="text-sm text-gray-500">${esc(dose.unit||'mg')}/kg/日</span>
              </div>
            </div>

            <!-- 1日最大量 -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.6rem 0.8rem;">
              <label class="label">1日最大量（上限）</label>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <input data-bind="dose.${i}.maxDosePerDay" type="number" value="${dose.maxDosePerDay ?? ''}" class="input" style="max-width:140px;" placeholder="例: 1500" />
                <span class="text-sm text-gray-500">${esc(dose.unit||'mg')}/日</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 投与方法 -->
        <div>
          <div class="group-label">投与方法</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div><label class="label">頻度</label>
              <input data-bind="dose.${i}.frequency" type="text" value="${esc(dose.frequency || '')}" class="input" placeholder="例: 分3、1日2回" /></div>
            <div><label class="label">期間</label>
              <input data-bind="dose.${i}.duration" type="text" value="${esc(dose.duration || '')}" class="input" placeholder="例: 5日間" /></div>
            <div class="sm:col-span-2"><label class="label">用量メモ <span class="text-gray-400 font-normal">（補足）</span></label>
              <input data-bind="dose.${i}.notes" type="text" value="${esc(dose.notes || '')}" class="input" placeholder="例: 食後、重症例では最大90mg/kg/日" /></div>
          </div>
        </div>
      </div>
    </div>
  `
}

// ============================================================
// 描画: 疾患タブ
// ============================================================
function diseasesTabHTML() {
  const editing = state.editingDiseaseId ? findDisease(state.editingDiseaseId) : null
  if (editing) return diseaseFormHTML(editing)
  return diseasesListHTML()
}

function diseasesListHTML() {
  const q = jpNorm(state.search)
  const cat = state.filter
  let diseases = state.data.diseases
  if (cat) diseases = diseases.filter(d => d.category === cat)
  if (q) {
    diseases = diseases.filter(d => {
      const hay = jpNorm([d.id, d.name, d.englishName, d.abbreviation, d.subcategory, ...(d.tags||[])].join(' '))
      return hay.includes(q)
    })
  }
  return `
    <div class="p-4 space-y-3">
      <div class="flex flex-col sm:flex-row gap-2">
        <input type="text" id="diseases-search" placeholder="疾患を検索" value="${esc(state.search)}" class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <select id="diseases-filter" class="px-3 py-2 text-sm border border-gray-300 rounded-md bg-white">
          <option value="">全カテゴリ (${state.data.diseases.length}件)</option>
          ${state.data.diseaseCategories.map(c => `<option value="${esc(c)}" ${state.filter===c?'selected':''}>${esc(c)} (${state.data.diseases.filter(d=>d.category===c).length})</option>`).join('')}
        </select>
        <button data-act="add-disease" class="btn-primary whitespace-nowrap">+ 新規追加</button>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        ${diseases.length === 0 ? `
          <div class="p-8 text-center text-sm text-gray-500">該当する疾患がありません</div>
        ` : diseases.map(d => `
          <div class="flex items-center gap-2 px-3 py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50">
            <div class="flex flex-col gap-0.5 shrink-0">
              <button data-act="disease-up" data-id="${esc(d.id)}" class="btn-ghost text-gray-400 hover:text-blue-600" style="padding:0.1rem 0.3rem;line-height:1;" title="上へ">${ICON.chevUp}</button>
              <button data-act="disease-down" data-id="${esc(d.id)}" class="btn-ghost text-gray-400 hover:text-blue-600" style="padding:0.1rem 0.3rem;line-height:1;" title="下へ">${ICON.chevDown}</button>
            </div>
            <div class="flex-1 min-w-0 cursor-pointer" data-edit-disease="${esc(d.id)}">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-sm font-medium text-gray-900">${esc(d.name || '(未入力)')}</span>
                ${d.abbreviation ? `<span class="badge bg-purple-50 text-purple-700">${esc(d.abbreviation)}</span>` : ''}
                ${d.pending ? `<span class="badge bg-orange-100 text-orange-700 inline-flex items-center gap-1">${ICON.alert} 未確認</span>` : ''}
                ${d.englishName ? `<span class="text-xs text-gray-500">${esc(d.englishName)}</span>` : ''}
              </div>
              <div class="text-xs text-gray-500 mt-0.5">
                ${esc(d.category || '')}${d.subcategory ? ' / ' + esc(d.subcategory) : ''} · セクション ${(d.sections||[]).length}件
              </div>
            </div>
            <button data-act="toggle-pending-disease" data-id="${esc(d.id)}" class="${d.pending ? 'text-orange-600' : 'text-gray-300 hover:text-orange-500'} text-sm px-2" title="${d.pending ? '確認済みに戻す' : '未確認にする'}">${ICON.alert}</button>
            <button data-act="del-disease" data-id="${esc(d.id)}" class="text-gray-400 hover:text-red-600 text-sm px-2">${ICON.x}</button>
          </div>
        `).join('')}
      </div>
    </div>
  `
}

function diseaseFormHTML(d) {
  const isPending = d.pending === true
  return `
    <div class="p-4 space-y-3 max-w-3xl mx-auto">
      <div class="flex items-center gap-2 flex-wrap">
        <button data-act="back-disease" class="btn-ghost inline-flex items-center gap-1.5">${ICON.arrowLeft} 一覧へ戻る</button>
        <div class="flex-1"></div>
        <button data-act="toggle-pending-disease" data-id="${esc(d.id)}" class="${isPending ? 'btn-primary' : 'btn-secondary'} inline-flex items-center gap-1.5" title="${isPending ? '確認済みに戻す' : '未確認にする (利用者側で「未確認」タブに表示)'}">
          ${isPending ? ICON.check + ' 確認済みに戻す' : ICON.alert + ' 未確認にする'}
        </button>
        <button data-act="del-disease" data-id="${esc(d.id)}" class="btn-danger">この疾患を削除</button>
      </div>
      ${isPending ? `<div class="bg-orange-50 border border-orange-200 rounded-lg p-2 text-xs text-orange-700 inline-flex items-center gap-1.5">${ICON.alert} この疾患は <strong>未確認</strong> として保存されます。利用者側ではデフォルトで「未確認」タブにのみ表示されます。</div>` : ''}

      <div class="card p-5 space-y-4">
        <h3 class="section-title">基本情報</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2"><label class="label">疾患名 <span class="text-red-500">*</span></label>
            <input data-bind="disease.name" type="text" value="${esc(d.name)}" class="input" placeholder="例: 市中肺炎" /></div>
          <div><label class="label">英語名</label>
            <input data-bind="disease.englishName" type="text" value="${esc(d.englishName || '')}" class="input" placeholder="例: Community-acquired pneumonia" /></div>
          <div><label class="label">略語</label>
            <input data-bind="disease.abbreviation" type="text" value="${esc(d.abbreviation || '')}" class="input" placeholder="例: CAP" /></div>
          <div><label class="label">カテゴリ</label>
            <select data-bind="disease.category" class="input">
              ${state.data.diseaseCategories.map(c => `<option value="${esc(c)}" ${d.category===c?'selected':''}>${esc(c)}</option>`).join('')}
            </select></div>
          <div><label class="label">サブカテゴリ <span class="text-gray-400 font-normal">（任意）</span></label>
            <input data-bind="disease.subcategory" type="text" value="${esc(d.subcategory || '')}" class="input" placeholder="例: ウイルス性" /></div>
          <div class="sm:col-span-2"><label class="label">タグ <span class="text-gray-400 font-normal">（複数は | で区切る）</span></label>
            <input data-bind="disease.tags" type="text" value="${esc((d.tags||[]).join(' | '))}" class="input" placeholder="例: 肺炎 | CAP" /></div>
          <div class="sm:col-span-2"><label class="label">ポイント <span class="text-gray-400 font-normal">（箇条書きで | で区切る）</span></label>
            <input data-bind="disease.points" type="text" value="${esc((d.points||[]).join(' | '))}" class="input" placeholder="例: 発熱5日以上 | 結膜充血 | 苺舌" /></div>
          <div class="sm:col-span-2"><label class="label">関連薬剤 <span class="text-gray-400 font-normal">（薬剤の内部ID を | で区切る）</span></label>
            <input data-bind="disease.relatedDrugIds" type="text" value="${esc((d.relatedDrugIds||[]).join(' | '))}" class="input" style="font-family:ui-monospace,monospace;" placeholder="例: amoxicillin | azithromycin" /></div>
          <div class="sm:col-span-2"><label class="label">参考文献 <span class="text-gray-400 font-normal">（複数は | で区切る）</span></label>
            <input data-bind="disease.references" type="text" value="${esc((d.references||[]).join(' | '))}" class="input" placeholder="例: 小児感染症診療マニュアル" /></div>
          <div class="sm:col-span-2"><label class="label">備考</label>
            <textarea data-bind="disease.notes" class="input" placeholder="その他のメモ">${esc(d.notes || '')}</textarea></div>
          <div class="sm:col-span-2">
            <details><summary class="text-xs text-gray-500 cursor-pointer">高度な設定 (内部ID)</summary>
              <div class="mt-2"><label class="label">内部ID</label>
                <input data-bind="disease.id" type="text" value="${esc(d.id)}" class="input" style="font-family:ui-monospace,monospace;" />
              </div>
            </details>
          </div>
        </div>
      </div>

      <div class="card p-5 space-y-3">
        <div class="flex items-center justify-between border-b-2 border-gray-200 pb-2 mb-3">
          <h3 class="text-base font-bold text-gray-900">セクション <span class="text-sm text-gray-500 font-normal">${(d.sections||[]).length}件</span></h3>
          <button data-act="add-section" class="btn-primary text-xs" style="padding:0.4rem 0.7rem;">＋ セクション追加</button>
        </div>
        ${(d.sections||[]).length === 0 ? `
          <div class="text-sm text-gray-500 py-6 text-center bg-gray-50 rounded-lg">セクションがまだありません。<br/><span class="text-xs">「診断」「治療」「フォロー」などを追加してください。</span></div>
        ` : `<div class="space-y-3">${(d.sections||[]).map((s, i) => sectionRowHTML(s, i)).join('')}</div>`}
      </div>
    </div>
  `
}

function sectionRowHTML(s, i) {
  return `
    <div class="border border-gray-200 rounded-lg p-3 space-y-2 bg-gray-50">
      <div class="flex items-center gap-2">
        <input data-bind="section.${i}.title" type="text" value="${esc(s.title || '')}" class="input flex-1" placeholder="セクションタイトル (例: 診断)" />
        <button data-act="section-up" data-i="${i}" class="btn-ghost text-sm px-2">${ICON.chevUp}</button>
        <button data-act="section-down" data-i="${i}" class="btn-ghost text-sm px-2">${ICON.chevDown}</button>
        <button data-act="section-del" data-i="${i}" class="text-gray-400 hover:text-red-600 px-1">${ICON.x}</button>
      </div>
      <textarea data-bind="section.${i}.content" class="input min-h-[120px]" placeholder="本文">${esc(s.content || '')}</textarea>
    </div>
  `
}

// ============================================================
// 描画: 輸液タブ
// ============================================================
function ivTabHTML() {
  return `
    <div class="p-4 space-y-3 max-w-4xl mx-auto">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-bold text-gray-900">輸液製剤マスター (${state.data.ivFluidTables.reduce((n, s) => n + s.fluids.length, 0)}件)</h3>
        <button data-act="add-iv-section" class="btn-primary">+ 区分を追加</button>
      </div>
      ${state.data.ivFluidTables.length === 0 ? `
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center text-sm text-gray-500">
          区分がありません。「+ 区分を追加」から作成してください。
        </div>
      ` : state.data.ivFluidTables.map((sect, si) => ivSectionHTML(sect, si)).join('')}
    </div>
  `
}

function ivSectionHTML(sect, si) {
  return `
    <div class="card overflow-hidden">
      <div style="background:#dbeafe;padding:0.75rem 1rem;display:flex;align-items:center;gap:0.5rem;border-bottom:1px solid #bfdbfe;">
        <input data-bind="ivSect.${si}.category" type="text" value="${esc(sect.category)}" class="input" style="flex:1;font-weight:600;" placeholder="区分名（例: 細胞外液補充液）" />
        <button data-act="iv-sect-up" data-i="${si}" class="btn-ghost">${ICON.chevUp}</button>
        <button data-act="iv-sect-down" data-i="${si}" class="btn-ghost">${ICON.chevDown}</button>
        <button data-act="iv-sect-del" data-i="${si}" class="btn-danger" style="padding:0.4rem 0.7rem;font-size:12px;">区分削除</button>
      </div>
      <div style="padding:0.5rem 1rem;background:#fafbfc;border-bottom:1px solid #e2e8f0;">
        <div style="display:grid;grid-template-columns:1fr;gap:0.25rem;">
          ${sect.fluids.map((f, fi) => ivFluidRowHTML(f, si, fi)).join('')}
        </div>
      </div>
      <div style="padding:0.5rem 1rem;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0;">
        <span class="text-xs text-gray-500">${sect.fluids.length}件の製剤</span>
        <button data-act="add-iv-fluid" data-si="${si}" class="btn-primary" style="padding:0.4rem 0.7rem;font-size:12px;">＋ 製剤を追加</button>
      </div>
      <div style="padding:0.75rem 1rem;">
        <label class="label">注釈（1行に1件、※1, ※2 など）</label>
        <textarea data-bind="ivSect.${si}.notes" class="input" placeholder="※1 ...&#10;※2 ...">${esc((sect.notes||[]).join('\n'))}</textarea>
      </div>
    </div>
  `
}

function ivFluidRowHTML(f, si, fi) {
  return `
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.75rem;">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
        <input data-bind="ivFluid.${si}.${fi}.name" type="text" value="${esc(f.name || '')}" class="input" style="flex:1;font-weight:600;" placeholder="製品名（例: 生理食塩液）" />
        <button data-act="iv-fluid-up" data-si="${si}" data-fi="${fi}" class="btn-ghost" title="上へ">${ICON.chevUp}</button>
        <button data-act="iv-fluid-down" data-si="${si}" data-fi="${fi}" class="btn-ghost" title="下へ">${ICON.chevDown}</button>
        <button data-act="iv-fluid-del" data-si="${si}" data-fi="${fi}" class="btn-ghost" style="color:#dc2626;" title="削除">${ICON.x}</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(75px,1fr));gap:0.4rem;">
        <div><label class="label" style="text-align:center;margin-bottom:0.15rem;">Na</label>
          <input data-bind="ivFluid.${si}.${fi}.Na" type="text" value="${esc(f.Na ?? '')}" class="input" style="text-align:center;" /></div>
        <div><label class="label" style="text-align:center;margin-bottom:0.15rem;">K</label>
          <input data-bind="ivFluid.${si}.${fi}.K" type="text" value="${esc(f.K ?? '')}" class="input" style="text-align:center;" /></div>
        <div><label class="label" style="text-align:center;margin-bottom:0.15rem;">Cl</label>
          <input data-bind="ivFluid.${si}.${fi}.Cl" type="text" value="${esc(f.Cl ?? '')}" class="input" style="text-align:center;" /></div>
        <div><label class="label" style="text-align:center;margin-bottom:0.15rem;">Ca</label>
          <input data-bind="ivFluid.${si}.${fi}.Ca" type="text" value="${esc(f.Ca ?? '')}" class="input" style="text-align:center;" /></div>
        <div><label class="label" style="text-align:center;margin-bottom:0.15rem;">Mg</label>
          <input data-bind="ivFluid.${si}.${fi}.Mg" type="text" value="${esc(f.Mg ?? '')}" class="input" style="text-align:center;" /></div>
        <div style="grid-column:span 2;"><label class="label" style="margin-bottom:0.15rem;">緩衝剤</label>
          <input data-bind="ivFluid.${si}.${fi}.buffer" type="text" value="${esc(f.buffer || '')}" class="input" placeholder="例: 乳酸 28" /></div>
        <div><label class="label" style="text-align:center;margin-bottom:0.15rem;">糖 %</label>
          <input data-bind="ivFluid.${si}.${fi}.glucose" type="text" value="${esc(f.glucose ?? '')}" class="input" style="text-align:center;" /></div>
      </div>
    </div>

// ============================================================
// 描画: ルーター
// ============================================================
function bodyHTML() {
  if (state.view === 'init') return initScreenHTML()
  if (state.view === 'setup') return setupScreenHTML()
  if (!state.data) return `<div class="flex-1 flex items-center justify-center text-sm text-gray-500">${esc(state.busy || '読み込み中…')}</div>`
  switch (state.tab) {
    case 'drugs': return drugsTabHTML()
    case 'diseases': return diseasesTabHTML()
    case 'iv': return ivTabHTML()
    case 'categories': return categoriesTabHTML()
    case 'settings': return settingsTabHTML()
  }
  return ''
}

function render() {
  const app = document.getElementById('app')
  app.innerHTML = headerHTML() + tabsHTML() + `<main class="flex-1 overflow-y-auto">${bodyHTML()}</main>` + toastHTML()
}

function renderHeader() {
  // 部分更新: ヘッダーのみ
  const app = document.getElementById('app')
  if (!app) return
  const h = app.querySelector('header')
  if (!h) { render(); return }
  h.outerHTML = headerHTML()
}

// ============================================================
// イベント処理
// ============================================================
function bindGlobalEvents() {
  document.addEventListener('click', onClick)
  document.addEventListener('change', onChange)
  document.addEventListener('input', onInput)
  // IME 変換中は再描画を抑制 (日本語入力で1文字確定→DOM入れ替えで変換が中断される問題の対策)
  document.addEventListener('compositionstart', e => {
    if (e.target && (e.target.id === 'drugs-search' || e.target.id === 'diseases-search')) {
      _imeComposing = true
    }
  }, true)
  document.addEventListener('compositionend', e => {
    if (e.target && (e.target.id === 'drugs-search' || e.target.id === 'diseases-search')) {
      _imeComposing = false
      // 確定後の値で検索を即時更新 (input イベントと別経路で発火させる)
      state.search = e.target.value
      debouncedRender(e.target)
    }
  }, true)
}

function onClick(e) {
  const t = e.target.closest('[data-act], [data-tab], [data-edit-drug], [data-edit-disease]')
  if (!t) return
  const act = t.dataset.act
  const tab = t.dataset.tab
  const editDrug = t.dataset.editDrug
  const editDisease = t.dataset.editDisease

  if (tab) { setState({ tab, search:'', filter:'', editingDrugId:null, editingDiseaseId:null }); return }
  if (editDrug) { setState({ editingDrugId: editDrug }); return }
  if (editDisease) { setState({ editingDiseaseId: editDisease }); return }

  if (act === 'goto-setup') { setState({ view:'setup' }); return }
  if (act === 'save-token') {
    const v = document.getElementById('setup-token').value.trim()
    state.token = v; LS.set(K_TOKEN, v); showToast('トークンを保存しました', 'ok'); render(); return
  }
  if (act === 'use-gist') {
    const v = document.getElementById('setup-gist-id').value.trim()
    if (!v) { showToast('Gist ID を入力してください', 'err'); return }
    state.gistId = v; LS.set(K_GIST_ID, v)
    loadFromGist()
    return
  }
  if (act === 'create-empty-gist') { createNewGist(emptyData()); return }
  if (act === 'import-from-html') {
    const f = document.getElementById('setup-import-file').files[0]
    if (!f) { showToast('ファイルを選択してください', 'err'); return }
    importFromIndexHtml(f).then(d => createNewGist(d)).catch(err => showToast('読込失敗: ' + err.message, 'err'))
    return
  }
  if (act === 'save') { saveToGist(); return }
  if (act === 'reload') {
    if (state.dirty && !confirm('未保存の変更があります。破棄して再読込しますか？')) return
    loadFromGist(); return
  }
  if (act === 'logout') {
    if (!confirm('保存設定をすべてクリアします。よろしいですか？\n（Gist のデータ自体は消えません）')) return
    LS.del(K_TOKEN); LS.del(K_GIST_ID); LS.del(K_DRAFT); LS.del(K_LAST_SAVED)
    state.token = ''; state.gistId = ''; state.data = null; state.view = 'init'; state.dirty = false
    render(); return
  }
  if (act === 'export-json') {
    downloadJson(GIST_FILENAME, JSON.stringify(state.data, null, 2)); return
  }
  if (act === 'copy-share') {
    const url = t.dataset.url
    navigator.clipboard.writeText(url).then(() => showToast('URL をコピーしました', 'ok')).catch(() => showToast('コピーできませんでした', 'err'))
    return
  }
  if (act === 'import-replace') {
    const f = document.getElementById('import-file').files[0]
    if (!f) { showToast('ファイルを選択してください', 'err'); return }
    if (!confirm('現在のデータに上書きします。よろしいですか？')) return
    importFromIndexHtml(f).then(d => { state.data = d; markDirty(); showToast('インポートしました。「保存」を押して Gist に反映してください', 'ok'); render() }).catch(err => showToast('失敗: ' + err.message, 'err'))
    return
  }
  if (act === 'import-from-url') {
    // 安全なマージ動作: 既存データを保持し、index.html にあって現在の Gist データに無い id だけを未確認として追加
    if (!confirm('index.html を取り込み、現在の Gist データに無い id の薬剤・疾患だけを「未確認」として追加します。既存の編集内容は変更しません。よろしいですか？')) return
    showToast('取得中…', 'ok')
    importFromUrl().then(d => {
      const existingDrugIds = new Set((state.data.drugs || []).map(x => x.id))
      const existingDiseaseIds = new Set((state.data.diseases || []).map(x => x.id))
      const newDrugs = (d.drugs || []).filter(x => x && x.id && !existingDrugIds.has(x.id)).map(x => ({...x, pending: true}))
      const newDiseases = (d.diseases || []).filter(x => x && x.id && !existingDiseaseIds.has(x.id)).map(x => ({...x, pending: true}))
      const newDrugCats = (d.drugCategories || []).filter(c => !(state.data.drugCategories || []).includes(c))
      const newDiseaseCats = (d.diseaseCategories || []).filter(c => !(state.data.diseaseCategories || []).includes(c))
      if (newDrugs.length === 0 && newDiseases.length === 0 && newDrugCats.length === 0 && newDiseaseCats.length === 0) {
        showToast('追加すべき新規データはありません (全て既存)', 'ok')
        return
      }
      state.data.drugs = [...(state.data.drugs || []), ...newDrugs]
      state.data.diseases = [...(state.data.diseases || []), ...newDiseases]
      state.data.drugCategories = [...(state.data.drugCategories || []), ...newDrugCats]
      state.data.diseaseCategories = [...(state.data.diseaseCategories || []), ...newDiseaseCats]
      markDirty()
      const msg = `薬剤 +${newDrugs.length} / 疾患 +${newDiseases.length}` +
        (newDrugCats.length ? ` / 薬カテゴリ +${newDrugCats.length}` : '') +
        (newDiseaseCats.length ? ` / 疾患カテゴリ +${newDiseaseCats.length}` : '') +
        ' を未確認で追加しました。「保存」で Gist に反映してください'
      showToast(msg, 'ok')
      render()
    }).catch(err => {
      console.error('[import-from-url] 失敗', err)
      alert('インポート失敗\n\n' + err.message + '\n\n手動でファイル選択するか、上記の URL を直接ブラウザで開いて確認してください。')
    })
    return
  }
  if (act === 'import-from-url-replace') {
    if (!confirm('⚠️ 全データを上書きします。現在の編集内容は全て失われます。本当によろしいですか？')) return
    if (!confirm('もう一度確認します: 編集内容を全て破棄して index.html の内容で置換しますか？')) return
    showToast('取得中…', 'ok')
    importFromUrl().then(d => {
      state.data = d
      markDirty()
      const stat = `薬剤 ${d.drugs.length} / 疾患 ${d.diseases.length} / 輸液 ${d.ivFluidTables.reduce((n,s)=>n+(s.fluids?.length||0),0)}`
      showToast(`置換成功: ${stat}。「保存」で Gist に反映してください`, 'ok')
      render()
    }).catch(err => {
      console.error('[import-from-url-replace] 失敗', err)
      alert('インポート失敗\n\n' + err.message)
    })
    return
  }

  // 薬剤
  if (act === 'add-drug') { const d = newDrug(); state.data.drugs.push(d); state.editingDrugId = d.id; markDirty(); render(); return }
  if (act === 'back-drug') { setState({ editingDrugId:null }); return }
  if (act === 'del-drug') {
    const id = t.dataset.id; const drug = findDrug(id)
    if (!drug) return
    if (!confirm(`「${drug.genericName || id}」を削除しますか？`)) return
    state.data.drugs = state.data.drugs.filter(d => d.id !== id)
    state.editingDrugId = null; markDirty(); render(); return
  }
  if (act === 'toggle-pending-drug') {
    const id = t.dataset.id; const drug = findDrug(id)
    if (!drug) return
    drug.pending = !drug.pending
    markDirty(); render()
    showToast(drug.pending ? '未確認にしました' : '確認済みに戻しました', 'ok')
    return
  }
  if (act === 'drug-up' || act === 'drug-down') {
    const id = t.dataset.id
    const arr = state.data.drugs
    const i = arr.findIndex(d => d.id === id)
    if (i < 0) return
    if (act === 'drug-up' && i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]] }
    if (act === 'drug-down' && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]] }
    markDirty(); render(); return
  }
  if (act === 'add-dose') {
    const d = findDrug(state.editingDrugId); d.pediatricDoses.push(newDose()); markDirty(); render(); return
  }
  if (act === 'dose-up' || act === 'dose-down' || act === 'dose-del') {
    const d = findDrug(state.editingDrugId); const i = +t.dataset.i
    if (act === 'dose-up' && i > 0) { [d.pediatricDoses[i-1], d.pediatricDoses[i]] = [d.pediatricDoses[i], d.pediatricDoses[i-1]] }
    if (act === 'dose-down' && i < d.pediatricDoses.length - 1) { [d.pediatricDoses[i+1], d.pediatricDoses[i]] = [d.pediatricDoses[i], d.pediatricDoses[i+1]] }
    if (act === 'dose-del') { d.pediatricDoses.splice(i, 1) }
    markDirty(); render(); return
  }
  if (act === 'add-formulation') {
    const d = findDrug(state.editingDrugId); if (!d) return
    if (!Array.isArray(d.formulations)) d.formulations = []
    d.formulations.push('')
    markDirty(); render(); return
  }
  if (act === 'form-up' || act === 'form-down' || act === 'form-del') {
    const d = findDrug(state.editingDrugId); if (!d) return
    if (!Array.isArray(d.formulations)) return
    const i = +t.dataset.fi
    if (act === 'form-up' && i > 0) { [d.formulations[i-1], d.formulations[i]] = [d.formulations[i], d.formulations[i-1]] }
    if (act === 'form-down' && i < d.formulations.length - 1) { [d.formulations[i+1], d.formulations[i]] = [d.formulations[i], d.formulations[i+1]] }
    if (act === 'form-del') { d.formulations.splice(i, 1) }
    markDirty(); render(); return
  }
  if (act === 'form-split') {
    const d = findDrug(state.editingDrugId); if (!d) return
    if (!Array.isArray(d.formulations)) return
    const i = +t.dataset.fi
    const entry = d.formulations[i]
    const text = typeof entry === 'string' ? entry : (entry && entry.text) || ''
    const split = trySplitFormulation(text)
    if (!split) return
    // 制約付きエントリの場合は同じ制約を各分割先にも継承する
    const base = (typeof entry === 'object' && entry) ? entry : null
    const hasConstraint = base && (base.ageMinMonths != null || base.ageMaxMonths != null || base.weightMinKg != null || base.weightMaxKg != null || (base.notes && base.notes !== ''))
    const newEntries = split.map(s => hasConstraint ? { ...base, text: s } : s)
    d.formulations.splice(i, 1, ...newEntries)
    markDirty(); render()
    showToast(`${split.length}件に分割しました`, 'ok')
    return
  }

  // 疾患
  if (act === 'add-disease') { const d = newDisease(); state.data.diseases.push(d); state.editingDiseaseId = d.id; markDirty(); render(); return }
  if (act === 'back-disease') { setState({ editingDiseaseId:null }); return }
  if (act === 'del-disease') {
    const id = t.dataset.id; const dis = findDisease(id)
    if (!dis) return
    if (!confirm(`「${dis.name || id}」を削除しますか？`)) return
    state.data.diseases = state.data.diseases.filter(d => d.id !== id)
    state.editingDiseaseId = null; markDirty(); render(); return
  }
  if (act === 'toggle-pending-disease') {
    const id = t.dataset.id; const dis = findDisease(id)
    if (!dis) return
    dis.pending = !dis.pending
    markDirty(); render()
    showToast(dis.pending ? '未確認にしました' : '確認済みに戻しました', 'ok')
    return
  }
  if (act === 'disease-up' || act === 'disease-down') {
    const id = t.dataset.id
    const arr = state.data.diseases
    const i = arr.findIndex(d => d.id === id)
    if (i < 0) return
    if (act === 'disease-up' && i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]] }
    if (act === 'disease-down' && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]] }
    markDirty(); render(); return
  }
  if (act === 'add-section') {
    const d = findDisease(state.editingDiseaseId); d.sections.push(newSection()); markDirty(); render(); return
  }
  if (act === 'section-up' || act === 'section-down' || act === 'section-del') {
    const d = findDisease(state.editingDiseaseId); const i = +t.dataset.i
    if (act === 'section-up' && i > 0) { [d.sections[i-1], d.sections[i]] = [d.sections[i], d.sections[i-1]] }
    if (act === 'section-down' && i < d.sections.length - 1) { [d.sections[i+1], d.sections[i]] = [d.sections[i], d.sections[i+1]] }
    if (act === 'section-del') { d.sections.splice(i, 1) }
    markDirty(); render(); return
  }

  // 輸液
  if (act === 'add-iv-section') { state.data.ivFluidTables.push(newIvSection()); markDirty(); render(); return }
  if (act === 'iv-sect-up' || act === 'iv-sect-down' || act === 'iv-sect-del') {
    const i = +t.dataset.i; const arr = state.data.ivFluidTables
    if (act === 'iv-sect-up' && i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]] }
    if (act === 'iv-sect-down' && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]] }
    if (act === 'iv-sect-del') {
      if (!confirm(`区分「${arr[i].category}」(製剤 ${arr[i].fluids.length}件) を削除しますか？`)) return
      arr.splice(i, 1)
    }
    markDirty(); render(); return
  }
  if (act === 'add-iv-fluid') { const si = +t.dataset.si; state.data.ivFluidTables[si].fluids.push(newIvFluid()); markDirty(); render(); return }
  if (act === 'iv-fluid-up' || act === 'iv-fluid-down' || act === 'iv-fluid-del') {
    const si = +t.dataset.si, fi = +t.dataset.fi
    const fluids = state.data.ivFluidTables[si].fluids
    if (act === 'iv-fluid-up' && fi > 0) { [fluids[fi-1], fluids[fi]] = [fluids[fi], fluids[fi-1]] }
    if (act === 'iv-fluid-down' && fi < fluids.length - 1) { [fluids[fi+1], fluids[fi]] = [fluids[fi], fluids[fi+1]] }
    if (act === 'iv-fluid-del') { fluids.splice(fi, 1) }
    markDirty(); render(); return
  }

  // カテゴリ
  if (act === 'add-cat') {
    const k = t.dataset.kind; const arr = k === 'drug' ? state.data.drugCategories : state.data.diseaseCategories
    arr.push('新カテゴリ'); markDirty(); render(); return
  }
  if (act === 'cat-up' || act === 'cat-down' || act === 'cat-del') {
    const k = t.dataset.kind; const i = +t.dataset.i
    const arr = k === 'drug' ? state.data.drugCategories : state.data.diseaseCategories
    if (act === 'cat-up' && i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]] }
    if (act === 'cat-down' && i < arr.length - 1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]] }
    if (act === 'cat-del') { arr.splice(i, 1) }
    markDirty(); render(); return
  }

  // 一括 未確認 / 確認済み
  if (act === 'bulk-pending-drugs') {
    const n = state.data.drugs.length
    if (n === 0) { showToast('薬剤がありません', 'err'); return }
    if (!confirm(`全 ${n} 件の薬剤を「未確認」にします。よろしいですか？`)) return
    state.data.drugs.forEach(d => { d.pending = true })
    markDirty(); render(); showToast(`${n} 件を未確認にしました`, 'ok'); return
  }
  if (act === 'bulk-confirmed-drugs') {
    const n = state.data.drugs.filter(d => d.pending).length
    if (n === 0) { showToast('未確認の薬剤はありません', 'ok'); return }
    if (!confirm(`未確認の薬剤 ${n} 件を「確認済み」にします。よろしいですか？`)) return
    state.data.drugs.forEach(d => { d.pending = false })
    markDirty(); render(); showToast(`${n} 件を確認済みに戻しました`, 'ok'); return
  }
  if (act === 'bulk-pending-diseases') {
    const n = state.data.diseases.length
    if (n === 0) { showToast('疾患がありません', 'err'); return }
    if (!confirm(`全 ${n} 件の疾患を「未確認」にします。よろしいですか？`)) return
    state.data.diseases.forEach(d => { d.pending = true })
    markDirty(); render(); showToast(`${n} 件を未確認にしました`, 'ok'); return
  }
  if (act === 'bulk-confirmed-diseases') {
    const n = state.data.diseases.filter(d => d.pending).length
    if (n === 0) { showToast('未確認の疾患はありません', 'ok'); return }
    if (!confirm(`未確認の疾患 ${n} 件を「確認済み」にします。よろしいですか？`)) return
    state.data.diseases.forEach(d => { d.pending = false })
    markDirty(); render(); showToast(`${n} 件を確認済みに戻しました`, 'ok'); return
  }
}

function onChange(e) {
  const t = e.target
  if (t.id === 'drugs-filter' || t.id === 'diseases-filter') {
    setState({ filter: t.value }); return
  }
  // data-bind 経由の更新は input イベントで処理
}

function onInput(e) {
  const t = e.target
  if (t.id === 'drugs-search' || t.id === 'diseases-search') {
    state.search = t.value
    // 日本語変換中は再描画しない (compositionend で発火する)
    if (_imeComposing) return
    debouncedRender(t)
    return
  }
  const bind = t.dataset.bind
  if (!bind) return
  applyBind(bind, t.value, t.type)
}

const debouncedRender = debounce((focusEl) => {
  // 変換中なら描画延期 (誤って変換途中で DOM が入れ替わるのを防ぐ)
  if (_imeComposing) { setTimeout(() => debouncedRender(focusEl), 100); return }
  const id = focusEl.id, val = focusEl.value
  render()
  const after = document.getElementById(id)
  if (after) { after.focus(); after.value = val; after.setSelectionRange(val.length, val.length) }
}, 250)

function applyBind(bind, value, inputType) {
  const parseListPipe = v => v.split('|').map(s => s.trim()).filter(Boolean)
  const parseListNL = v => v.split('\n').map(s => s.trim()).filter(Boolean)
  const numOrEmpty = v => v === '' ? '' : (isNaN(+v) ? v : +v)

  const parts = bind.split('.')
  const root = parts[0]
  const drug = state.editingDrugId ? findDrug(state.editingDrugId) : null
  const dis = state.editingDiseaseId ? findDisease(state.editingDiseaseId) : null

  if (root === 'drug' && drug) {
    const f = parts[1]
    if (f === 'brandNames' || f === 'references') drug[f] = parseListPipe(value)
    else drug[f] = value
    markDirty(); return
  }
  if (root === 'form' && drug) {
    // 剤形の構造化編集: form.<idx>.<field>
    const i = +parts[1]; const f = parts[2]
    if (!Array.isArray(drug.formulations)) drug.formulations = []
    let entry = drug.formulations[i]
    // 必要に応じて object に昇格させる
    if (typeof entry === 'string') entry = { text: entry }
    if (entry == null) entry = { text: '' }
    if (['ageMinMonths','ageMaxMonths','weightMinKg','weightMaxKg'].includes(f)) {
      const n = value === '' ? undefined : +value
      if (n === undefined) delete entry[f]; else entry[f] = n
    } else if (f === 'text') {
      entry.text = value
    } else if (f === 'notes') {
      if (value === '') delete entry.notes; else entry.notes = value
    }
    // 制約が一切なくなったらシンプル文字列に戻す (Gist の容量節約)
    const onlyText = entry.text != null && entry.ageMinMonths == null && entry.ageMaxMonths == null && entry.weightMinKg == null && entry.weightMaxKg == null && (entry.notes == null || entry.notes === '')
    drug.formulations[i] = onlyText ? entry.text : entry
    markDirty(); return
  }
  if (root === 'dose' && drug) {
    const i = +parts[1]; const f = parts[2]; const dose = drug.pediatricDoses[i]
    if (['ageMinMonths','ageMaxMonths','weightMinKg','weightMaxKg','dosePerKg','dosePerKgMin','dosePerKgMax','maxDosePerDay'].includes(f)) {
      const n = value === '' ? undefined : +value
      if (n === undefined) delete dose[f]; else dose[f] = n
    } else {
      if (value === '') delete dose[f]; else dose[f] = value
    }
    markDirty(); return
  }
  if (root === 'disease' && dis) {
    const f = parts[1]
    if (['tags','points','relatedDrugIds','references'].includes(f)) dis[f] = parseListPipe(value)
    else dis[f] = value
    markDirty(); return
  }
  if (root === 'section' && dis) {
    const i = +parts[1]; const f = parts[2]
    dis.sections[i][f] = value; markDirty(); return
  }
  if (root === 'ivSect') {
    const i = +parts[1]; const f = parts[2]; const sect = state.data.ivFluidTables[i]
    if (f === 'notes') sect.notes = parseListNL(value)
    else sect[f] = value
    markDirty(); return
  }
  if (root === 'ivFluid') {
    const si = +parts[1], fi = +parts[2], f = parts[3]
    const fluid = state.data.ivFluidTables[si].fluids[fi]
    if (['Na','K','Cl','Ca','Mg','glucose'].includes(f)) fluid[f] = numOrEmpty(value)
    else fluid[f] = value
    markDirty(); return
  }
  if (root === 'cat') {
    // カテゴリ名変更時は、そのカテゴリに所属する薬剤・疾患の category も自動更新する
    const kind = parts[1]; const i = +parts[2]
    const arr = kind === 'drug' ? state.data.drugCategories : state.data.diseaseCategories
    const oldName = arr[i]
    if (oldName === value) { arr[i] = value; markDirty(); return }
    arr[i] = value
    if (kind === 'drug') {
      let count = 0
      for (const d of (state.data.drugs || [])) {
        if (d.category === oldName) { d.category = value; count++ }
      }
      if (count > 0) showToast(`「${oldName}」→「${value}」に ${count}件 の薬剤を移動しました`, 'ok')
    } else {
      let count = 0
      for (const d of (state.data.diseases || [])) {
        if (d.category === oldName) { d.category = value; count++ }
      }
      if (count > 0) showToast(`「${oldName}」→「${value}」に ${count}件 の疾患を移動しました`, 'ok')
    }
    markDirty(); return
  }
}

function downloadJson(filename, content) {
  const blob = new Blob([content], { type: 'application/json' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url; a.download = filename; a.click()
  URL.revokeObjectURL(url)
}

// ============================================================
// 起動
// ============================================================
function init() {
  bindGlobalEvents()

  // 下書き優先で復元
  const draft = LS.get(K_DRAFT, 'null')
  const lastSaved = LS.get(K_LAST_SAVED, 'null')

  if (state.token && state.gistId) {
    if (draft) {
      state.data = normalizeData(draft)
      state.dirty = true
      state.view = 'main'
      render()
      // バックグラウンドで Gist と比較するとよいが MVP では下書き表示のみ
    } else if (lastSaved) {
      // キャッシュを表示しつつ、リモートを再取得
      state.data = normalizeData(lastSaved)
      state.view = 'main'
      render()
      loadFromGist()
    } else {
      loadFromGist()
    }
  } else {
    state.view = 'init'
    render()
  }
}

init()

// 離脱時警告
window.addEventListener('beforeunload', e => {
  if (state.dirty) { e.preventDefault(); e.returnValue = '' }
})
</script>
