.slide{position:fixed;inset:0;background:#f1f5f9;overflow-y:auto;z-index:40;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);}
.slide.open{transform:translateX(0);}

const ls = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null } catch { return null } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)) } catch {} },
}

const S = {
  token: ls.get(K.token)||'',
  gistId: ls.get(K.gistId)||'',

  editItem: null,

  editIVIdx: null,

  saving: false,

}

const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const clone = o=>JSON.parse(JSON.stringify(o))
function jpNorm(s){if(!s)return'';let v=String(s);try{v=v.normalize('NFKC')}catch{};v=v.replace(/[ぁ-ゖ]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));return v.toLowerCase().trim()}
function ss(p){Object.assign(S,p);render()}
function toast(msg,kind='success'){S.toast={msg,kind,t:Date.now()};render();setTimeout(()=>{if(S.toast&&Date.now()-S.toast.t>=2400){S.toast=null;render()}},2500)}

// ── Gist API ───────────────────────────────────────────────────────────────
async function ghFetch(url,opts={}){
  const h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(opts.headers||{})}
  if(S.token)h['Authorization']=`Bearer ${S.token}`
  if(opts.body&&typeof opts.body==='object'){h['Content-Type']='application/json';opts={...opts,body:JSON.stringify(opts.body)}}
  const res=await fetch(url,{...opts,headers:h})
  if(!res.ok){let m=`GitHub API ${res.status}`;try{const j=await res.json();m+=': '+(j.message||JSON.stringify(j))}catch{};throw new Error(m)}
  return res.json()
}
async function fetchGist(){
  if(!S.gistId)throw new Error('Gist ID 未設定')
  const g=await ghFetch(`https://api.github.com/gists/${S.gistId}`)
  const f=g.files[GIST_FILE];if(!f)throw new Error(`${GIST_FILE} が Gist にありません`)
  const c=f.content||(f.truncated?await(await fetch(f.raw_url)).text():'')
  return JSON.parse(c)
}
async function patchGist(data){
  if(!S.gistId)throw new Error('Gist ID 未設定')
  const body={...data,updatedAt:new Date().toISOString()}
  await ghFetch(`https://api.github.com/gists/${S.gistId}`,{method:'PATCH',body:{files:{[GIST_FILE]:{content:JSON.stringify(body,null,2)}}}})
  ls.set(K.appCache,body);ls.set(K.appCacheAt,String(Date.now()));ls.set(K.appGistId,S.gistId)
}

// ── Load from index.html (same-origin fetch) ───────────────────────────────
async function loadFromIndexHtml(){
  const html=await fetch('./index.html').then(r=>{if(!r.ok)throw new Error('fetch failed');return r.text()})
  const s=html.indexOf('let CATEGORIES')
  const e=html.indexOf('const LS =',s)
  if(s<0||e<0)throw new Error('データセクション抽出失敗')
  const dataJs=html.slice(s,e)
  const fn=new Function(dataJs+'return {CATEGORIES,DISEASE_CATEGORIES,IV_FLUID_TABLES,DISEASES,DRUGS}')
  const d=fn()
  return {version:1,updatedAt:new Date().toISOString(),drugCategories:d.CATEGORIES,diseaseCategories:d.DISEASE_CATEGORIES,drugs:d.DRUGS,diseases:d.DISEASES,ivFluidTables:d.IV_FLUID_TABLES}
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init(){
  ss({loading:true,loadError:null,dataSource:null})
  // 1) fetch ./index.html (works on localhost / GitHub Pages)
  try{
    const data=await loadFromIndexHtml()
    ss({data,loading:false,dataSource:'index.html'})
    return
  }catch(e){console.info('index.html fetch:',e.message)}
  // 2) Gist (requires auth, works anywhere)
  if(S.token&&S.gistId){
    try{
      const data=await fetchGist()
      ss({data,loading:false,dataSource:'gist'})
      toast('Gist から読み込みました','info')
      return
    }catch(e){console.info('Gist fetch:',e.message)}
  }
  // 3) Embedded BUILTIN_DATA (always works, data from index.html at build time)
  ss({data:clone(BUILTIN_DATA),loading:false,dataSource:'builtin'})
  toast('組み込みデータを使用しています','info')
}

// ── Data helpers ───────────────────────────────────────────────────────────
const drugKey=d=>d.id||d.genericName||''
const diseaseKey=d=>d.id||d.name||''
function filteredDrugs(){
  const q=jpNorm(S.drugSearch)
  return(S.data?.drugs||[]).filter(d=>{
    if(S.drugCat!=='すべて'&&d.category!==S.drugCat)return false
    if(!q)return true
    return[d.genericName,d.abbreviation,...(d.brandNames||[])].some(s=>jpNorm(s).includes(q))
  })
}
function filteredDiseases(){
  const q=jpNorm(S.diseaseSearch)
  return(S.data?.diseases||[]).filter(d=>{

// ── Sync DOM → state ──────────────────────────────────────────────────────
function syncCurrentTab(){
  const d=S.editItem;if(!d)return
  if(S.editType==='drug'){
    if(S.editTab==='basic'){
      ;['genericName','abbreviation','adultDose','notes','sideEffects'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)d[f]=el.value})
      const bn=document.getElementById('f_brandNames');if(bn)d.brandNames=bn.value.split(',').map(s=>s.trim()).filter(Boolean)
      const cat=document.getElementById('f_category');if(cat)d.category=cat.value
      const rt=document.getElementById('f_route');if(rt)d.route=rt.value
    }else if(S.editTab==='doses'){
      document.querySelectorAll('[data-dose-i]').forEach(row=>{
        const i=parseInt(row.dataset.doseI);const dose=d.pediatricDoses?.[i];if(!dose)return
        row.querySelectorAll('[data-f]').forEach(el=>{
          const f=el.dataset.f;const num=['dosePerKg','dosePerKgMin','dosePerKgMax','maxDosePerDay']
          dose[f]=num.includes(f)?(el.value===''?null:parseFloat(el.value)):el.value
        })
      })
    }else if(S.editTab==='iv'){
      if(d.ivDilution){
        const sv=document.getElementById('iv_solvent');if(sv)d.ivDilution.solvent=sv.value
        const mc=document.getElementById('iv_maxConc');if(mc)d.ivDilution.maxConcMgPerMl=parseFloat(mc.value)||0
        const it=document.getElementById('iv_infTime');if(it)d.ivDilution.infusionTime=it.value
        const ic=document.getElementById('iv_incomp');if(ic)d.ivDilution.incompatible=ic.value.split(String.fromCharCode(10)).map(s=>s.trim()).filter(Boolean)
      }
    }else if(S.editTab==='form'){
      document.querySelectorAll('[data-form-i]').forEach(el=>{
        const i=parseInt(el.dataset.formI);if(d.formulations?.[i]!=null)d.formulations[i]=el.value
      })
    }
  }else if(S.editType==='disease'){
    ;['id','name','englishName','abbreviation','notes'].forEach(f=>{const el=document.getElementById('dis_'+f);if(el)d[f]=el.value})
    const cat=document.getElementById('dis_category');if(cat)d.category=cat.value
    const tags=document.getElementById('dis_tags');if(tags)d.tags=tags.value.split(',').map(s=>s.trim()).filter(Boolean)
    const pts=document.getElementById('dis_points');if(pts)d.points=pts.value.split(String.fromCharCode(10)).map(s=>s.trim()).filter(Boolean)
    const refs=document.getElementById('dis_references');if(refs)d.references=refs.value.split(String.fromCharCode(10)).map(s=>s.trim()).filter(Boolean)
    const sel=document.getElementById('dis_relatedDrugIds');if(sel)d.relatedDrugIds=Array.from(sel.selectedOptions).map(o=>o.value)
    document.querySelectorAll('[data-sec-i]').forEach(row=>{
      const i=parseInt(row.dataset.secI);if(!d.sections?.[i])return
      const t=row.querySelector('[data-f="title"]');const c=row.querySelector('[data-f="content"]')
      if(t)d.sections[i].title=t.value;if(c)d.sections[i].content=c.value
    })
  }else if(S.editType==='iv'){
    const catEl=document.getElementById('ivsec_cat');if(catEl)d.category=catEl.value
    const notesEl=document.getElementById('ivsec_notes');if(notesEl)d.notes=notesEl.value.split(String.fromCharCode(10)).map(s=>s.trim()).filter(Boolean)
    document.querySelectorAll('[data-fluid-i]').forEach(row=>{
      const i=parseInt(row.dataset.fluidI);if(!d.fluids?.[i])return
      row.querySelectorAll('[data-f]').forEach(el=>{
        const f=el.dataset.f;const v=el.value.trim()
        d.fluids[i][f]=(v===''||v==='-')?'-':(isNaN(parseFloat(v))?v:parseFloat(v))
      })
    })
  }
}

  else content=buildDrugForm(d)
  return`<div class="slide open"><div class="max-w-2xl mx-auto flex flex-col min-h-screen">
    <div class="sticky top-0 z-10 bg-white border-b border-slate-200 shadow-sm">
      <div class="px-4 py-3 flex items-center gap-3">
        <button onclick="ss({editType:null,editItem:null})" class="text-slate-500 text-sm font-medium hover:text-slate-800">← 一覧</button>
        <div class="flex-1 min-w-0"><div class="font-bold text-sm text-slate-800 truncate">${esc(d.genericName||'新規薬剤')}</div><div class="text-xs text-slate-400">${esc(d.category||'')}</div></div>
        <button onclick="commitDrug()" class="btn btn-g text-sm">✓ 適用</button>
      </div>
      <div class="flex border-t border-slate-100">${tabBar}</div>
    </div>
    <div class="flex-1 px-4 py-4 space-y-3 pb-8">${content}</div>
  </div></div>`
}
function buildDrugBasic(d){
  const catOpts=(S.data?.drugCategories||[]).map(c=>`<option value="${esc(c)}" ${d.category===c?'selected':''}>${esc(c)}</option>`).join('')
  const rtOpts=['内服','注射/点滴','内服・注射'].map(r=>`<option value="${esc(r)}" ${d.route===r?'selected':''}>${esc(r)}</option>`).join('')
  return`<div class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <div><label class="lbl">一般名 *</label><input id="f_genericName" class="inp" value="${esc(d.genericName||'')}"></div>
      <div><label class="lbl">略語</label><input id="f_abbreviation" class="inp" value="${esc(d.abbreviation||'')}"></div>
    </div>
    <div><label class="lbl">ブランド名（カンマ区切り）</label><input id="f_brandNames" class="inp" value="${esc((d.brandNames||[]).join(', '))}"></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="lbl">カテゴリ</label><select id="f_category" class="inp">${catOpts}</select></div>
      <div><label class="lbl">投与経路</label><select id="f_route" class="inp">${rtOpts}</select></div>
    </div>
    <div><label class="lbl">成人用量（参考）</label><textarea id="f_adultDose" class="inp">${esc(d.adultDose||'')}</textarea></div>
    <div><label class="lbl">注意事項</label><textarea id="f_notes" class="inp">${esc(d.notes||'')}</textarea></div>
    <div><label class="lbl">副作用</label><input id="f_sideEffects" class="inp" value="${esc(d.sideEffects||'')}"></div>
  </div>`
}
function buildDrugDoses(d){
  const doses=d.pediatricDoses||[]
  const rows=doses.map((dose,i)=>{
    const type=doseType(dose)
    const typeOpts=['single','range','fixed'].map(t=>`<option value="${t}" ${type===t?'selected':''}>${{single:'単値 mg/kg/日',range:'範囲 min〜max',fixed:'固定テキスト'}[t]}</option>`).join('')
    const doseF=type==='single'
      ?`<div><label class="lbl">mg/kg/日</label><input type="number" step="0.1" class="inp" data-f="dosePerKg" value="${esc(dose.dosePerKg??'')}"></div>`
      :type==='range'
      ?`<div class="grid grid-cols-2 gap-2"><div><label class="lbl">最小</label><input type="number" step="0.1" class="inp" data-f="dosePerKgMin" value="${esc(dose.dosePerKgMin??'')}"></div><div><label class="lbl">最大</label><input type="number" step="0.1" class="inp" data-f="dosePerKgMax" value="${esc(dose.dosePerKgMax??'')}"></div></div>`
      :`<div><label class="lbl">固定テキスト</label><input class="inp" data-f="fixedDose" value="${esc(dose.fixedDose||'')}"></div>`
    return`<div class="card p-3 space-y-2" data-dose-i="${i}">
      <div class="flex items-center justify-between pb-1.5 border-b border-slate-100">
        <span class="text-xs font-bold text-blue-700">用量 ${i+1}</span>
        <button onclick="removeDose(${i})" class="btn btn-d text-xs py-0.5 px-2">✕ 削除</button>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div><label class="lbl">対象</label><input class="inp text-xs" data-f="ageLabel" value="${esc(dose.ageLabel||'')}"></div>
        <div><label class="lbl">目的</label><input class="inp text-xs" data-f="purpose" value="${esc(dose.purpose||'')}"></div>
      </div>
      <div><label class="lbl">用量タイプ</label><select class="inp text-xs" onchange="changeDoseType(${i},this.value)">${typeOpts}</select></div>
      ${doseF}
      <div class="grid grid-cols-3 gap-2">
        <div><label class="lbl">最大量/日(mg)</label><input type="number" class="inp text-xs" data-f="maxDosePerDay" value="${esc(dose.maxDosePerDay??'')}"></div>
        <div><label class="lbl">頻度</label><input class="inp text-xs" data-f="frequency" value="${esc(dose.frequency||'')}" placeholder="分3"></div>
        <div><label class="lbl">期間</label><input class="inp text-xs" data-f="duration" value="${esc(dose.duration||'')}"></div>
      </div>
      <div><label class="lbl">備考</label><input class="inp text-xs" data-f="notes" value="${esc(dose.notes||'')}"></div>
    </div>`
  }).join('')
  return`<div class="space-y-2.5">${rows||'<div class="text-center text-slate-400 text-sm py-8">用量未設定</div>'}<button onclick="addDose()" class="w-full btn btn-s justify-center py-2.5">＋ 用量を追加</button></div>`
}
function buildDrugIV(d){
  const iv=d.ivDilution,has=!!iv
  const svOpts=['NS','5%DW','NS/5%DW'].map(s=>`<option value="${s}" ${iv?.solvent===s?'selected':''}>${{'NS':'生食 (NS)','5%DW':'5%ブドウ糖液','NS/5%DW':'生食 または 5%ブドウ糖液'}[s]}</option>`).join('')
  return`<div class="space-y-4">
    <div class="card p-4 flex items-center gap-3">
      <div class="togg ${has?'on':''}" onclick="toggleIV(${!has})"><div class="togg-k"></div></div>
      <div><div class="text-sm font-semibold text-slate-700">点滴希釈情報</div><div class="text-xs text-slate-400">ONにすると用量カードに希釈情報を表示</div></div>
    </div>
    ${has?`<div class="card p-4 space-y-3">
      <div><label class="lbl">溶媒</label><select id="iv_solvent" class="inp">${svOpts}</select></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="lbl">最大濃度 (mg/mL)</label><input type="number" step="0.1" id="iv_maxConc" class="inp" value="${esc(iv.maxConcMgPerMl??'')}"></div>
        <div><label class="lbl">投与時間</label><input id="iv_infTime" class="inp" value="${esc(iv.infusionTime||'')}"></div>
      </div>
      <div><label class="lbl">配合禁忌（1行1件）</label><textarea id="iv_incomp" class="inp">${esc((iv.incompatible||[]).join(String.fromCharCode(10)))}</textarea></div>
    </div>`:''}
  </div>`
}
function buildDrugForm(d){
  const rows=(d.formulations||[]).map((f,i)=>{const v=typeof f==='string'?f:(f.text||f.name||'');return`<div class="flex gap-2 items-center"><input class="inp text-sm flex-1" data-form-i="${i}" value="${esc(v)}"><button onclick="removeFormulation(${i})" class="btn btn-d text-xs py-2 px-2.5 shrink-0">✕</button></div>`}).join('')
  return`<div class="space-y-2">${rows}<button onclick="addFormulation()" class="w-full btn btn-s text-sm py-2.5 justify-center">＋ 製剤を追加</button></div>`
}

// ── Slide: Disease ─────────────────────────────────────────────────────────
function buildSlideDisease(){
  const d=S.editItem;if(!d)return''
  const catOpts=(S.data?.diseaseCategories||[]).map(c=>`<option value="${esc(c)}" ${d.category===c?'selected':''}>${esc(c)}</option>`).join('')
  const drugOpts=(S.data?.drugs||[]).map(dr=>`<option value="${esc(drugKey(dr))}" ${(d.relatedDrugIds||[]).includes(drugKey(dr))?'selected':''}>${esc(dr.genericName||drugKey(dr))}</option>`).join('')
  const secRows=(d.sections||[]).map((sec,i)=>`
    <div class="card p-3 space-y-2" data-sec-i="${i}">
      <div class="flex items-center justify-between"><span class="text-xs font-bold text-teal-700">セクション ${i+1}</span><button onclick="removeSection(${i})" class="btn btn-d text-xs py-0.5 px-2">✕</button></div>
      <div><label class="lbl">タイトル</label><input class="inp text-sm" data-f="title" value="${esc(sec.title||'')}"></div>
      <div><label class="lbl">内容</label><textarea class="inp text-sm" data-f="content">${esc(sec.content||'')}</textarea></div>
    </div>`).join('')
  return`<div class="slide open"><div class="max-w-2xl mx-auto flex flex-col min-h-screen">
    <div class="sticky top-0 z-10 bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex items-center gap-3">
      <button onclick="ss({editType:null,editItem:null})" class="text-slate-500 text-sm font-medium hover:text-slate-800">← 一覧</button>
      <div class="flex-1 font-bold text-sm text-slate-800 truncate">${esc(d.name||'新規疾患')}</div>
      <button onclick="commitDisease()" class="btn btn-g text-sm">✓ 適用</button>
    </div>
    <div class="flex-1 px-4 py-4 space-y-3 pb-8">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="lbl">疾患名 *</label><input id="dis_name" class="inp" value="${esc(d.name||'')}"></div>
        <div><label class="lbl">英語名</label><input id="dis_englishName" class="inp" value="${esc(d.englishName||'')}"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="lbl">略語</label><input id="dis_abbreviation" class="inp" value="${esc(d.abbreviation||'')}"></div>
        <div><label class="lbl">カテゴリ</label><select id="dis_category" class="inp">${catOpts}</select></div>
      </div>
      <div><label class="lbl">ID（英数字）</label><input id="dis_id" class="inp font-mono text-sm" value="${esc(d.id||'')}"></div>
      <div><label class="lbl">タグ（カンマ区切り）</label><input id="dis_tags" class="inp" value="${esc((d.tags||[]).join(', '))}"></div>
      <div><label class="lbl">ポイント（1行1件）</label><textarea id="dis_points" class="inp">${esc((d.points||[]).join(String.fromCharCode(10)))}</textarea></div>
      <div>
        <div class="flex items-center justify-between mb-1.5"><label class="lbl">セクション</label><button onclick="addSection()" class="btn btn-s text-xs py-1 px-2">＋ 追加</button></div>
        <div class="space-y-2">${secRows}</div>
      </div>
      <div><label class="lbl">関連薬剤（Ctrl/Cmd+クリックで複数選択）</label>
        <select id="dis_relatedDrugIds" multiple class="inp" style="min-height:80px">${drugOpts}</select>
      </div>
      <div><label class="lbl">参考文献（1行1件）</label><textarea id="dis_references" class="inp">${esc((d.references||[]).join(String.fromCharCode(10)))}</textarea></div>
      <div><label class="lbl">備考</label><textarea id="dis_notes" class="inp">${esc(d.notes||'')}</textarea></div>
    </div>
  </div></div>`
}

// ── Slide: IV fluid section ────────────────────────────────────────────────
function buildSlideIV(){
  const d=S.editItem;if(!d)return''
  const fluidRows=(d.fluids||[]).map((f,i)=>`
    <div class="card p-3 space-y-2" data-fluid-i="${i}">
      <div class="flex items-center justify-between"><span class="text-xs font-bold text-blue-700">製剤 ${i+1}</span><button onclick="removeFluid(${i})" class="btn btn-d text-xs py-0.5 px-2">✕ 削除</button></div>
      <div><label class="lbl">製剤名</label><input class="inp text-sm" data-f="name" value="${esc(f.name||'')}"></div>
      <div class="grid grid-cols-3 gap-2">
        ${['Na','K','Cl','Ca','Mg'].map(e=>`<div><label class="lbl">${e} (mEq/L)</label><input class="inp text-xs text-center" data-f="${e}" value="${esc(f[e]??'-')}"></div>`).join('')}
        <div><label class="lbl">Buffer</label><input class="inp text-xs" data-f="buffer" value="${esc(f.buffer||'-')}"></div>
        <div><label class="lbl">Glucose (%)</label><input class="inp text-xs text-center" data-f="glucose" value="${esc(f.glucose??'-')}"></div>
      </div>
    </div>`).join('')
  return`<div class="slide open"><div class="max-w-2xl mx-auto flex flex-col min-h-screen">
    <div class="sticky top-0 z-10 bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex items-center gap-3">
      <button onclick="ss({editType:null,editItem:null,editIVIdx:null})" class="text-slate-500 text-sm font-medium hover:text-slate-800">← 一覧</button>
      <div class="flex-1 font-bold text-sm text-slate-800 truncate">${esc(d.category||'新規セクション')}</div>
      <button onclick="commitIV()" class="btn btn-g text-sm">✓ 適用</button>
    </div>
    <div class="flex-1 px-4 py-4 space-y-3 pb-8">
      <div><label class="lbl">セクション名</label><input id="ivsec_cat" class="inp" value="${esc(d.category||'')}"></div>
      <div><label class="lbl">注釈（1行1件 例: ※1 グルコン酸...）</label><textarea id="ivsec_notes" class="inp">${esc((d.notes||[]).join(String.fromCharCode(10)))}</textarea></div>
      <div>
        <div class="flex items-center justify-between mb-2"><label class="lbl">輸液製剤一覧（${(d.fluids||[]).length}件）</label><button onclick="addFluid()" class="btn btn-s text-xs py-1 px-2">＋ 製剤追加</button></div>
        <div class="space-y-2">${fluidRows}</div>
      </div>
    </div>
  </div></div>`
}

// ── Slide: Settings ────────────────────────────────────────────────────────
function buildSlideSettings(){
  const savedAtRaw=ls.get(K.appCacheAt)
  const savedAt=savedAtRaw?new Date(parseInt(savedAtRaw)).toLocaleString('ja-JP'):'-'
  const srcLabel={'index.html':'📄 index.html (最新データ)','gist':'☁️ GitHub Gist','builtin':'📦 組み込みデータ (index.htmlと同期済み)'}[S.dataSource]||'未読込'
  return`<div class="slide open"><div class="max-w-2xl mx-auto flex flex-col min-h-screen">
    <div class="sticky top-0 z-10 bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex items-center gap-3">
      ${S.data?`<button onclick="ss({editType:null})" class="text-slate-500 text-sm font-medium hover:text-slate-800">← 戻る</button>`:''}
      <h1 class="text-base font-bold text-slate-800 flex-1">設定</h1>
    </div>
    <div class="px-4 py-4 space-y-4">
      <div class="card p-4 space-y-2 text-sm">
        <div class="font-bold text-slate-700">現在のデータソース</div>
        <div class="text-slate-600">${srcLabel}</div>
        <div class="text-xs text-slate-400">Gist最終保存: ${savedAt}</div>
        <button onclick="reloadData();ss({editType:null})" class="btn btn-s text-xs py-1.5 mt-1">↺ データを再読込</button>
      </div>
      <div class="card p-4 space-y-3">
        <h2 class="font-bold text-slate-700 text-sm">GitHub Gist 保存設定</h2>
        <p class="text-xs text-slate-500">編集内容をGistに保存し、アプリ(index.html)に反映します。</p>
        <div><label class="lbl">GitHub Token（gistスコープ）</label>
          <input type="password" id="cfg_token" class="inp font-mono text-xs" value="${esc(S.token)}" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
          <p class="text-xs text-slate-400 mt-1"><a href="https://github.com/settings/tokens/new?scopes=gist&description=pediatric-dosage" target="_blank" class="text-blue-600 underline">トークン発行 ↗</a></p>
        </div>
        <div><label class="lbl">Gist ID</label>
          <input id="cfg_gistId" class="inp font-mono text-xs" value="${esc(S.gistId)}" placeholder="b2eabc0fe04fe8efa66e810ed6da55e9"></div>
        <button onclick="applySettings()" class="btn btn-p w-full justify-center">保存して再接続</button>
      </div>
      ${S.gistId?`<div class="card p-4 text-xs text-slate-500 space-y-1">
        <div class="font-semibold text-slate-600">接続中 Gist</div>
        <div class="font-mono break-all">${esc(S.gistId)}</div>
        <a href="https://gist.github.com/${esc(S.gistId)}" target="_blank" class="text-blue-600 underline block">ブラウザで開く ↗</a>
      </div>`:''}
      <div class="card p-4 text-xs text-slate-500 space-y-2">
        <div class="font-semibold text-slate-600">📋 データの読込優先順位</div>
        <ol class="list-decimal pl-4 space-y-1 leading-relaxed">
          <li><b>index.html</b> を直接読込（localhost/GitHub Pages で動作）</li>
          <li><b>GitHub Gist</b>（Token + Gist ID を設定済みの場合）</li>
          <li><b>組み込みデータ</b>（常に利用可、index.htmlと同内容）</li>
        </ol>
        <div class="mt-2 text-slate-400">file:// で開いた場合は ③ を使用します。</div>
      </div>
    </div>
  </div></div>`
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init)
</script>
</body>
</html>
